name: Faceless Finance (cinematic)

# Times are UTC. Late May = BST (UTC+1) => 16:00 Wed / 17:00 Fri / 11:00 Sun London.
# Add 1h to each in winter (GMT) for exactness.
on:
  schedule:
    - cron: "0 15 * * 3"
    - cron: "0 16 * * 5"
    - cron: "0 10 * * 0"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic override"
        required: false

jobs:
  make-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Render + (optionally) publish
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          RENDER_TO_CAMERA: hedra
          RENDER_MOTION: hedra
          HEDRA_API_KEY: ${{ secrets.HEDRA_API_KEY }}
          PRESENTER_IMAGE_URL: visual-references/elliot-headshot-walk.png
          FULLBODY_IMAGE_URL: visual-references/elliot-fullbody-walk.png
          POST_TO_TIKTOK: ${{ vars.POST_TO_TIKTOK }}
          WORKER_PUBLISH_URL: ${{ secrets.WORKER_PUBLISH_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          BLOTATO_TIKTOK_ACCOUNT_ID: ${{ secrets.BLOTATO_TIKTOK_ACCOUNT_ID }}
          WORKER_INGEST_URL: ${{ secrets.WORKER_INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          OUT_DIR: pipeline/out
        run: python pipeline/cinematic.py ${{ github.event.inputs.topic && format('--topic "{0}"', github.event.inputs.topic) || '' }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finance-video
          path: pipeline/out/final_*.mp4
          if-no-files-found: ignore
