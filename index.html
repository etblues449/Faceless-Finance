// One-video-at-a-time batch review feed. Big approve/reject, comment box,
// progress counter. Approving/rejecting advances to the next pending video.
// Immersive full-screen batch-review feed — one completed video at a time,
// big circular Approve (green-glow) / Reject (red-glow) buttons, horizontal
// swipe support, comment + Send Feedback, progress bar + batch summary.
function ReviewFeed({ onClose }) {
  const { state, dispatch } = useStore();
  const pending = state.videos.filter(v => v.stage === 'approval' && (v.heygen?.videoUrl || v.render?.stitchedUrl || v.render?.jobs?.some(j=>j.status==='completed')));
  const totalAtStart = useMemo(() => state.videos.filter(v => v.stage === 'approval' || v.stage === 'approved').length, []);
  const [comment, setComment] = useState('');
  const [reviewed, setReviewed] = useState(0);
  const [approvedN, setApprovedN] = useState(0);
  const [fb, setFb] = useState('');
  const [dragX, setDragX] = useState(0);
  const touchStart = useRef(null);
  const v = pending[0];
  const total = totalAtStart || (pending.length + reviewed);

  if (!v) {
    return (
      <div style={{position:'fixed', inset:0, zIndex:60, background:'#000', color:'#fff', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, textAlign:'center'}}>
        <div style={{width:80, height:80, borderRadius:99, background:'rgba(16,185,129,.15)', border:'2px solid #10B981', display:'flex', alignItems:'center', justifyContent:'center', fontSize:36, color:'#10B981', marginBottom:16}}>✓</div>
        <div style={{fontWeight:700, fontSize:18}}>Review feed clear</div>
        <div style={{fontSize:13, color:'#9CA3AF', marginTop:6}}>{reviewed > 0 ? `${reviewed} reviewed · ${approvedN} approved this session.` : 'No completed videos waiting for review.'}</div>
        <button className="btn" style={{marginTop:20}} onClick={onClose}>Back to Approval</button>
      </div>
    );
  }
  const videoUrl = v.render?.stitchedUrl || v.heygen?.videoUrl || v.render?.jobs?.find(j=>j.status==='completed')?.videoUrl;
  const reset = () => { setComment(''); setDragX(0); };
  const onApprove = () => { dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'approved', review:{ note: comment || '', at: Date.now(), action:'approved' } } }); setReviewed(r=>r+1); setApprovedN(n=>n+1); reset(); };
  const onReject  = () => { dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'script', review:{ note: comment || '', at: Date.now(), action:'rejected' } } }); setReviewed(r=>r+1); reset(); };
  const onSendFeedback = () => {
    if (!comment.trim()) { setFb('Type a comment first'); setTimeout(()=>setFb(''),1500); return; }
    dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ review:{ note: comment, at: Date.now(), action:'feedback' } } });
    setFb('Feedback saved'); setTimeout(()=>setFb(''),1500); setComment('');
  };
  const pct = total ? Math.round((reviewed / total) * 100) : 0;

  // Touch swipe handlers — right = approve, left = reject (threshold 90px)
  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchMove  = (e) => { if (touchStart.current != null) setDragX(e.touches[0].clientX - touchStart.current); };
  const onTouchEnd   = () => {
    if (dragX > 90) onApprove(); else if (dragX < -90) onReject(); else setDragX(0);
    touchStart.current = null;
  };
  const tilt = Math.max(-12, Math.min(12, dragX / 14));
  const swipeHint = dragX > 40 ? 'approve' : dragX < -40 ? 'reject' : null;

  return (
    <div style={{position:'fixed', inset:0, zIndex:60, background:'#000', color:'#fff', display:'flex', flexDirection:'column'}}>
      {/* header */}
      <header style={{padding:'env(safe-area-inset-top,14px) 18px 12px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0}}>
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <button onClick={onClose} style={{width:38, height:38, borderRadius:99, background:'#1c1c1e', border:'none', color:'#fff', fontSize:18, cursor:'pointer'}}>←</button>
          <div><div style={{fontWeight:700, fontSize:16, lineHeight:1.1}}>Batch Approval</div><div style={{fontWeight:700, fontSize:16, lineHeight:1.1, color:'#9CA3AF'}}>Review Feed</div></div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{width:80, height:6, background:'#2a2a2e', borderRadius:99, overflow:'hidden', marginLeft:'auto', marginBottom:5}}><div style={{height:'100%', width:`${pct}%`, background:'#10B981', transition:'width .3s'}} /></div>
          <div style={{fontWeight:700, fontSize:14}}>{reviewed}/{total}</div>
          <div style={{fontSize:9, color:'#6B7280', letterSpacing:'.08em', fontWeight:600}}>REVIEWED</div>
        </div>
      </header>

      {/* video card */}
      <section style={{flex:1, padding:'0 12px 8px', minHeight:0}}
               onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        <div style={{position:'relative', width:'100%', height:'100%', borderRadius:28, overflow:'hidden', background:'#18181b',
                     transform:`translateX(${dragX}px) rotate(${tilt}deg)`, transition: dragX ? 'none' : 'transform .25s'}}>
          {videoUrl
            ? <video src={videoUrl} controls playsInline autoPlay loop muted style={{position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover'}} />
            : <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', color:'#666', fontSize:13}}>No playable video URL</div>}
          <div style={{position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,.25) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%)', pointerEvents:'none'}} />
          {/* swipe colour wash */}
          {swipeHint && <div style={{position:'absolute', inset:0, background: swipeHint==='approve' ? 'rgba(16,185,129,.18)' : 'rgba(225,29,72,.18)', pointerEvents:'none'}} />}
          {/* brand badge */}
          <div style={{position:'absolute', top:14, right:14, background:'rgba(0,0,0,.55)', color:'#fff', fontSize:9, fontWeight:700, padding:'4px 7px', borderRadius:6, lineHeight:1.2, textAlign:'right'}}>UK Personal<br/>Finance</div>
          {/* title */}
          <div style={{position:'absolute', top:'42%', left:0, right:0, padding:'0 28px', textAlign:'center', pointerEvents:'none'}}>
            <div style={{fontSize:22, fontWeight:700, textShadow:'0 2px 12px rgba(0,0,0,.6)', lineHeight:1.25}}>{v.idea?.title}</div>
            <div style={{fontSize:11, color:'#D1D5DB', marginTop:6, textShadow:'0 1px 6px rgba(0,0,0,.6)'}}>{v.idea?.platform || '—'} · {v.script?.tone || '—'} · {wordCount(v.script?.text)} words</div>
          </div>
          {/* Approve — right */}
          <div style={{position:'absolute', right:18, top:'42%', transform:'translateY(-50%)', display:'flex', flexDirection:'column', alignItems:'center', gap:8}}>
            <span style={{fontSize:20, color:'#10B981', opacity:.7}}>›››</span>
            <button onClick={onApprove} aria-label="Approve" style={{width:72, height:72, borderRadius:99, border:'2px solid rgba(16,185,129,.6)', background:'rgba(0,0,0,.25)', backdropFilter:'blur(4px)', color:'#10B981', fontSize:30, cursor:'pointer', boxShadow:'0 0 28px rgba(16,185,129,.4)'}}>✓</button>
            <span style={{background:'#10B981', color:'#06281C', fontWeight:700, fontSize:10, letterSpacing:'.08em', padding:'4px 10px', borderRadius:99}}>APPROVE</span>
          </div>
          {/* Reject — left */}
          <div style={{position:'absolute', left:18, top:'62%', transform:'translateY(-50%)', display:'flex', flexDirection:'column', alignItems:'center', gap:8}}>
            <button onClick={onReject} aria-label="Reject" style={{width:72, height:72, borderRadius:99, border:'2px solid rgba(225,29,72,.6)', background:'rgba(0,0,0,.25)', backdropFilter:'blur(4px)', color:'#FB7185', fontSize:28, cursor:'pointer', boxShadow:'0 0 28px rgba(225,29,72,.35)'}}>✕</button>
            <span style={{background:'#3d2321', color:'#FCA5A5', border:'1px solid #7f1d1d', fontWeight:700, fontSize:10, letterSpacing:'.08em', padding:'4px 12px', borderRadius:99}}>REJECT</span>
            <span style={{fontSize:20, color:'#FB7185', opacity:.6, transform:'rotate(180deg)'}}>›››</span>
          </div>
          {/* comment row */}
          <div style={{position:'absolute', left:0, right:0, bottom:14, padding:'0 16px', display:'flex', gap:8, alignItems:'center'}}>
            <input value={comment} onChange={e=>setComment(e.target.value)} placeholder="Comment…" style={{flex:1, background:'rgba(28,28,30,.85)', backdropFilter:'blur(8px)', border:'none', borderRadius:14, padding:'11px 14px', color:'#fff', fontSize:13}} />
            <button onClick={onSendFeedback} style={{background:'rgba(28,28,30,.85)', backdropFilter:'blur(8px)', color:'#fff', border:'none', fontWeight:600, fontSize:12, padding:'11px 14px', borderRadius:14, cursor:'pointer', whiteSpace:'nowrap'}}>Send Feedback</button>
          </div>
          {fb && <div style={{position:'absolute', bottom:58, left:'50%', transform:'translateX(-50%)', background:'rgba(0,0,0,.8)', color:'#fff', fontSize:11, padding:'5px 12px', borderRadius:99}}>{fb}</div>}
        </div>
      </section>

      {/* footer */}
      <footer style={{padding:'14px 18px env(safe-area-inset-bottom,14px)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexShrink:0}}>
        <p style={{fontSize:12, color:'#9CA3AF', lineHeight:1.4, maxWidth:200, margin:0}}>
          <span style={{color:'#fff', fontWeight:600}}>Batch Summary:</span> {approvedN} of {total} videos approved. {pending.length} left.
        </p>
        <button onClick={onClose} style={{background:'#fff', color:'#000', padding:'11px 20px', borderRadius:99, fontWeight:700, fontSize:13, border:'none', cursor:'pointer', whiteSpace:'nowrap'}}>REVIEW LATER</button>
      </footer>
    </div>
  );
}

function ApprovalPage({ go }) {
  const { state, dispatch } = useStore();
  const [rerenderingId, setRerenderingId] = useState(null);
  const [reviewFeed, setReviewFeed] = useState(false);
  const items = state.videos.filter(v => v.stage === 'approval' || v.stage === 'render');
  const reviewable = state.videos.filter(v => v.stage === 'approval' && (v.heygen?.videoUrl || v.render?.stitchedUrl || v.render?.jobs?.some(j=>j.status==='completed')));

  const approve = (v) => dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'approved' } });
  const reject = (v) => {
    if (!confirm('Send back to script stage? You can edit and re-render.')) return;
    dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'script' } });
  };
  const checkNow = async (v) => {
    // NEW PATH: provider-aware polling for any multi-provider render
    if (v.render?.jobs?.length) {
      let updatedJobs = [...v.render.jobs];
      let allDone = true, anyFailed = false;
      for (let i = 0; i < updatedJobs.length; i++) {
        const job = updatedJobs[i];
        if (job.status === 'completed' || job.status === 'failed') continue;
        const P = PROVIDERS[job.provider];
        if (!P) { allDone = false; continue; }
        try {
          const upd = await P.pollJob({ jobId: job.jobId, settings: state.settings });
          if (upd.status === 'completed' && upd.videoUrl) {
            updatedJobs[i] = { ...job, status: 'completed', videoUrl: upd.videoUrl };
          } else if (upd.status === 'failed') {
            updatedJobs[i] = { ...job, status: 'failed', error: upd.error };
            anyFailed = true;
          } else {
            updatedJobs[i] = { ...job, status: upd.status || 'processing' };
            allDone = false;
          }
        } catch (e) {
          if (isTransientFetchError(e.message)) { updatedJobs[i] = { ...job, status: job.status || 'processing' }; allDone = false; }
          else { updatedJobs[i] = { ...job, status: 'failed', error: e.message }; anyFailed = true; }
        }
      }
      if (allDone) {
        const successful = updatedJobs.filter(j => j.status === 'completed');
        if (successful.length === updatedJobs.length) {
          const primaryUrl = successful[0].videoUrl;
          dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
            stage: 'approval',
            render: { ...v.render, status: 'completed', jobs: updatedJobs, completedAt: Date.now() },
            heygen: { ...v.heygen, status: 'completed', videoUrl: primaryUrl, error: '' },
          }});
        } else if (anyFailed) {
          const errs = updatedJobs.filter(j => j.status === 'failed').map(j => j.error).join('; ');
          dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
            render: { ...v.render, status: 'failed', jobs: updatedJobs, error: errs },
            heygen: { ...v.heygen, status: 'failed', error: errs },
          }});
        }
      } else {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ render: { ...v.render, jobs: updatedJobs } } });
      }
      return;
    }
    // LEGACY PATH: only true-legacy videos (no v.render) with a real HeyGen jobId
    if (!v.heygen?.videoId || !state.settings.heygenKey) return;
    try {
      const r = await heygenStatus({ apiKey: state.settings.heygenKey, videoId: v.heygen.videoId, settings: state.settings });
      if (r.status === 'completed' && r.video_url) {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
          stage:'approval',
          heygen:{ ...v.heygen, status:'completed', videoUrl: r.video_url, thumbnailUrl: r.thumbnail_url, duration: r.duration, error:'' },
        }});
      } else if (r.status === 'failed') {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ heygen:{ ...v.heygen, status:'failed', error: r.error?.message || 'render failed' } } });
      } else if (r.status) {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ heygen:{ ...v.heygen, status: r.status } } });
      }
    } catch (e) { alert('Status check failed: ' + e.message); }
  };
  const del = (v) => { if (confirm(`Delete "${v.idea?.title || 'this video'}"? Cannot be undone.`)) dispatch({ type:'DELETE_VIDEO', id:v.id }); };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Approval (Final Product)</div>
          <div className="page-sub">Watch every render. Approve to unlock publishing, or send back.</div>
        </div>
        {reviewable.length > 0 && (
          <button className="btn btn-sm" onClick={()=>setReviewFeed(true)}>▶ Review Feed ({reviewable.length})</button>
        )}
      </div>
      {reviewFeed && <ReviewFeed onClose={()=>setReviewFeed(false)} />}
      {items.length === 0 && <div className="empty">Nothing to review. New renders land here automatically.</div>}
      {items.map(v => (
        <div key={v.id} className="card" style={{marginBottom:14}}>
          <div className="row" style={{alignItems:'flex-start', marginBottom:10}}>
            <div className="col">
              <div style={{fontWeight:600, fontSize:15}}>{v.idea?.title}</div>
              <div style={{fontSize:11, color:'var(--muted)', marginTop:3}}>
                <span className={stageBadgeCls(v.stage)}>{v.stage}</span> · {v.idea?.platform || '—'} · {v.script?.tone || '—'} · {fmt(v.updatedAt)}
              </div>
            </div>
            <div style={{display:'flex',gap:8, flexWrap:'wrap'}}>
              {v.stage === 'approval' && <>
                <button className="btn btn-ghost btn-sm" onClick={() => setRerenderingId(rerenderingId===v.id?null:v.id)}>↻ Re-render</button>
                <button className="btn btn-ghost btn-sm" onClick={() => reject(v)}>Send back</button>
                <button className="btn btn-sm" onClick={() => approve(v)}>✓ Approve</button>
              </>}
              {v.heygen?.videoId && (!v.render || v.render.jobs?.[0]?.provider === 'heygen') && (
                <a className="btn btn-ghost btn-sm" href={`https://app.heygen.com/videos/${v.heygen.videoId}`} target="_blank" rel="noopener">↗ HeyGen</a>
              )}
              <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => del(v)}>× Delete</button>
            </div>
          </div>
          {rerenderingId === v.id && <RerenderControls video={v} onClose={()=>setRerenderingId(null)} />}
          {v.heygen?.videoUrl ? (
            <video src={v.heygen.videoUrl} controls className="preview-vid" />
          ) : (() => {
            const jobs = v.render?.jobs;
            const failed = jobs?.length ? jobs.filter(j => j.status === 'failed') : null;
            const isFailed = (failed?.length > 0) || v.heygen?.status === 'failed';
            const errMsg = isFailed
              ? (failed?.length ? failed.map(j => j.error).join('; ') : (v.heygen?.error || 'unknown error'))
              : '';
            // Single-shot: one job covers every scene. Show different copy.
            const isSingleShot = jobs?.length === 1 && jobs[0].singleShot;
            const sceneCount = v.storyboard?.scenes?.length ?? jobs?.[0]?.sceneIds?.length ?? 0;
            let breakdown = null;
            if (jobs?.length) {
              const done = jobs.filter(j => j.status === 'completed').length;
              const proc = jobs.filter(j => j.status === 'processing').length;
              const queued = jobs.filter(j => !j.status || j.status === 'pending' || j.status === 'queued').length;
              const fail = jobs.filter(j => j.status === 'failed').length;
              breakdown = { done, proc, queued, fail, total: jobs.length };
            }
            const progressText = isSingleShot
              ? (jobs[0].status === 'processing' ? `Rendering whole video (${sceneCount} scenes in one shot)…`
                  : jobs[0].status === 'completed' ? `Render complete.`
                  : jobs[0].status === 'failed' ? `Render failed.`
                  : `Queued at Hedra (one-shot render of ${sceneCount} scenes)…`)
              : breakdown
                ? `${breakdown.done}/${breakdown.total} scenes complete`
                  + (breakdown.proc ? ` · ${breakdown.proc} rendering` : '')
                  + (breakdown.queued ? ` · ${breakdown.queued} queued at Hedra` : '')
                  + (breakdown.fail ? ` · ${breakdown.fail} failed` : '')
                : `Rendering (${v.heygen?.status || 'queued'})…`;
            const allQueued = breakdown && breakdown.queued === breakdown.total;
            const startedAt = v.render?.startedAt;
            const minsWaiting = startedAt ? Math.floor((Date.now() - startedAt) / 60000) : null;
            const hint = isSingleShot && allQueued
              ? `One job for the entire video — typical wait 1–3 min on Hedra standard tier${minsWaiting != null ? ` · waiting ${minsWaiting} min` : ''}.`
              : (allQueued ? `All scenes accepted by Hedra and waiting to start. Per-scene fallback: queue is 2–10 min × ${breakdown?.total || ''} scenes${minsWaiting != null ? ` · waiting ${minsWaiting} min` : ''}.` : null);
            const cancel = () => {
              if (!confirm('Abandon this render? You can re-render from the script stage.')) return;
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                stage:'script',
                render: v.render ? { ...v.render, status:'cancelled', jobs: (v.render.jobs||[]).map(j => ({ ...j, status:'failed', error:'cancelled by user' })) } : v.render,
                heygen: { ...v.heygen, status:'failed', error:'cancelled by user' },
              }});
            };
            return (
              <div className="alert alert-warn">
                {isFailed ? `Render failed: ${errMsg}` : <><span className="spin"></span> {progressText} · auto-polls every 8s.</>}
                {!isFailed && hint && (
                  <div style={{fontSize:11, color:'var(--muted)', marginTop:6, lineHeight:1.4}}>
                    {hint} Tap 🐞 (bottom-right) to inspect raw status.
                  </div>
                )}
                {isFailed
                  ? <button className="btn btn-ghost btn-sm" style={{marginLeft:10}} onClick={() => dispatch({type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'script' }})}>Back to script</button>
                  : <>
                      <button className="btn btn-ghost btn-sm" style={{marginLeft:10}} onClick={() => checkNow(v)}>↻ Check now</button>
                      <button className="btn btn-ghost btn-sm" style={{marginLeft:6, color:'var(--danger)'}} onClick={cancel}>× Abandon</button>
                    </>}
              </div>
            );
          })()}
          {v.render?.jobs?.length ? <SceneTimeline video={v} /> : null}
          {v.storyboard?.scenes?.length ? (
            <StoryboardPreview storyboard={v.storyboard} jobs={v.render?.jobs} settings={state.settings} />
          ) : null}
          <details>
            <summary>View flat script ({wordCount(v.script?.text)} words)</summary>
            <pre className="script-text" style={{marginTop:8}}>{v.script?.text}</pre>
          </details>
        </div>
      ))}
    </div>
  );
}

function SceneTimeline({ video }) {
  const { state, dispatch } = useStore();
  const settings = state.settings;
  const [retrying, setRetrying] = useState(null);
  const jobs = video.render?.jobs || [];
  const scenes = video.storyboard?.scenes || [];
  if (!jobs.length || !scenes.length) return null;
  const isSingleShot = jobs.length === 1 && jobs[0]?.singleShot;
  const jobBySceneId = {};
  for (const j of jobs) for (const sid of (j.sceneIds || [])) jobBySceneId[sid] = j;

  const done = jobs.filter(j => j.status === 'completed').length;
  const failed = jobs.filter(j => j.status === 'failed').length;
  const processing = jobs.filter(j => j.status === 'processing').length;
  const pct = jobs.length ? Math.round((done / jobs.length) * 100) : 0;
  const totalDur = scenes.reduce((s, sc) => s + (sc.durationSec || 5), 0);
  const cost = video.render?.estimatedCostGBP;
  const startedAt = video.render?.startedAt;
  const elapsed = startedAt ? Math.floor((Date.now() - startedAt) / 1000) : null;
  const etaSec = (elapsed && pct > 0 && pct < 100) ? Math.round(elapsed * (100 - pct) / pct) : null;
  const rstatus = video.render?.status;
  const stitchedUrl = video.render?.stitchedUrl;
  const latestCompleted = jobs.filter(j => j.status === 'completed' && j.videoUrl).slice(-1)[0];

  const retryScene = async (sceneId) => {
    const scene = scenes.find(s => s.id === sceneId);
    const job = jobBySceneId[sceneId];
    if (!scene || !job) return;
    const P = PROVIDERS[job.provider];
    if (!P) { alert('Unknown provider for retry: ' + job.provider); return; }
    setRetrying(sceneId);
    try {
      const { jobs: newJobs } = await P.startRender({ storyboard: video.storyboard, scenes: [scene], settings, aspect: video.render?.aspect || '9:16' });
      const newJob = newJobs[0];
      const updated = jobs.map(j => (j.sceneIds || []).includes(sceneId) ? { ...newJob, status: 'processing' } : j);
      dispatch({ type:'UPDATE_VIDEO', id: video.id, patch:{ render: { ...video.render, status:'processing', jobs: updated, stitchError: null, stitchedUrl: null, stitchRetried: false } } });
    } catch (e) { alert('Retry failed: ' + e.message); }
    finally { setRetrying(null); }
  };

  const R = 52, CIRC = 2 * Math.PI * R;
  const offset = CIRC * (1 - pct / 100);
  const stageLabel = rstatus === 'stitching' ? 'Stitching' : rstatus === 'stitched' ? 'Done' : rstatus === 'failed' ? 'Failed' : 'Rendered';

  return (
    <div style={{marginTop:14, padding:16, background:'var(--card2)', borderRadius:'var(--radius-card)'}}>
      <div style={{display:'flex', alignItems:'center', gap:18, flexWrap:'wrap'}}>
        <div style={{position:'relative', width:120, height:120, flexShrink:0}}>
          <svg width="120" height="120" style={{transform:'rotate(-90deg)'}}>
            <circle cx="60" cy="60" r={R} fill="none" stroke="var(--border)" strokeWidth="8" />
            <circle cx="60" cy="60" r={R} fill="none" stroke="var(--accent)" strokeWidth="8" strokeLinecap="round" strokeDasharray={CIRC} strokeDashoffset={offset} style={{transition:'stroke-dashoffset .4s'}} />
          </svg>
          <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
            <div style={{fontSize:22, fontWeight:700, color:'var(--accent)'}}>{pct}%</div>
            <div style={{fontSize:10, color:'var(--muted)'}}>{stageLabel}</div>
          </div>
        </div>
        <div style={{flex:1, minWidth:140, display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(92px,1fr))', gap:12}}>
          <div><div style={{fontSize:11, color:'var(--muted)'}}>Scenes</div><div style={{fontWeight:600}}>{done}/{jobs.length}{processing?` · ${processing} live`:''}{failed?` · ${failed} failed`:''}</div></div>
          <div><div style={{fontSize:11, color:'var(--muted)'}}>Total duration</div><div style={{fontWeight:600}}>{Math.floor(totalDur/60)}:{String(totalDur%60).padStart(2,'0')}</div></div>
          {cost != null && <div><div style={{fontSize:11, color:'var(--muted)'}}>Est. render cost</div><div style={{fontWeight:600}}>£{cost.toFixed(2)}</div></div>}
          {etaSec != null && <div><div style={{fontSize:11, color:'var(--muted)'}}>Est. remaining</div><div style={{fontWeight:600}}>~{Math.max(1,Math.ceil(etaSec/60))}m</div></div>}
        </div>
      </div>

      {!isSingleShot && (
        <>
          <div style={{fontSize:12, fontWeight:600, margin:'16px 0 8px'}}>Scene-by-Scene Timeline</div>
          <div style={{display:'flex', gap:10, overflowX:'auto', paddingBottom:6}}>
            {scenes.map((sc, i) => {
              const job = jobBySceneId[sc.id];
              const st = job?.status || 'queued';
              const borderColor = st==='failed'?'var(--danger)':st==='completed'?'var(--accent)':st==='processing'?'#9BB4FF':'var(--border)';
              return (
                <div key={sc.id} style={{flexShrink:0, width:96}}>
                  <div style={{width:96, height:170, borderRadius:10, overflow:'hidden', background:'#000', border:`2px solid ${borderColor}`, display:'flex', alignItems:'center', justifyContent:'center'}}>
                    {st === 'completed' && job?.videoUrl
                      ? <video src={job.videoUrl} muted playsInline style={{width:'100%', height:'100%', objectFit:'cover'}} preload="metadata" />
                      : st === 'failed' ? <span style={{fontSize:24}}>⚠️</span>
                      : st === 'processing' ? <span className="spin" style={{width:18, height:18}}></span>
                      : st === 'awaitingChain' ? <span style={{fontSize:9, color:'var(--muted)', textAlign:'center', padding:'0 4px', lineHeight:1.2}}>waiting<br/>for<br/>prev</span>
                      : st === 'submitting' ? <><span className="spin" style={{width:14, height:14}}></span><span style={{fontSize:9, color:'var(--muted)', marginLeft:5}}>chaining</span></>
                      : <span style={{fontSize:10, color:'var(--muted)'}}>queued</span>}
                  </div>
                  <div style={{fontSize:11, fontWeight:600, marginTop:5}}>Scene {i+1}</div>
                  <div style={{fontSize:10, color:'var(--muted)'}}>{sc.type} · {sc.durationSec}s</div>
                  {st === 'failed' && (
                    <button className="btn btn-ghost btn-sm" style={{marginTop:5, fontSize:10, padding:'3px 8px', color:'var(--danger)'}} disabled={retrying===sc.id} onClick={()=>retryScene(sc.id)}>
                      {retrying===sc.id ? <><span className="spin" style={{width:9,height:9}}></span> …</> : '↻ Quick Retry'}
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      {(stitchedUrl || latestCompleted?.videoUrl) && (
        <>
          <div style={{fontSize:12, fontWeight:600, margin:'16px 0 8px'}}>{stitchedUrl ? 'Final Video (stitched + voice)' : 'Instant Preview · latest completed scene'}</div>
          <video src={stitchedUrl || latestCompleted.videoUrl} controls playsInline className="preview-vid" style={{maxHeight:360}} />
        </>
      )}
    </div>
  );
}

function StoryboardPreview({ storyboard, jobs = [], settings }) {
  const cost = useMemo(() => settings ? estimateStoryboardCost(storyboard, settings) : null, [storyboard, settings]);
  const jobBySceneId = {};
  for (const j of jobs || []) for (const sid of (j.sceneIds || [])) jobBySceneId[sid] = j;
  // Single-shot detection — when one job covers every scene, the rendered
  // output is ONE continuous video, not N separate clips. The main player
  // on the Approval card already shows it; we suppress per-scene playback
  // here to avoid duplicating the same video N times in the storyboard.
  const isSingleShot = jobs.length === 1 && jobs[0]?.singleShot;
  return (
    <details style={{marginTop:10, marginBottom:10}}>
      <summary>Scene scripts &amp; prompts ({storyboard.scenes.length}) · {storyboardDuration(storyboard)}s
        {cost ? <span style={{color:'var(--muted)', marginLeft:8}}>· est £{cost.total.toFixed(2)} via {Object.values(cost.byProvider).map(p=>p.name).join(' + ') || '—'}</span> : null}
        {isSingleShot ? <span style={{color:'var(--muted)', marginLeft:8}}>· single-shot render (one continuous video; player above)</span> : null}
      </summary>
      <div style={{display:'grid', gap:8, marginTop:8}}>
        {storyboard.scenes.map((sc, i) => {
          const job = jobBySceneId[sc.id];
          const provider = sc.providerOverride
            ? PROVIDERS[sc.providerOverride]?.name
            : (settings ? pickProviderForScene(sc, settings)?.name : null);
          return (
            <div key={sc.id} style={{padding:10, background:'var(--card2)', borderRadius:8, fontSize:12}}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                <span className="pill" style={{background: sc.type==='cinematic' ? 'rgba(255,169,77,0.18)' : 'rgba(155,180,255,0.15)', color: sc.type==='cinematic' ? 'var(--warn)' : '#9BB4FF'}}>{i+1}. {sc.type}</span>
                <span style={{color:'var(--muted)'}}>{sc.durationSec}s</span>
                {provider && <span style={{color:'var(--muted)'}}>→ {provider}</span>}
                {job?.status && (
                  <span className="pill" style={{marginLeft:'auto', background: job.status === 'failed' ? 'rgba(232,77,82,0.15)' : (job.status === 'completed' ? 'rgba(45,194,107,0.15)' : 'rgba(255,255,255,0.06)'), color: job.status === 'failed' ? 'var(--danger)' : (job.status === 'completed' ? 'var(--success,#2DC26B)' : 'var(--muted)')}}>{job.status}</span>
                )}
              </div>
              <div style={{marginBottom:4}}><strong>Dialogue:</strong> {sc.dialogue}</div>
              {sc.visualPrompt && <div style={{color:'var(--text-dim)', marginBottom:4}}><strong>Visual:</strong> {sc.visualPrompt}</div>}
              {sc.textOverlay && <div style={{color:'var(--text-dim)'}}><strong>Overlay:</strong> "{sc.textOverlay}"</div>}
              {(sc.avatarPosition || sc.avatarScale) && sc.type === 'talking-head' && (
                <div style={{color:'var(--muted)', fontSize:11, marginTop:4}}>position: {sc.avatarPosition || 'center'} · scale: {sc.avatarScale || 'medium'}</div>
              )}
              {job?.error && (
                <div style={{marginTop:6, padding:6, borderRadius:6, background:'rgba(232,77,82,0.08)', color:'var(--danger)', fontSize:11}}>
                  <strong>Error:</strong> {job.error}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </details>
  );
}

function RerenderControls({ video, onClose }) {
  const { state, dispatch } = useStore();
  const [speed, setSpeed] = useState(video.heygen?.speed ?? 1.0);
  const [pitch, setPitch] = useState(video.heygen?.pitch ?? 0);
  const [voiceId, setVoiceId] = useState(state.settings.heygenVoiceId);
  const [script, setScript] = useState(video.script?.text || '');
  const [submitting, setSubmitting] = useState(false);
  const [err, setErr] = useState('');

  const start = async () => {
    const missing = preflightRender({ ...state.settings, heygenVoiceId: voiceId }, script);
    if (missing.length) { setErr('Missing: ' + missing.join(', ')); return; }
    setErr(''); setSubmitting(true);
    try {
      const newVideoId = await heygenGenerate({
        apiKey: state.settings.heygenKey,
        avatarId: state.settings.heygenAvatarId,
        voiceId,
        scriptText: script,
        aspect: video.heygen?.aspect || PLATFORMS[video.idea?.platform || 'tiktok'].aspect,
        speed, pitch,
        settings: state.settings,
      });
      dispatch({ type:'UPDATE_VIDEO', id:video.id, patch:{
        stage:'render',
        script: { ...video.script, text: script, updatedAt: Date.now() },
        heygen: { videoId: newVideoId, status:'processing', videoUrl:'', thumbnailUrl:'', error:'', speed, pitch, aspect: video.heygen?.aspect },
      }});
      onClose();
    } catch (e) { setErr(e.message); }
    finally { setSubmitting(false); }
  };

  return (
    <div style={{marginTop:12, padding:14, border:'1px dashed var(--border)', borderRadius:8, background:'var(--card2)'}}>
      <div className="card-title">Re-render with new settings</div>
      <div className="grid2" style={{marginBottom:10}}>
        <div>
          <label className="label">Speed: {speed.toFixed(2)}x</label>
          <input type="range" className="slider" min="0.5" max="1.5" step="0.05" value={speed} onChange={e=>setSpeed(parseFloat(e.target.value))} />
        </div>
        <div>
          <label className="label">Pitch: {pitch>0?'+':''}{pitch}</label>
          <input type="range" className="slider" min="-50" max="50" step="5" value={pitch} onChange={e=>setPitch(parseInt(e.target.value))} />
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <label className="label">Voice ID (override)</label>
        <input value={voiceId} onChange={e=>setVoiceId(e.target.value)} placeholder="Leave as Settings default or paste a different voice ID" />
      </div>
      <div style={{marginBottom:10}}>
        <label className="label">Script (edit in place)</label>
        <textarea value={script} onChange={e=>setScript(e.target.value)} style={{minHeight:140}} />
      </div>
      {err && <div className="alert alert-err" style={{marginBottom:10}}>{err}</div>}
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-sm" onClick={start} disabled={submitting}>{submitting?<><span className="spin"></span> Sending…</>:'→ Re-render'}</button>
        <button className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
      </div>
      <div className="help" style={{marginTop:8}}>This burns another HeyGen credit. Original video will be replaced when the new render finishes.</div>
    </div>
  );
}

function PublishCard({ video }) {
  const { state, dispatch } = useStore();
  const [active, setActive] = useState(state.settings.defaultPlatforms[0] || 'tiktok');

  return (
    <div className="card" style={{marginBottom:14}}>
      <div className="row" style={{alignItems:'flex-start', marginBottom:10}}>

        </div>

          {video.heygen?.videoUrl && (
            <button className="btn btn-ghost btn-sm" onClick={() => downloadRemote(video.heygen.videoUrl, `${video.idea?.title?.slice(0,40).replace(/[^a-z0-9]+/gi,'_') || 'video'}.mp4`)}>
              ⬇ Download MP4
            </button>
          )}
          {video.heygen?.videoId && <a className="btn btn-ghost btn-sm" href={`https://app.heygen.com/videos/${video.heygen.videoId}`} target="_blank" rel="noopener">↗ HeyGen</a>}
          <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => { if(confirm(`Delete "${video.idea?.title || 'this video'}"? Cannot be undone.`)) dispatch({ type:'DELETE_VIDEO', id:video.id }); }}>× Delete</button>
        </div>
      </div>

      {video.heygen?.videoUrl && (
        <video src={video.heygen.videoUrl} controls style={{width:'100%', maxHeight:380, borderRadius:8, background:'#000', marginBottom:14}} />
      )}

      <div className="seg" style={{marginBottom:12}}>
        {platforms.map(k => (
          <button key={k} className={`seg-btn ${active===k?'active':''}`} onClick={()=>setActive(k)}>
            {PLATFORMS[k].name}
            {video.platforms[k]?.posted && ' ✓'}
          </button>
        ))}
      </div>

      <div className={`platform-card ${active}`}>
        <div className="platform-h">
          <div className="platform-name">{pCfg.name} · {pCfg.aspect} · ideal {pCfg.ideal[0]}–{pCfg.ideal[1]}s</div>
          <div className={`char-count ${(p.caption?.length||0) > pCfg.maxCaption?'over':''}`}>
            {p.caption?.length || 0} / {pCfg.maxCaption}
          </div>
        </div>

        {(active === 'shorts' || active === 'long') && (
          <div style={{marginBottom:10}}>
            <label className="label">Title (max 100 chars)</label>
            <input value={p.title || ''} onChange={e=>updatePlatform(active, { title:e.target.value })} maxLength={100} />

        <div style={{marginBottom:10}}>

          <label className="label">Hashtags (max {pCfg.hashtagLimit} recommended)</label>

function BrollSearch({ queries, pexelsKey }) {
  const [active, setActive] = useState(queries[0]);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  useEffect(() => {
    if (!pexelsKey || !active) { setResults([]); return; }
    setLoading(true); setErr('');
    pexelsSearch({ apiKey: pexelsKey, query: active, settings: state.settings })
      .then(r => setResults(r.videos || []))
      .catch(e => setErr(e.message))
      .finally(() => setLoading(false));
  }, [active, pexelsKey]);
  if (!pexelsKey) return <div className="help" style={{marginTop:8}}>Add a Pexels API key in Settings to search B-roll.</div>;
  return (
    <div style={{marginTop:8}}>
      <div className="seg" style={{marginBottom:10, flexWrap:'wrap'}}>
        {queries.map(q => <button key={q} className={`seg-btn ${active===q?'active':''}`} onClick={()=>setActive(q)}>{q}</button>)}
      </div>
      {loading && <div className="help"><span className="spin"></span> searching Pexels…</div>}
      {err && <div className="alert alert-err">{err}</div>}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8}}>
        {results.slice(0,8).map(v => {
          const file = v.video_files?.find(f => f.quality==='hd') || v.video_files?.[0];
          return (
            <a key={v.id} href={file?.link} target="_blank" rel="noopener" style={{display:'block'}}>
              <img src={v.image} style={{width:'100%', aspectRatio:'9/16', objectFit:'cover', borderRadius:6, border:'1px solid var(--border)'}} alt="" />
            </a>
          );
        })}
      </div>
    </div>
  );
}

// Normalise a debug-log `provider` string ("runway-submit", "veo3-poll", …)
// to a base provider key ("runway", "veo3", "heygen", "hedra", "fal", …).
function debugProviderKey(p) {
  if (!p) return 'other';
  return String(p).split('-')[0].replace('hedra_act_two','hedra').replace('hedra','hedra')
    .replace('fal','fal').replace('runway','runway').replace('veo3','veo3')
    .replace('heygen','heygen').replace('higgsfield','higgsfield');
}

function AnalyticsPage() {
  const { state } = useStore();
  const s = state.settings;
  const [, force] = useState(0);
  const [timeWindow, setTimeWindow] = useState('7d');
  useEffect(() => { const iv = setInterval(()=>force(x=>x+1), 4000); return ()=>clearInterval(iv); }, []);

  // --- Provider performance from the rolling debug log (filtered by window) ---
  const windowMs = timeWindow === '24h' ? 864e5 : timeWindow === '7d' ? 7*864e5 : 30*864e5;
  const perf = useMemo(() => {
    const cutoff = Date.now() - windowMs;
    const log = getDebugLog().filter(e => e.ts >= cutoff);
    const acc = {};
    for (const e of log) {
      const key = debugProviderKey(e.provider);
      if (!['runway','veo3','fal','higgsfield','heygen','hedra'].includes(key)) continue;
      acc[key] = acc[key] || { req:0, ok:0, err:0, durSum:0, durN:0 };
      if (e.action === 'request') acc[key].req++;
      if (e.action === 'response_ok') {
        acc[key].ok++;
        try { const d = JSON.parse(e.detail); if (typeof d.durationMs === 'number' && d.durationMs < 600000) { acc[key].durSum += d.durationMs; acc[key].durN++; } } catch {}
      }
      if (e.action === 'response_error' || e.action.includes('fetch_error') || e.action.includes('error')) acc[key].err++;
    }
    return acc;
  }, [state.videos, timeWindow]);

  // --- Fallback Sandbox ---
  const [scenario, setScenario] = useState('runway_out_of_credits');
  const ladder = [
    { id:'runway_gen4',   name:'Runway Gen-4 Turbo', ok: !!s.runwayKey && (!!s.runwayImageUrl || !!s.hedraStartKeyframeUrl || !!s.higgsfieldImageUrl), renderMin: 4 },
    { id:'fal_seedance2', name:'Fal.ai · Seedance 2.0', ok: !!s.falKey, renderMin: 3 },
    { id:'higgsfield',    name:'Higgsfield · DoP',   ok: !!s.higgsfieldKey && !!s.higgsfieldSecret, renderMin: 3 },
    { id:'veo3',          name:'Google Veo 3',       ok: !!s.googleAiKey, renderMin: 6 },
    { id:'heygen',        name:'HeyGen multi-input', ok: !!s.heygenKey && !!s.heygenAvatarId && !!s.elevenLabsKey && !!s.elevenLabsVoiceId, renderMin: 4 },
    { id:'hedra_act_two', name:'Hedra Act-Two',      ok: !!s.hedraKey && !!s.hedraActTwoModelId && (!!s.hedraStartKeyframeId || !!s.hedraStartKeyframeUrl) && !!s.elevenLabsKey && !!s.elevenLabsVoiceId, renderMin: 10 },
  ];
  const sim = useMemo(() => {
    // Which provider would fail (the "primary"), then who picks it up.
    const failIdx = scenario === 'runway_out_of_credits' ? 0
      : scenario === 'veo_high_latency' ? 3
      : 0; // api_timeout — assume the top provider times out
    const primary = ladder[failIdx]?.name || ladder[0].name;
    const handler = ladder.find((p, i) => i !== failIdx && p.ok) || ladder.find(p => p.ok);
    if (!handler) return { primary, handler:null };
    const ref = PROVIDER_REFERENCE.find(r => r.id === handler.id) || {};
    const sceneCount = 6, dur = 30; // hypothetical short
    const cost = (ref.costPerSec || 0) * dur;
    return { primary, handler, cost, renderMin: handler.renderMin, quality: ref.quality, lipSync: ref.lipSync };
  }, [scenario, JSON.stringify(ladder.map(l=>l.ok))]);

  // --- Channel ROI (real bits + clearly-labelled placeholders) ---
  const approvedCount = state.videos.filter(v => v.stage === 'approved').length;
  const publishedCount = state.videos.filter(v => v.stage === 'published').length;
  const queue = state.videos.filter(v => v.stage === 'approved');

  const SR = ({ k, label }) => {
    const p = perf[k];
    const total = p ? (p.ok + p.err) : 0;
    const rate = total ? Math.round((p.ok / total) * 100) : null;
    return (
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
        <div style={{width:130, fontSize:12, color:'var(--text-dim)', flexShrink:0}}>{label}</div>
        <div style={{flex:1, height:18, borderRadius:6, overflow:'hidden', background:'var(--card2)', display:'flex'}}>
          {rate != null
            ? <><div style={{width:`${rate}%`, background:'#2DC26B'}} /><div style={{width:`${100-rate}%`, background:'var(--danger)'}} /></>
            : <div style={{width:'100%', display:'flex', alignItems:'center', paddingLeft:8, fontSize:10, color:'var(--muted)'}}>no traffic yet</div>}
        </div>
        <div style={{width:54, textAlign:'right', fontSize:12, fontWeight:600}}>{rate != null ? `${rate}%` : '—'}</div>
      </div>
    );
  };

  // Cost-vs-quality scatter geometry — x = quality 5..10, y = cost/sec 0..0.4
  const SCATTER_W = 320, SCATTER_H = 200, PAD = 36;
  const xAt = (q) => PAD + ((q - 5) / 5) * (SCATTER_W - PAD - 8);
  const yAt = (c) => (SCATTER_H - PAD) - (Math.min(c, 0.4) / 0.4) * (SCATTER_H - PAD - 8);
  const dotColor = { runway_gen4:'#6750A4', veo3:'#2DC26B', fal_seedance2:'#9BB4FF', higgsfield:'#B57BD8', heygen:'#FF7A59', hedra_act_two:'#FFB95C' };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Analytics</div>
          <div className="page-sub">Provider performance, fallback simulation, channel ROI.</div>
        </div>
        <div className="seg">
          {['24h','7d','30d'].map(w => (
            <button key={w} className={`seg-btn ${timeWindow===w?'active':''}`} onClick={()=>setTimeWindow(w)}>{w==='24h'?'Last 24h':w==='7d'?'7 Days':'30 Days'}</button>
          ))}
        </div>
      </div>

      {/* AI Provider Performance */}
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">AI Provider Performance · {timeWindow==='24h'?'last 24h':timeWindow==='7d'?'last 7 days':'last 30 days'}</div>
        <div style={{fontWeight:600, fontSize:13, marginBottom:8}}>Success rate</div>
        <SR k="runway" label="Runway Gen-4" />
        <SR k="veo3" label="Veo 3" />
        <SR k="fal" label="Fal.ai" />
        <SR k="higgsfield" label="Higgsfield" />
        <SR k="heygen" label="HeyGen" />
        <SR k="hedra" label="Hedra" />

        <div style={{fontWeight:600, fontSize:13, margin:'18px 0 8px'}}>Cost vs Quality</div>
        <div style={{overflowX:'auto'}}>
          <svg width={SCATTER_W} height={SCATTER_H} style={{maxWidth:'100%'}}>
            {/* grid */}
            {[0,0.1,0.2,0.3,0.4].map(c => (
              <g key={c}><line x1={PAD} x2={SCATTER_W-8} y1={yAt(c)} y2={yAt(c)} stroke="var(--border)" strokeWidth="1" /><text x={4} y={yAt(c)+3} fontSize="9" fill="var(--muted)">£{c.toFixed(2)}</text></g>
            ))}
            {[5,6,7,8,9,10].map(q => (
              <g key={q}><line x1={xAt(q)} x2={xAt(q)} y1={8} y2={SCATTER_H-PAD} stroke="var(--border)" strokeWidth="1" /><text x={xAt(q)-3} y={SCATTER_H-PAD+14} fontSize="9" fill="var(--muted)">{q}</text></g>
            ))}
            <text x={SCATTER_W/2} y={SCATTER_H-6} fontSize="10" fill="var(--muted)" textAnchor="middle">Quality (1-10)</text>

            {/* dots */}
            {PROVIDER_REFERENCE.map(r => (

        <div className="help" style={{marginTop:4, marginBottom:4}}>Cheaper + higher quality = bottom-right. Veo 3 is "free" (rate-limited). Quality scores are editorial.</div>

        <div style={{overflowX:'auto'}}>

            </tr></thead>
            <tbody>
              {PROVIDER_REFERENCE.map(r => {
                const key = r.id.split('_')[0];
                const p = perf[key === 'hedra' ? 'hedra' : key];

              <div style={{flex:1, minWidth:0}}>

        <div className="help" style={{marginTop:8}}>From the live debug log. Use the 🐞 panel (bottom-right) to retry / inspect, or "Quick Retry" on a failed scene in the Approval timeline.</div>

function CalendarPage() {
  const { state, dispatch } = useStore();
  const [weekOffset, setWeekOffset] = useState(0);
  const monday = useMemo(() => {
    const d = new Date();
    const day = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - day + weekOffset*7);
    d.setHours(0,0,0,0);
    return d;
  }, [weekOffset]);
  const days = Array.from({length:7}, (_,i) => { const d = new Date(monday); d.setDate(d.getDate()+i); return d; });

  const items = state.videos.filter(v => v.stage==='approved' || v.stage==='published');

  const setSchedule = (videoId, platform, dateIso) => {
    const v = state.videos.find(x => x.id===videoId);
    if (!v) return;
    dispatch({ type:'UPDATE_VIDEO', id:videoId, patch:{ platforms: { ...v.platforms, [platform]: { ...v.platforms[platform], scheduledAt: dateIso ? new Date(dateIso).getTime() : null } } } });
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Calendar</div>
          <div className="page-sub">Manual scheduling per platform. No magic best-time wisdom — you decide.</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(w=>w-1)}>← Prev</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(0)}>Today</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(w=>w+1)}>Next →</button>
        </div>
      </div>

      <div className="calendar-grid" style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:8, marginBottom:14}}>
        {days.map(d => {
          const ds = d.toDateString();
          const today = new Date().toDateString() === ds;
          const dayItems = [];
          items.forEach(v => {
            ['tiktok','reels','shorts','long'].forEach(plat => {
              const sched = v.platforms?.[plat]?.scheduledAt;
              if (sched && new Date(sched).toDateString() === ds) {
                dayItems.push({ video:v, platform:plat, time:sched });
              }
            });
          });
          return (
            <div key={ds} className="card" style={{padding:10, background: today?'var(--card2)':'var(--card)'}}>
              <div style={{fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:8}}>
                {d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })}
              </div>
              {dayItems.length===0 && <div style={{fontSize:11, color:'var(--muted)'}}>—</div>}
              {dayItems.map(({video, platform, time}, i) => (
                <div key={i} style={{fontSize:11, padding:6, background:'var(--card2)', borderRadius:6, marginBottom:6, lineHeight:1.4}}>
                  <div style={{color:'var(--accent)', fontWeight:600}}>{PLATFORMS[platform].name}</div>
                  <div>{new Date(time).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}</div>
                  <div style={{color:'var(--text-dim)', marginTop:3}}>{video.idea?.title?.slice(0,40)}…</div>
                </div>
              ))}
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="card-title">Schedule a video</div>
        {items.length===0 && <div className="empty">No approved videos to schedule.</div>}
        {items.map(v => (
          <div key={v.id} style={{padding:'12px 0', borderBottom:'1px solid var(--border)'}}>
            <div style={{fontWeight:600, fontSize:13, marginBottom:8}}>{v.idea?.title}</div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8}}>
              {['tiktok','reels','shorts','long'].map(plat => {
                const sched = v.platforms?.[plat]?.scheduledAt;
                const val = sched ? new Date(sched - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16) : '';
                return (
                  <div key={plat}>
                    <label className="label" style={{fontSize:11}}>{PLATFORMS[plat].name}</label>
                    <input type="datetime-local" value={val} onChange={e => setSchedule(v.id, plat, e.target.value)} />
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

    return () => clearInterval(iv);
  }, [auto]);
  const log = getDebugLog();
  return (
    <div className="card" style={{marginBottom:14}}>
      <div className="card-title">🐞 Debug Log (last {log.length} provider calls)</div>
      <div className="help" style={{marginBottom:10}}>
        Every API call the app makes shows here in real-time. If a render fails, the error appears below — copy it and send to support. Auto-refreshes every 2s.
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={() => setAuto(a => !a)}>{auto ? '⏸ Pause' : '▶ Resume'} auto-refresh</button>
        <button className="btn btn-ghost btn-sm" onClick={() => { clearDebugLog(); setTick(t => t + 1); }}>🗑 Clear log</button>
        <button className="btn btn-ghost btn-sm" onClick={() => { navigator.clipboard?.writeText(JSON.stringify(log, null, 2)); }}>📋 Copy log as JSON</button>
      </div>
      {log.length === 0 ? (
        <div className="empty" style={{textAlign:'center', padding:20, fontSize:12, color:'var(--muted)'}}>No log entries yet. Trigger a render to see calls land here.</div>
      ) : (
        <div style={{maxHeight:400, overflowY:'auto', fontFamily:'ui-monospace,monospace', fontSize:11}}>
          {log.map((e, i) => {
            const isError = e.action.includes('error') || e.action.includes('failed');
            return (
              <div key={i} style={{padding:'6px 8px', background: isError ? 'rgba(255,80,80,0.08)' : 'var(--card2)', borderRadius:6, marginBottom:4, borderLeft: isError ? '3px solid var(--danger)' : '3px solid transparent'}}>
                <div style={{color: isError ? 'var(--danger)' : 'var(--text-dim)'}}>
                  <strong>{new Date(e.ts).toLocaleTimeString()}</strong> · <strong>{e.provider}</strong> · {e.action}
                </div>
                <div style={{color:'var(--text)', wordBreak:'break-all', whiteSpace:'pre-wrap', marginTop:2}}>{e.detail}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function HedraUploadPhotoButton({ settings, set }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const fileRef = useRef(null);
  const handle = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setErr(''); setBusy(true);
    try {
      const assetId = await hedraUploadImage(file, settings, file.name);
      set({ hedraStartKeyframeId: assetId, hedraStartKeyframeUrl: '' });
      alert(`Uploaded. Asset ID saved: ${assetId}`);
    } catch (ex) { setErr(ex.message); alert('Upload failed: ' + ex.message); }
    finally { setBusy(false); if (fileRef.current) fileRef.current.value = ''; }
  };
  return (
    <>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handle} />
      <button className="btn btn-ghost btn-sm" disabled={busy || !settings.hedraKey} onClick={() => fileRef.current?.click()}>
        {busy ? <><span className="spin"></span> Uploading…</> : '📷 Upload reference photo'}
      </button>
    </>
  );
}

function HedraFetchModelsButton({ settings, set }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [models, setModels] = useState(null);
  const fetchModels = async () => {
    setErr(''); setBusy(true);
    try {
      const list = await hedraListModels(settings);
      setModels(list);
      // Auto-pick: find Character-2 / Act-Two by name pattern
      const pickByName = (substrings) => list.find(m => {
        const n = (m.name || m.display_name || '').toLowerCase();
        return substrings.every(s => n.includes(s));
      });
      const charModel = pickByName(['character']) || pickByName(['char-2']) || pickByName(['c2']);
      const actModel = pickByName(['act']) || pickByName(['lip']);
      const patch = {};
      if (charModel?.id) patch.hedraCharacter2ModelId = charModel.id;
      if (actModel?.id) patch.hedraActTwoModelId = actModel.id;
      if (Object.keys(patch).length) set(patch);
    } catch (ex) { setErr(ex.message); }
    finally { setBusy(false); }
  };
  return (
    <div>
      <button className="btn btn-sm" onClick={fetchModels} disabled={busy || !settings.hedraKey}>
        {busy ? <><span className="spin"></span> Fetching…</> : '↻ Fetch Hedra models'}
      </button>
      {err && <div className="alert alert-err" style={{marginTop:6, fontSize:11}}>{err}</div>}
      {models && (
        <div style={{marginTop:8, fontSize:11, color:'var(--text-dim)'}}>
          Found {models.length} model(s). Click a row to set Act-Two or Character-2 manually:
          <div style={{maxHeight:160,overflowY:'auto',marginTop:4}}>
            {models.map((m, i) => (
              <div key={m.id || i} style={{padding:'4px 6px',background:'var(--card2)',borderRadius:4,marginBottom:2,display:'flex',gap:6,alignItems:'center'}}>
                <span style={{flex:1}}><strong>{m.name || m.display_name || 'Unnamed'}</strong> <code style={{fontSize:10}}>{(m.id||'').slice(0,16)}…</code></span>
                <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'2px 6px'}} onClick={() => set({ hedraActTwoModelId: m.id })}>Use as Act-Two</button>
                <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'2px 6px'}} onClick={() => set({ hedraCharacter2ModelId: m.id })}>Use as Character-2</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// Smart Fallback Rule Builder — shows the orchestrator priority ladder,
// the per-video cost cap, and lets the user add conditional routing rules
// (IF scene type/duration THEN use provider X) which feed pickProviderForScene.
function SmartFallbackCard() {
  const { state, dispatch } = useStore();
  const s = state.settings;
  const set = (patch) => dispatch({ type:'SET_SETTINGS', patch });
  // The orchestrator's fixed fast-path order (orchestrateRender). Each entry
  // notes how we detect it's configured.
  const LADDER = [
    { id:'longcat_avatar', label:'LongCat-Avatar (HF Space)', why:'cinematic + lip-sync (experimental)', ok: !!s.longcatAvatarEnabled && !!s.elevenLabsKey && !!s.elevenLabsVoiceId && (!!s.runwayImageUrl || !!s.hedraStartKeyframeUrl || !!s.higgsfieldImageUrl) },
    { id:'runway_gen4',   label:'Runway Gen-4 Turbo', why:'top cinematic',     ok: !!s.runwayKey && (!!s.runwayImageUrl || !!s.hedraStartKeyframeUrl || !!s.higgsfieldImageUrl) },
    { id:'fal_seedance2', label:'Fal.ai · Seedance 2.0', why:'cinematic, text→video', ok: !!s.falKey },
    { id:'higgsfield',    label:'Higgsfield · DoP',   why:'cinematic, image→video', ok: !!s.higgsfieldKey && !!s.higgsfieldSecret },
    { id:'veo3',          label:'Google Veo 3',       why:'cinematic, throttled',  ok: !!s.googleAiKey },
    { id:'heygen',        label:'HeyGen multi-input', why:'talking-head + b-roll', ok: !!s.heygenKey && !!s.heygenAvatarId && !!s.elevenLabsKey && !!s.elevenLabsVoiceId },
    { id:'hedra_act_two', label:'Hedra Act-Two',      why:'talking-head, slow',    ok: !!s.hedraKey && !!s.hedraActTwoModelId && (!!s.hedraStartKeyframeId || !!s.hedraStartKeyframeUrl) && !!s.elevenLabsKey && !!s.elevenLabsVoiceId },
  ];
  const rules = s.routingRules || [];
  const updRule = (i, patch) => { const next = rules.map((r,j) => j===i ? {...r, ...patch} : r); set({ routingRules: next }); };
  const addRule = () => set({ routingRules: [...rules, { field:'sceneType', op:'eq', value:'cinematic', then:'runway_gen4' }] });
  const delRule = (i) => set({ routingRules: rules.filter((_,j)=>j!==i) });
  const cinematicProviders = Object.values(PROVIDERS).filter(P => P.caps.cinematic || P.caps.talkingHead);

  return (
    <div className="card" style={{marginBottom:14}}>
      <div className="card-title">Smart Fallback Rule Builder</div>
      <div className="help" style={{marginBottom:14}}>
        How renders are routed. The orchestrator tries the ladder top-down, auto-falling through on any error. Conditional rules below override the ladder for matching scenes (if the targeted provider is configured).
      </div>

      <div style={{fontWeight:600, fontSize:13, marginBottom:8}}>Priority ladder &amp; fallbacks</div>
      <div style={{display:'grid', gap:8, marginBottom:18}}>
        {LADDER.map((p, i) => (
          <div key={p.id} style={{display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background:'var(--card2)', borderRadius:10, border: p.ok ? '1.5px solid var(--accent)' : '1.5px solid transparent'}}>
            <span style={{fontWeight:700, color:'var(--muted)', width:18}}>{i+1}</span>
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontWeight:600, fontSize:13}}>{p.label}</div>
              <div style={{fontSize:11, color:'var(--muted)'}}>{p.why}</div>
            </div>
            <span className="pill" style={{background: p.ok ? 'var(--accent-dim)' : 'var(--card)', color: p.ok ? 'var(--accent)' : 'var(--muted)'}}>{p.ok ? (i===0?'Active · primary':'Ready · backup') : 'Not configured'}</span>
          </div>
        ))}
      </div>

      <div style={{fontWeight:600, fontSize:13, marginBottom:8}}>Cost cap per video</div>
      <div style={{marginBottom:6}}>
        <input type="range" className="slider" min="0" max="50" step="1" value={Math.min(50, s.costCapPerVideoGBP || 0)} onChange={e=>set({ costCapPerVideoGBP: parseInt(e.target.value) })} />
        <div style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--muted)', marginTop:4}}>
          <span>£0</span><strong style={{color:'var(--text)', fontSize:14}}>£{(s.costCapPerVideoGBP||0).toFixed(2)}</strong><span>£50</span>
        </div>
      </div>
      <div className="help" style={{marginBottom:18}}>Renders refuse if the estimated cost exceeds this. Set to £0 to disable the cap.</div>

      <div style={{display:'flex', alignItems:'center', marginBottom:8}}>
        <div style={{fontWeight:600, fontSize:13}}>Conditional routing rules</div>
        <span style={{flex:1}}/>
        <button className="btn btn-ghost btn-sm" onClick={addRule}>+ Add rule</button>
      </div>
      {rules.length === 0 && <div className="help" style={{marginBottom:8}}>No rules — every scene uses the ladder. Add a rule to force specific scene types or durations onto a chosen provider.</div>}
      <div style={{display:'grid', gap:8}}>
        {rules.map((r, i) => (
          <div key={i} style={{padding:'10px 12px', background:'var(--card2)', borderRadius:10, display:'flex', flexWrap:'wrap', alignItems:'center', gap:6, fontSize:12}}>
            <span style={{fontWeight:600, color:'var(--accent)'}}>IF</span>
            <select value={r.field} onChange={e=>updRule(i,{ field:e.target.value, op: e.target.value==='duration'?'gt':'eq', value: e.target.value==='duration'?'8':'cinematic' })} style={{width:'auto', padding:'4px 8px'}}>
              <option value="sceneType">scene type</option>
              <option value="duration">scene duration (s)</option>
            </select>
            {r.field === 'sceneType' ? (
              <>
                <span style={{color:'var(--muted)'}}>is</span>
                <select value={r.value} onChange={e=>updRule(i,{ value:e.target.value })} style={{width:'auto', padding:'4px 8px'}}>
                  <option value="cinematic">cinematic</option>
                  <option value="talking-head">talking-head</option>
                </select>
              </>
            ) : (
              <>
                <select value={r.op} onChange={e=>updRule(i,{ op:e.target.value })} style={{width:'auto', padding:'4px 8px'}}>
                  <option value="gt">&gt;</option><option value="lt">&lt;</option><option value="eq">=</option>
                </select>
                <input type="number" value={r.value} onChange={e=>updRule(i,{ value:e.target.value })} style={{width:64, padding:'4px 8px'}} />
              </>
            )}
            <span style={{fontWeight:600, color:'var(--accent)'}}>THEN</span>
            <span style={{color:'var(--muted)'}}>use</span>
            <select value={r.then} onChange={e=>updRule(i,{ then:e.target.value })} style={{width:'auto', padding:'4px 8px'}}>
              {cinematicProviders.map(P => <option key={P.id} value={P.id}>{P.name}</option>)}
            </select>
            <button onClick={()=>delRule(i)} style={{marginLeft:'auto', border:'none', background:'transparent', color:'var(--danger)', cursor:'pointer', fontSize:14}}>×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function SettingsPage() {
  const { state, dispatch } = useStore();
  const s = state.settings;
  const set = (patch) => dispatch({ type:'SET_SETTINGS', patch });
  const [showKeys, setShowKeys] = useState(false);
  const [avatars, setAvatars] = useState(null);
  const [voices, setVoices] = useState(null);
  const [fetching, setFetching] = useState('');
  const [fetchErr, setFetchErr] = useState('');
  const [testing, setTesting] = useState(false);
  const [testUrl, setTestUrl] = useState('');
  const [testText, setTestText] = useState("Hi, this is a quick voice test. The numbers are twelve thousand five hundred and seventy.");
  const [testErr, setTestErr] = useState('');

  const fetchAvatars = async () => {
    setFetching('avatars'); setFetchErr('');
    try { setAvatars(await heygenListAvatars({ apiKey: s.heygenKey, settings: s })); }
    catch (e) { setFetchErr(e.message); }
    finally { setFetching(''); }
  };
  const fetchVoices = async () => {
    setFetching('voices'); setFetchErr('');
    try { setVoices(await heygenListVoices({ apiKey: s.heygenKey, settings: s })); }
    catch (e) { setFetchErr(e.message); }
    finally { setFetching(''); }
  };

  const testVoice = async () => {
    setTesting(true); setTestErr(''); setTestUrl('');
    try {
      const id = await heygenGenerate({
        apiKey: s.heygenKey, avatarId: s.heygenAvatarId, voiceId: s.heygenVoiceId,
        scriptText: testText, aspect:'9:16', speed: 1.0, pitch: 0, settings: s,
      });
      // Poll until complete
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 5000));
        const r = await heygenStatus({ apiKey: s.heygenKey, videoId: id, settings: s });
        if (r.status === 'completed' && r.video_url) { setTestUrl(r.video_url); break; }
        if (r.status === 'failed') throw new Error(r.error?.message || 'render failed');
      }
    } catch (e) { setTestErr(e.message); }
    finally { setTesting(false); }
  };

  const exportData = () => download('fincast-backup.json', JSON.stringify(state, null, 2), 'application/json');
  const importData = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!parsed.settings || !Array.isArray(parsed.videos)) throw new Error('bad shape');
        if (confirm('Replace all current data with imported file?')) dispatch({ type:'IMPORT', state: parsed });
      } catch (err) { alert('Invalid backup: ' + err.message); }
    };
    r.readAsText(file);
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Settings</div>
          <div className="page-sub">Keys live in your browser only. Never sent to any server we control.</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowKeys(v=>!v)}>{showKeys?'Hide':'Show'} keys</button>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">API Keys</div>
        <div className="alert alert-warn" style={{marginBottom:14}}>
          These stay in <code>localStorage</code> on this device. Don't share screenshots that include them. To reset: clear site data.
        </div>
        <div className="grid2">
          <div>
            <label className="label">Anthropic API key (Claude)</label>
            <input type={showKeys?'text':'password'} value={s.anthropicKey} onChange={e=>set({ anthropicKey:e.target.value })} placeholder="sk-ant-..." />
            <div className="help">Get from console.anthropic.com → API Keys.</div>
          </div>
          <div>
            <label className="label">HeyGen API key</label>
            <input type={showKeys?'text':'password'} value={s.heygenKey} onChange={e=>set({ heygenKey:e.target.value })} placeholder="..." />
            <div className="help">HeyGen → Settings → Subscriptions → API → Create API Token.</div>
          </div>
          <div>
            <label className="label">HeyGen Avatar ID</label>
            <div style={{display:'flex',gap:6}}>
              <input value={s.heygenAvatarId} onChange={e=>set({ heygenAvatarId:e.target.value })} placeholder="e.g. Daisy_avatar_v2_..." />
              <button className="btn btn-ghost btn-sm" style={{flexShrink:0}} onClick={fetchAvatars} disabled={!s.heygenKey || fetching==='avatars'}>
                {fetching==='avatars'?<span className="spin"></span>:'↻ Fetch'}
              </button>
            </div>
            {avatars && avatars.length > 0 && (
              <select style={{marginTop:6}} value={s.heygenAvatarId} onChange={e=>set({ heygenAvatarId:e.target.value })}>
                <option value="">— Pick an avatar ({avatars.length}) —</option>
                {avatars.map(a => <option key={a.id} value={a.id}>{a.name} ({a.kind}{a.gender?` · ${a.gender}`:''})</option>)}
              </select>
            )}
            <div className="help">Tap "Fetch" once HeyGen key is in. Picks from a dropdown.</div>
          </div>
          <div>
            <label className="label">HeyGen Voice ID</label>
            <div style={{display:'flex',gap:6}}>

              <button className="btn btn-ghost btn-sm" style={{flexShrink:0}} onClick={fetchVoices} disabled={!s.heygenKey || fetching==='voices'}>

          </div>
