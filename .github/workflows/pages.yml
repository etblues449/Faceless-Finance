name: Deploy to GitHub Pages

# Deploys ONLY the static front-end (index.html + the COI service worker +
# reference assets) from the single default branch. The Worker (worker/) and the
# automation pipeline (pipeline/) are deployed separately and must never be
# published to the public Pages site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp coi-serviceworker.js _site/
          if [ -d visual-references ]; then cp -r visual-references _site/; fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
