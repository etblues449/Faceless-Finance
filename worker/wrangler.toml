name = "fincast-worker"
main = "src/index.js"
compatibility_date = "2026-05-01"

# CORS allowlist — comma-separated origins. Leave blank to allow any.
# Locked-down example: "https://etblues449.github.io"
[vars]
ALLOWED_ORIGIN = ""
APP_ROOT_PATH = "/Faceless-Finance"
GH_OWNER = "etblues449"
GH_REPO = "Faceless-Finance"
GH_WORKFLOW = "faceless.yml"
GH_REF = "main"

# ── Generation secrets (Design A) ───────────────────────────────────────────
# The /proxy/* endpoint injects these server-side so the browser never holds a
# real generation key. Set the ones for the providers you use, then `wrangler
# deploy`. The 5 core providers (consolidated stack):
#   wrangler secret put ANTHROPIC_KEY      (Claude — script)
#   wrangler secret put GOOGLE_AI_KEY      (Google AI Studio — Veo 3)
#   wrangler secret put RUNWAY_KEY         (Runway Gen-4)
#   wrangler secret put ELEVENLABS_KEY     (voice)
#   wrangler secret put PEXELS_KEY         (B-roll)
# Dormant providers — set ONLY if you activate them:
#   wrangler secret put HEYGEN_KEY
#   wrangler secret put HEDRA_KEY
#   wrangler secret put HIGGSFIELD_KEY
#   wrangler secret put HIGGSFIELD_SECRET
#   wrangler secret put FAL_KEY
# A host with no secret set falls back to passthrough, so nothing hard-breaks.
# Verify what's set via GET / → "managed_hosts".
#
# STRONGLY RECOMMENDED once keys are injected: a shared proxy token so only your
# app can use the proxy (the key injection means anyone with the Worker URL could
# otherwise spend your keys). Pick any long random string and set it BOTH here and
# in the app (Settings → Proxy token):
#   wrangler secret put PROXY_TOKEN
# When set, /proxy/* requires it (via X-Proxy-Token header or ?__pt=). When unset,
# the proxy stays open (back-compat). Verify via GET / → "proxy_token_required".

# OPTIONAL: KV namespace for storing OAuth tokens (Phase 2 auto-publish only).
# The /proxy/* endpoint works WITHOUT this — only OAuth + /publish/* need it.
# To enable later: uncomment, run `wrangler kv namespace create fincast_tokens`,
# paste the returned ID here, then `wrangler deploy`.
#
# [[kv_namespaces]]
# binding = "TOKENS"
# id = ""

# OPTIONAL Secrets (only needed if using Phase 2 OAuth publishing). Set via:
#   wrangler secret put TIKTOK_CLIENT_KEY
#   wrangler secret put TIKTOK_CLIENT_SECRET
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put META_APP_ID
#   wrangler secret put META_APP_SECRET
#   wrangler secret put ENCRYPTION_KEY     (random 32+ char string)

# ── App control plane (the mobile app's /api/* endpoints) ────────────────────
# Lets the app trigger the GitHub Actions render and review the result.
# GH_OWNER/GH_REPO/GH_WORKFLOW can be plain vars; GH_TOKEN + INGEST_SECRET are secrets.
#
# Secrets to set:
#   wrangler secret put GH_TOKEN        (fine-grained PAT: Actions read+write on Faceless-Finance)
#   wrangler secret put INGEST_SECRET   (any long random string; also a GitHub repo Secret of the same name)
# Reuse the existing KV (TOKENS) for review storage — enable the [[kv_namespaces]] block above.
