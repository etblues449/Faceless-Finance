<title>Faceless Finance App — UK Tax Saving</title>

<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
  :root {
    /* Faceless Finance App design system — light (Stitch spec) */
    --bg:#FCF8FA; --surface:#F6F3F5; --card:#FFFFFF; --card2:#F1EDF0;
    --border:#E5E1E4; --border2:#C4C7C5;
    --accent:#059669; --accent-dim:rgba(5,150,105,.10); --accent-hover:#047857;
    --on-accent:#FFFFFF;
    --gold:#0F172A; --danger:#E11D48; --warn:#F59E0B; --info:#0EA5E9;
    --text:#0F172A; --text-dim:#334155; --muted:#64748B;
    --radius-card:12px; --radius-btn:8px; --radius-input:8px; --radius-modal:24px;
    --shadow:0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
    --shadow-modal:0 12px 40px rgba(15,23,42,0.18);
  }
  [data-theme="dark"] {
    /* Dark variant of the same palette — slate surface, emerald action */
    --bg:#0F172A; --surface:#1E293B; --card:#1A2436; --card2:#293548;
    --border:#334155; --border2:#475569;
    --accent:#10B981; --accent-dim:rgba(16,185,129,.14); --accent-hover:#34D399;
    --on-accent:#06281C;
    --gold:#E2E8F0; --danger:#FB7185; --warn:#FBBF24; --info:#38BDF8;
    --text:#F1F5F9; --text-dim:#CBD5E1; --muted:#94A3B8;
    --radius-card:12px; --radius-btn:8px; --radius-input:8px; --radius-modal:24px;
    --shadow:none;
    --shadow-modal:0 12px 40px rgba(0,0,0,0.5);
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body,#root { height:100%; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.5 Inter,"Inter","Google Sans Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  button { font:inherit; color:inherit; cursor:pointer; }
  input,textarea,select { font:inherit; color:inherit; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-input); padding:11px 14px; outline:none; width:100%; transition:border-color .15s,box-shadow .15s; }
  input:focus,textarea:focus,select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
  textarea { resize:vertical; min-height:90px; }
  a { color:var(--accent); }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:6px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--border2); }
  .app { display:flex; height:100vh; height:100dvh; }
  .side { width:230px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .brand { padding:22px 20px; border-bottom:1px solid var(--border); }
  .brand-name { font-size:17px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; line-height:1.25; }
  .brand-sub { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:.02em; }
  .nav { flex:1; padding:10px 0; overflow-y:auto; }
  .nav-item { display:flex; align-items:center; gap:10px; margin:2px 10px; padding:10px 14px; cursor:pointer; color:var(--text-dim); font-size:13px; border-radius:99px; transition:all .14s; user-select:none; }
  .nav-item:hover { color:var(--text); background:var(--card2); }
  .nav-item.active { color:var(--accent); background:var(--accent-dim); font-weight:600; }
  .nav-icon { width:18px; text-align:center; opacity:.85; }
  .side-foot { padding:14px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); }
  .main { flex:1; overflow-y:auto; padding:24px 28px; }
  .main > * { max-width:760px; margin-left:auto; margin-right:auto; }
  .page-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; gap:16px; }
  .page-title { font-size:22px; font-weight:700; }
  .page-sub { font-size:13px; color:var(--muted); margin-top:3px; }
  .row { display:flex; gap:12px; }
  .col { flex:1; min-width:0; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-card); padding:20px; box-shadow:var(--shadow); }
  .card-title { font-size:12px; font-weight:600; color:var(--text-dim); letter-spacing:.04em; margin-bottom:14px; }
  .label { font-size:12px; color:var(--text-dim); margin-bottom:7px; display:block; font-weight:500; }
  .help { font-size:11px; color:var(--muted); margin-top:6px; line-height:1.45; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border-radius:var(--radius-btn); border:none; background:var(--accent); color:var(--on-accent); font-weight:600; font-size:13px; transition:all .14s; }
  .btn:hover:not(:disabled) { background:var(--accent-hover); box-shadow:0 2px 8px var(--accent-dim); }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .btn-ghost { background:transparent; color:var(--text-dim); border:1px solid var(--border2); box-shadow:none; }
  .btn-ghost:hover:not(:disabled) { background:var(--card2); color:var(--text); box-shadow:none; }
  .btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); box-shadow:none; }
  .btn-outline:hover:not(:disabled) { background:var(--accent-dim); box-shadow:none; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger:hover:not(:disabled) { background:var(--danger); filter:brightness(1.1); }
  .btn-sm { padding:6px 14px; font-size:12px; }
  .badge { display:inline-block; padding:4px 10px; border-radius:8px; font-size:10px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; background:var(--card2); color:var(--text-dim); }
  .badge-idea { background:rgba(100,116,139,.14); color:var(--muted); }
  .badge-script { background:rgba(14,165,233,.12); color:var(--info); }
  .badge-render { background:rgba(245,158,11,.16); color:var(--warn); }
  .badge-approval { background:var(--accent-dim); color:var(--accent); }
  .badge-approved { background:rgba(5,150,105,.18); color:var(--accent); }
  .badge-published { background:rgba(5,150,105,.28); color:var(--accent); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:4px 12px; border-radius:99px; font-size:11px; background:var(--card2); color:var(--text-dim); }
  .empty { padding:32px 16px; text-align:center; color:var(--muted); font-size:13px; border:1px dashed var(--border2); border-radius:var(--radius-card); }
  .alert { padding:13px 16px; border-radius:12px; font-size:12px; line-height:1.5; }
  .alert-warn { background:rgba(245,158,11,.10); border:1px solid rgba(245,158,11,.30); color:var(--warn); }
  .alert-err { background:rgba(225,29,72,.07); border:1px solid rgba(225,29,72,.25); color:var(--danger); }
  .alert-ok { background:var(--accent-dim); border:1px solid rgba(5,150,105,.30); color:var(--accent); }
  [data-theme="dark"] .alert-warn { background:rgba(251,191,36,.12); border-color:rgba(251,191,36,.3); }
  [data-theme="dark"] .alert-err { background:rgba(251,113,133,.10); border-color:rgba(251,113,133,.3); }
  [data-theme="dark"] .alert-ok { border-color:rgba(16,185,129,.3); }
  .stage-col { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card); padding:12px; min-height:60px; }
  .stage-col-h { font-size:11px; font-weight:700; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase; padding:4px 6px 10px; display:flex; justify-content:space-between; align-items:center; }
  .vcard { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .12s,box-shadow .12s; }
  .vcard:hover { border-color:var(--accent); box-shadow:0 2px 8px var(--accent-dim); }
  .vcard-title { font-size:13px; font-weight:500; line-height:1.35; margin-bottom:6px; }
  .vcard-meta { display:flex; gap:6px; flex-wrap:wrap; font-size:10px; color:var(--muted); }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:50; padding:24px; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-modal); max-width:720px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-modal); }
  .modal-h { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .modal-b { padding:22px; }
  .modal-f { padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
  .seg { display:inline-flex; background:var(--surface); border:1px solid var(--border); border-radius:99px; padding:3px; gap:2px; }
  .seg-btn { padding:7px 14px; border:none; background:transparent; color:var(--text-dim); border-radius:99px; font-size:12px; }
  .seg-btn.active { background:var(--accent-dim); color:var(--accent); font-weight:600; }
  .kbd { display:inline-block; font-family:monospace; font-size:11px; padding:2px 7px; border-radius:6px; background:var(--card2); color:var(--text-dim); border:1px solid var(--border); }
  .preview-vid { width:100%; max-height:540px; background:#000; border-radius:12px; }
  .platform-card { border:1px solid var(--border); border-radius:14px; padding:16px; background:var(--card); }
  .platform-card.tiktok { border-left:3px solid #FE2C55; }
  .platform-card.reels { border-left:3px solid #E4405F; }
  .platform-card.shorts { border-left:3px solid #FF0000; }
  .platform-card.long { border-left:3px solid #aaa; }
  .platform-h { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .platform-name { font-weight:700; font-size:13px; }
  .char-count { font-size:11px; color:var(--muted); font-family:monospace; }
  .char-count.over { color:var(--danger); }
  .slider { -webkit-appearance:none; width:100%; height:4px; background:var(--border); border-radius:2px; outline:none; padding:0; }
  .slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; }
  .slider::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; border:none; }
  .key-status { display:inline-flex; align-items:center; gap:4px; font-size:11px; }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
  .dot.ok { background:var(--accent); }
  .dot.bad { background:var(--danger); }
  .step-dots { display:flex; gap:6px; margin-bottom:18px; }
  .step-dot { flex:1; height:3px; border-radius:2px; background:var(--border); }
  .step-dot.done { background:var(--accent); }
  .step-dot.active { background:var(--accent); box-shadow:0 0 0 2px var(--accent-dim); }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid var(--accent); border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; vertical-align:-2px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .copy-tip { font-size:10px; color:var(--accent); margin-left:6px; opacity:0; transition:opacity .2s; }
  .copy-tip.show { opacity:1; }
  details { margin-top:8px; }
  summary { cursor:pointer; font-size:12px; color:var(--text-dim); user-select:none; }
  summary:hover { color:var(--text); }
  pre.script-text { font:13px/1.7 -apple-system,Inter,sans-serif; white-space:pre-wrap; margin:0; color:var(--text-dim); }
  /* === Mobile (cover screen, narrow phones) === */
  @media (max-width: 768px) {
    body { font-size:14px; }
    .app { flex-direction:column-reverse; }
    .side { width:100%; height:auto; min-height:62px; flex-direction:row; border-right:none; border-top:1px solid var(--border); padding:0; flex-shrink:0; }
    .brand, .side-foot { display:none; }
    .nav { display:flex; flex-direction:row; padding:0; flex:1; overflow:hidden; }
    .nav-item { flex:1 1 0; min-width:0; margin:0; border-radius:0; flex-direction:column; padding:7px 1px; border-left:none; border-top:3px solid transparent; gap:2px; font-size:9px; line-height:1.1; text-align:center; justify-content:center; align-items:center; overflow:hidden; }
    .nav-item .nav-label { flex:none !important; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .nav-item.active { border-left:none; border-top-color:var(--accent); background:var(--accent-dim); }
    .nav-item .pill { display:none; }
    .nav-icon { font-size:17px; }
    .main { padding:16px 14px 24px; }
    .page-head { flex-direction:column; gap:10px; }
    .page-title { font-size:20px; }
    .grid2, .grid3 { grid-template-columns:1fr; }
    .pipeline-grid { grid-template-columns:none !important; grid-auto-flow:column; grid-auto-columns:78vw; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:8px; }
    .pipeline-grid > * { scroll-snap-align:start; }
    .calendar-grid { grid-template-columns:none !important; grid-auto-flow:column; grid-auto-columns:60vw; overflow-x:auto; }
    .modal { max-width:100%; max-height:100vh; border-radius:0; }
    .seg { flex-wrap:wrap; }
    .platform-card .row { flex-direction:column; }
  }
  /* === Tablet / Fold inner screen unfolded (769–1100px) === */
  @media (min-width: 769px) and (max-width: 1100px) {
    .side { width: 200px; }
    .main { padding: 20px 22px; }
    .grid3 { grid-template-columns: repeat(2, 1fr); }
    .pipeline-grid { grid-template-columns: repeat(3, minmax(220px, 1fr)) !important; overflow-x: auto; }
    .calendar-grid { grid-template-columns: repeat(7, minmax(110px, 1fr)) !important; overflow-x: auto; }
    .modal { max-width: 640px; }
  }
  /* Touch devices: bigger tap targets */
  @media (pointer: coarse) {
    .nav-item { min-height: 48px; }
    .btn { min-height: 40px; }
    .btn-sm { min-height: 34px; }
    input, textarea, select { min-height: 40px; padding: 10px 12px; }
    .vcard { padding: 12px 14px; }
    .seg-btn { padding: 8px 14px; min-height: 36px; }
  }
  /* === Foldable: when device reports two viewport segments (Fold open), keep modal off the hinge === */
  @media (horizontal-viewport-segments: 2) {
    .modal { max-width: calc(env(viewport-segment-right 0 0) - env(viewport-segment-left 1 0) - 32px); margin-right: calc(100vw - env(viewport-segment-right 0 0) + 16px); }
  }
  /* iOS safe-area for standalone app mode */
  @supports (padding: max(0px)) {
    .side { padding-bottom: max(0px, env(safe-area-inset-bottom)); }
    .main { padding-top: max(16px, env(safe-area-inset-top)); }
  }
</style>

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { settings:{...DEFAULT_SETTINGS}, videos:[] };
    const parsed = JSON.parse(raw);
    return {
      settings: { ...DEFAULT_SETTINGS, ...(parsed.settings||{}) },
      videos: parsed.videos || [],
    };
  } catch (e) {
    console.warn('State load failed', e);
    return { settings:{...DEFAULT_SETTINGS}, videos:[] };
  }
}
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.warn(e); } }

function reducer(state, action) {
  switch (action.type) {
    case 'SET_SETTINGS': return { ...state, settings:{...state.settings, ...action.patch} };
    case 'CREATE_VIDEO': return { ...state, videos:[action.video, ...state.videos] };
    case 'UPDATE_VIDEO': return { ...state, videos: state.videos.map(v => v.id===action.id ? {...v, ...action.patch, updatedAt:Date.now()} : v) };
    case 'DELETE_VIDEO': return { ...state, videos: state.videos.filter(v => v.id !== action.id) };
    case 'IMPORT': return action.state;
    default: return state;
  }
}

async function callClaude({ apiKey, model='claude-sonnet-4-6', system, user, maxTokens=2400, settings = {} }) {
  if (!apiKey) throw new Error('Missing Anthropic API key. Add it in Settings.');
  const r = await fetch(proxiedUrl('https://api.anthropic.com/v1/messages', settings), {
    method:'POST',
    headers: {
      'content-type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify({
      model, max_tokens: maxTokens,
      system,
      messages:[{ role:'user', content: user }],
    }),
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`Claude API ${r.status}: ${t.slice(0,300)}`);
  }
  const data = await r.json();
  return data.content?.[0]?.text || '';
}

async function heygenGenerate({ apiKey, avatarId, voiceId, scriptText, aspect='9:16', speed=1.0, pitch=0, settings = {} }) {
  if (!apiKey) throw new Error('Missing HeyGen API key. Add it in Settings.');
  if (!avatarId || !voiceId) throw new Error('Missing HeyGen avatar or voice ID. Add them in Settings.');
  const dim = aspect==='16:9' ? { width:1920, height:1080 } : { width:1080, height:1920 };
  const voice = { type:'text', input_text: scriptText, voice_id: voiceId, speed };
  if (pitch && Number(pitch) !== 0) voice.pitch = Number(pitch);
  const body = {
    video_inputs: [{
      character: { type:'avatar', avatar_id: avatarId, avatar_style:'normal' },
      voice,
    }],
    dimension: dim,
    test: false,
  };
  const r = await fetch(proxiedUrl('https://api.heygen.com/v2/video/generate', settings), {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-api-key': apiKey },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`HeyGen ${r.status}: ${t.slice(0,300)}`);
  }
  const data = await r.json();
  if (data.error) throw new Error(`HeyGen error: ${JSON.stringify(data.error)}`);
  return data.data?.video_id;
}

async function pexelsSearch({ apiKey, query, perPage=8, settings = {} }) {
  if (!apiKey) return { videos: [] };
  // Pexels orientation: we used to force 'portrait' which biased every stock
  // clip toward face-centric framing — wrong for a cinematic walking-around
  // channel. Drop the filter; let Pexels return the highest-quality match in
  // any orientation. Vertical-crop happens at render time via the avatar
  // composition / ffmpeg pass.
  const r = await fetch(proxiedUrl(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=${perPage}`, settings), {

// ============================================================================
// PHASE 3 — STORYBOARD SCHEMA + VIDEO PROVIDER ABSTRACTION
// ============================================================================
//
// A Storyboard is the provider-agnostic source of truth for a video. Any
// provider (HeyGen, Hedra, Veo, Sora, Runway, future) can render it.
//
// Storyboard {
//   version: 2,
//   title, hook,
//   scenes: [
//     {
//       id, dialogue, durationSec,
//       type: 'talking-head' | 'cinematic',
//       visualPrompt,           // text prompt for cinematic; background hint for talking-head
//       brollKeywords: [str],
//       avatarPosition?: 'left'|'center'|'right',
//       avatarScale?: 'close'|'medium'|'wide',
//       textOverlay?,
//       transition?: 'cut'|'fade'|'slide',
//       providerOverride?,      // force a specific provider for this scene
//     }
//   ],
//   captions, hashtags, broll,
//   totalDurationSec
// }

const STORYBOARD_VERSION = 2;

// Build a storyboard from a flat script (backward-compat for old videos).
function migrateScriptToStoryboard(scriptObj) {
  if (!scriptObj) return null;
  if (scriptObj.scenes && Array.isArray(scriptObj.scenes)) return scriptObj; // already a storyboard
  const fullText = scriptObj.script || scriptObj.text || '';
  // Split on em-dashes/double-line-breaks/full stops at scene-like boundaries
  const sentences = fullText.split(/(?<=[.!?])\s+/).filter(s => s.trim());
  const sceneCount = Math.max(1, Math.min(6, Math.ceil(sentences.length / 3)));
  const perScene = Math.ceil(sentences.length / sceneCount);
  const scenes = [];
  for (let i = 0; i < sceneCount; i++) {
    const dialogue = sentences.slice(i * perScene, (i + 1) * perScene).join(' ').trim();
    if (!dialogue) continue;
    const wpm = 150;
    const wordCount = dialogue.split(/\s+/).length;
    scenes.push({
      id: 'scene_' + i,
      dialogue,
      durationSec: Math.round((wordCount / wpm) * 60),
      // Cinematic-only channel — even the legacy flat-script migration path
      // defaults to cinematic so a Claude regression doesn't silently produce
      // a talking-head video.
      type: 'cinematic',
      visualPrompt: '',
      brollKeywords: scriptObj.broll?.[i] ? [scriptObj.broll[i]] : [],
      avatarPosition: 'center',
      avatarScale: 'medium',
      textOverlay: '',
      transition: 'cut',
    });
  }
  return {
    version: STORYBOARD_VERSION,
    title: scriptObj.title || '',
    hook: scriptObj.hook || '',
    scenes,
    captions: scriptObj.captions || {},
    hashtags: scriptObj.hashtags || {},
    broll: scriptObj.broll || [],
    totalDurationSec: scenes.reduce((s, sc) => s + sc.durationSec, 0),
  };
}

function storyboardToFlatScript(storyboard) {
  if (!storyboard?.scenes) return '';
  // Filter out scenes where the dialogue looks like a visual prompt
  // (cinematic-only scenes can have empty dialogue, or dialogue that
  // duplicates the visualPrompt — only include real spoken lines).
  return storyboard.scenes
    .filter(s => {
      const d = (s.dialogue || '').trim();
      if (!d) return false;
      // Heuristic: if dialogue starts with "A close-up", "A wide shot",
      // "Camera tracks", etc., it's a visual direction not voiceover
      const visualMarkers = /^(a (close[\- ]up|wide|medium|tight|low|high|tracking|aerial|drone|dolly|slow|fast)|camera (tracks|pans|zooms|pushes)|cut to|fade (to|from)|close[\- ]up of|wide shot of|tracking shot|cinematic shot|interior|exterior|setting:|scene:)\b/i;
      return !visualMarkers.test(d);
    })
    .map(s => s.dialogue.trim())
    .join('\n\n');
}

// ============================================================================
// IN-APP DEBUG LOG — captures every provider request/response
// ============================================================================
const __debugLog = [];
const MAX_DEBUG_ENTRIES = 100;
function logEvent(provider, action, detail) {
  const entry = { ts: Date.now(), provider, action, detail: typeof detail === 'string' ? detail : JSON.stringify(detail).slice(0, 600) };
  __debugLog.unshift(entry);
  if (__debugLog.length > MAX_DEBUG_ENTRIES) __debugLog.length = MAX_DEBUG_ENTRIES;
  // Also log to browser console for desktop devtools
  console.log(`[${provider}] ${action}:`, detail);
}
function getDebugLog() { return [...__debugLog]; }
function clearDebugLog() { __debugLog.length = 0; }
window.__fincastDebugLog = getDebugLog; // allow `window.__fincastDebugLog()` from console

// Wrapped fetch that logs every request, every response, every error.
// All provider code should use this instead of raw fetch.
//
// Resilience: GET requests (polls, downloads — all idempotent) are retried
// once on a network-level failure ("Failed to fetch"), which on Chrome is
// almost always a stale HTTP/2 socket from the connection pool. POSTs are
// NOT retried (could double-submit / double-charge).
async function loggedFetch(provider, url, opts = {}) {
  const method = (opts.method || 'GET').toUpperCase();
  const isIdempotent = method === 'GET' || method === 'HEAD';
  const attempt = async (retrying) => {
    const startedAt = Date.now();
    if (!retrying) logEvent(provider, 'request', { url, method });
    else logEvent(provider, 'request_retry', { url, method });
    try {
      const r = await fetch(url, retrying ? { ...opts, cache: 'no-store' } : opts);
      const durationMs = Date.now() - startedAt;
      if (!r.ok) {
        const text = await r.text().catch(() => '');
        logEvent(provider, 'response_error', { url, status: r.status, body: text.slice(0, 400), durationMs });
        throw new Error(`${provider} ${r.status} (${durationMs}ms): ${text.slice(0, 300)}`);
      }
      logEvent(provider, 'response_ok', { url, status: r.status, durationMs, retried: !!retrying });
      return r;
    } catch (e) {
      const durationMs = Date.now() - startedAt;
      // HTTP-status errors carry the provider name in the message — re-throw as-is.
      if (e.message?.includes(provider)) throw e;
      // Network-level failure. Retry once for idempotent requests.
      if (isIdempotent && !retrying) {
        logEvent(provider, 'fetch_retry_scheduled', { url, error: e.message, durationMs });
        await new Promise(r => setTimeout(r, 700));
        return attempt(true);
      }
      logEvent(provider, 'fetch_error', { url, error: e.message, durationMs, hint: 'Network/CORS/DNS. Worker proxy or upstream unreachable.' });
      throw new Error(`${provider} fetch failed (${durationMs}ms): ${e.message}. URL: ${url}.`);
    }
  };
  return attempt(false);
}

// True when a thrown error looks like a transient network blip (stale socket,
// DNS hiccup, timeout) rather than a real provider error. Used by pollJob()s
// so a momentary "Failed to fetch" doesn't permanently kill a scene that's
// still rendering upstream.
function isTransientFetchError(msg) {
  return /fetch failed \(|failed to fetch|networkerror|load failed|timeout|err_network|err_connection|connection reset/i.test(String(msg || ''));
}

// Build Hedra auth headers from settings — tries Bearer or x-api-key per user pref.
function hedraAuthHeaders(settings, contentType = 'application/json') {
  const h = {};
  if (settings.hedraAuthScheme === 'bearer') {
    h['Authorization'] = `Bearer ${settings.hedraKey}`;
  } else {
    h['X-API-Key'] = settings.hedraKey;
  }
  if (contentType) h['content-type'] = contentType;
  return h;
}

function hedraUrl(settings, path) {
  const base = (settings.hedraBaseUrl || 'https://api.hedra.com/web-app/public').replace(/\/+$/, '');
  const fullUrl = `${base}${path.startsWith('/') ? '' : '/'}${path}`;
  return proxiedUrl(fullUrl, settings);
}

// Routes any provider URL through the Faceless Finance Worker if configured.
// Worker provides CORS-busting + multipart-friendly proxy for any provider.
// Pattern: workerUrl + "/proxy/" + host + path
//   in:  https://api.hedra.com/web-app/public/generations
//   out: https://my-worker.workers.dev/proxy/api.hedra.com/web-app/public/generations
// If no workerUrl set, returns original URL (browser-direct call — works for Anthropic/Pexels but
// NOT Hedra/ElevenLabs/HeyGen which have CORS allowlists).
function proxiedUrl(originalUrl, settings) {
  const worker = (settings?.workerUrl || '').trim().replace(/\/+$/, '');
  if (!worker) return originalUrl;
  const u = new URL(originalUrl);
  return `${worker}/proxy/${u.host}${u.pathname}${u.search}`;
}

function storyboardDuration(storyboard) {
  if (!storyboard?.scenes) return 0;
  return storyboard.scenes.reduce((s, sc) => s + (sc.durationSec || 0), 0);
}

// ----------------------------------------------------------------------------
// VideoProvider — base interface every provider implements
// ----------------------------------------------------------------------------

class VideoProvider {
  static id = 'base';
  static name = 'Base';
  static caps = { talkingHead: false, cinematic: false, lipSync: false, characterRef: false, multiScene: false };

  // Returns { available: bool, missing: [strings] }
  static availability(settings) { return { available: false, missing: ['Override availability()'] }; }

  // Returns estimated GBP cost for the scenes assigned to this provider
  static estimateCost(scenes) { return 0; }

  // Kicks off a render. Returns { jobs: [{ jobId, sceneIds }] } — jobs may map to one scene or many
  static async startRender({ storyboard, scenes, settings, audioUrl, aspect }) {
    throw new Error('Override startRender()');
  }

  // Polls a job. Returns { status, videoUrl?, error?, progress? }
  static async pollJob({ jobId, settings }) { throw new Error('Override pollJob()'); }
}

// ----------------------------------------------------------------------------
// HeyGenProvider — wraps existing HeyGen logic
// ----------------------------------------------------------------------------

class HeyGenProvider extends VideoProvider {
  static id = 'heygen';
  static name = 'HeyGen';
  static caps = { talkingHead: true, cinematic: false, lipSync: true, characterRef: false, multiScene: true };

  static availability(s) {
    const missing = [];
    if (!s.heygenKey) missing.push('HeyGen API key');
    if (!s.heygenAvatarId) missing.push('HeyGen Avatar ID');
    if (!s.heygenVoiceId) missing.push('HeyGen Voice ID');
    return { available: missing.length === 0, missing };
  }

  // HeyGen ~$0.10–0.30/min depending on plan; we model £0.05/scene flat
  static estimateCost(scenes) { return Math.max(0.05, scenes.reduce((s, sc) => s + (sc.durationSec || 5) / 60 * 0.20, 0)); }

  static async startRender({ storyboard, scenes, settings, aspect }) {
    const { heygenKey, heygenAvatarId, heygenVoiceId } = settings;
    const dim = aspect === '16:9' ? { width: 1920, height: 1080 } : { width: 1080, height: 1920 };
    // HeyGen supports multi-scene via video_inputs[]. One entry per scene.
    const video_inputs = scenes.map(sc => ({
      character: {
        type: 'avatar',
        avatar_id: heygenAvatarId,
        avatar_style: sc.avatarScale === 'close' ? 'closeUp' : 'normal',
        scale: sc.avatarScale === 'wide' ? 0.7 : (sc.avatarScale === 'close' ? 1.2 : 1.0),
        offset: sc.avatarPosition === 'left' ? { x: -0.25, y: 0 } : sc.avatarPosition === 'right' ? { x: 0.25, y: 0 } : { x: 0, y: 0 },
      },
      voice: { type: 'text', input_text: sc.dialogue, voice_id: heygenVoiceId },
      ...(sc.textOverlay ? { caption: { text: sc.textOverlay } } : {}),
    }));
    const r = await fetch('https://api.heygen.com/v2/video/generate', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-api-key': heygenKey },
      body: JSON.stringify({ video_inputs, dimension: dim, test: false }),
    });
    if (!r.ok) throw new Error(`HeyGen ${r.status}: ${(await r.text()).slice(0, 300)}`);
    const data = await r.json();
    if (data.error) throw new Error(`HeyGen: ${JSON.stringify(data.error)}`);
    return { jobs: [{ jobId: data.data?.video_id, sceneIds: scenes.map(s => s.id), provider: 'heygen' }] };
  }

  static async pollJob({ jobId, settings }) {
    const r = await fetch(`https://api.heygen.com/v1/video_status.get?video_id=${encodeURIComponent(jobId)}`, {
      headers: { 'x-api-key': settings.heygenKey },
    });
    if (!r.ok) return { status: 'failed', error: `HeyGen status ${r.status}` };
    const d = (await r.json()).data || {};
    return { status: d.status, videoUrl: d.video_url, error: d.error?.message, progress: d.progress };
  }
}

// ----------------------------------------------------------------------------
// HedraActTwoProvider — talking-head via Hedra Act-Two (character image + audio)
// ----------------------------------------------------------------------------

class HedraActTwoProvider extends VideoProvider {
  static id = 'hedra_act_two';
  static name = 'Hedra Act-Two';
  static caps = { talkingHead: true, cinematic: false, lipSync: true, characterRef: true, multiScene: false };

  static availability(s) {
    const missing = [];
    if (!s.hedraKey) missing.push('Hedra API key');
    if (!s.hedraActTwoModelId) missing.push('Hedra Act-Two model ID (Settings → Fetch models)');
    if (!s.hedraStartKeyframeId && !s.hedraStartKeyframeUrl) missing.push('Hedra reference photo (URL or asset ID)');
    if (!s.elevenLabsKey || !s.elevenLabsVoiceId) missing.push('ElevenLabs voice (key + voice ID)');
    return { available: missing.length === 0, missing };
  }

  // Hedra Act-Two ~30 credits/sec at ~$0.001/credit ≈ $0.03/sec → £0.024/sec
  static estimateCost(scenes) { return scenes.reduce((s, sc) => s + (sc.durationSec || 5) * 0.024, 0); }

  static async startRender({ storyboard, scenes, settings, aspect = '9:16' }) {
    if (!settings.hedraActTwoModelId) {
      throw new Error('Hedra Act-Two model ID not set. Settings → Phase 3 → Hedra → tap "Fetch Hedra models" to populate.');
    }
    if (!settings.hedraStartKeyframeId && !settings.hedraStartKeyframeUrl) {
      throw new Error('Hedra needs a reference image. Set hedraStartKeyframeUrl (public photo URL) or hedraStartKeyframeId (uploaded asset ID) in Settings.');
    }
    const jobs = [];
    for (const sc of scenes) {
      // 1. ElevenLabs renders dialogue → audio Blob
      const audioBlob = await elevenLabsTTS({ settings,
        apiKey: settings.elevenLabsKey,
        voiceId: settings.elevenLabsVoiceId,
        text: sc.dialogue,
      });
      // 2. Upload audio to Hedra (two-step multipart per real API spec)
      const audioAssetId = await hedraUploadAudio(audioBlob, settings);
      // 3. Submit Act-Two generation (real API body shape)
      const body = {
        type: 'video',
        ai_model_id: settings.hedraActTwoModelId,
        audio_id: audioAssetId,
        generated_video_inputs: {
          text_prompt: sc.dialogue,
          resolution: '720p',
          aspect_ratio: aspect,
        },
      };
      if (settings.hedraStartKeyframeId) body.start_keyframe_id = settings.hedraStartKeyframeId;
      else body.start_keyframe_url = settings.hedraStartKeyframeUrl;
      const r = await loggedFetch('hedra-act-two', hedraUrl(settings, '/generations'), {
        method: 'POST',
        headers: hedraAuthHeaders(settings),
        body: JSON.stringify(body),
      });
      const d = await r.json();
      jobs.push({ jobId: d.id || d.generation_id, sceneIds: [sc.id], provider: 'hedra_act_two' });
    }
    return { jobs };
  }

  static async pollJob({ jobId, settings }) {
    // Retry once on transient 'Failed to fetch' — Chrome occasionally fails
    // a fetch when reusing a stale HTTP/2 connection to workers.dev. The
    // failure is fast (sub-10ms) and fully recoverable on the next attempt.
    let r;
    try {
      try {
        r = await loggedFetch('hedra-poll', hedraUrl(settings, `/generations/${jobId}/status`), {
          headers: hedraAuthHeaders(settings, null),
        });
      } catch (e) {
        if (!/Failed to fetch|fetch failed|network/i.test(e.message)) throw e;
        await new Promise(res => setTimeout(res, 800));
        r = await loggedFetch('hedra-poll', hedraUrl(settings, `/generations/${jobId}/status`), {
          headers: hedraAuthHeaders(settings, null),
          cache: 'no-store',
        });
      }
      const d = await r.json();
      // Always log the full response shape so users can see ground truth in the
      // debug panel when polling appears stuck.
      logEvent('hedra-poll', 'response_body', { jobId, body: d });
      // Permissive status map — covers every variant Hedra has used historically.
      // Any unrecognized value defaults to 'processing' so we never falsely
      // mark a job as completed/failed and never wedge it in an unmapped state.
      const RAW = String(d.status || '').toLowerCase();
      const map = {
        queued: 'pending', pending: 'pending', submitted: 'pending', in_queue: 'pending', waiting: 'pending',
        processing: 'processing', running: 'processing', in_progress: 'processing',
        finalizing: 'processing', encoding: 'processing', uploading: 'processing',
        complete: 'completed', completed: 'completed', done: 'completed', success: 'completed', succeeded: 'completed',
        error: 'failed', failed: 'failed', cancelled: 'failed', canceled: 'failed',
      };
      const status = map[RAW] || 'processing';
      // Look for a download URL under any common field name. Hedra has used
      // download_url, video_url, output_url at various points.
      const videoUrl = d.download_url || d.video_url || d.output_url || d.url;
      return {
        status,
        videoUrl,
        progress: d.progress ?? d.percent_complete,
        error: d.error_message || d.error || (RAW && !map[RAW] ? `Hedra returned unmapped status: ${RAW}` : ''),
        raw: d,
      };
    } catch (e) {
      logEvent('hedra-poll', 'pollJob_error', { jobId, error: e.message, transient: isTransientFetchError(e.message) });
      return isTransientFetchError(e.message) ? { status: 'processing' } : { status: 'failed', error: e.message };
    }
  }
}

// Builds the final cinematic prompt by prepending the Character Bible.
// Centralised so EVERY cinematic provider (Hedra, Veo, Sora, Runway) gets
// the same locked persona description — regardless of which one renders.
function applyCharacterBible(scene, settings) {
  let bible = (settings?.characterBible || '').trim();
  const scenePrompt = (scene.visualPrompt || scene.dialogue || '').trim();
  // Strip framing biases from the bible — these would otherwise leak into
  // every Runway clip as "selfie / talking-head" hints. Camera framing must
  // come from the per-scene visualPrompt, never from the persona description.
  if (bible) {
    bible = bible
      .replace(/photographed selfie[- ]style[^.]*\.?/gi, '')
      .replace(/selfie[- ]style[^.]*\.?/gi, '')
      .replace(/direct[- ]to[- ]camera[^.]*\.?/gi, '')
      .replace(/looking at (the )?camera[^.]*\.?/gi, '')
      .replace(/talking to (the )?camera[^.]*\.?/gi, '')
      .replace(/direct eye contact[^.]*\.?/gi, '')
      .replace(/eye contact with (the )?camera[^.]*\.?/gi, '')
      .replace(/looks? directly at (the lens|the camera|camera)[^.]*\.?/gi, '')
      .replace(/portrait[- ]style[^.]*\.?/gi, '')
      .replace(/head[- ]and[- ]shoulders[^.]*\.?/gi, '')
      .replace(/headshot[^.]*\.?/gi, '')
      .replace(/speaks? to (the )?camera[^.]*\.?/gi, '')
      .replace(/addresses? (the )?camera[^.]*\.?/gi, '')
      .replace(/centred[^.]*\.?/gi, '')
      .replace(/centered[^.]*\.?/gi, '')
      .replace(/\s{2,}/g, ' ')
      .trim();
  }
  const style = 'CINEMATIC SHOT — character shown in FULL ACTION in a real UK environment (walking, working, moving). Framing: wide, medium-tracking, follow shot, profile, or over-shoulder. NOT static talking-head. NOT direct-to-camera. NOT selfie. NOT head-and-shoulders close-up. NOT centred portrait. The camera observes the character DOING something — never staring at them from the front.';
  if (!bible) return `${style}\n\n${scenePrompt}`;
  return `Character (must match across every scene): ${bible}\n\n${style}\n\nScene: ${scenePrompt}`;
}

    }
    if (!settings.hedraStartKeyframeId && !settings.hedraStartKeyframeUrl) {

    }
    if (!settings.elevenLabsKey || !settings.elevenLabsVoiceId) {
      throw new Error('Hedra Character-2 requires audio input. Set ElevenLabs key + voice ID in Settings.');

      });

      const body = {
        type: 'video',
        ai_model_id: settings.hedraCharacter2ModelId,
        audio_id: audioAssetId,
        generated_video_inputs: {
          text_prompt: applyCharacterBible(sc, settings),
          resolution: '720p',
          aspect_ratio: aspect || '9:16',
          duration_ms: (sc.durationSec || 5) * 1000,
        },
      };

      });
      const d = await r.json();
      jobs.push({ jobId: d.id || d.generation_id, sceneIds: [sc.id], provider: 'hedra_character' });
    }
    return { jobs };
  }

  static async pollJob({ jobId, settings }) { return HedraActTwoProvider.pollJob({ jobId, settings }); }

// Veo 3 via Google AI Studio (Gemini API). Free tier covers ~50 req/day at
// 5 RPM — enough for ~8 videos/day. Endpoint:
//   POST generativelanguage.googleapis.com/v1beta/models/veo-3.0-generate-001:predictLongRunning?key=...
// returns { name: 'operations/...' }. Poll GET .../v1beta/{operationName}?key=...
// until { done: true }, then read response.generateVideoResponse.generatedSamples[0].video.uri
// (a downloadable file URI under generativelanguage.googleapis.com/v1beta/files/...).
class Veo3Provider extends VideoProvider {
  static id = 'veo3';
  static name = 'Google Veo 3';
  static caps = { talkingHead: true, cinematic: true, lipSync: false, characterRef: true, multiScene: true };
  static availability(s) {
    const missing = [];
    if (!s.googleAiKey) missing.push('Google AI Studio API key (free at aistudio.google.com)');
    return { available: missing.length === 0, missing };
  }
  // Free tier: cost zero up to daily quota. Estimate set low so it's never
  // capped out by costCapPerVideoGBP for the free tier.
  static estimateCost(scenes) { return scenes.length * 0.001; }

  static async startRender({ storyboard, scenes, settings, aspect = '9:16' }) {
    const jobs = [];
    const errors = [];
    // Veo 3 free tier is 5 RPM (one request per 12s). Throttle to stay under it.
    // Tier 1 paid is higher but still rate-limited per-key.
    const THROTTLE_MS = settings.veoThrottleMs ?? 12500;
    for (let i = 0; i < scenes.length; i++) {
      const sc = scenes[i];
      if (i > 0) {
        logEvent('veo3-submit', 'throttle_wait', { sceneId: sc.id, waitMs: THROTTLE_MS });
        await new Promise(r => setTimeout(r, THROTTLE_MS));
      }
      const prompt = applyCharacterBible(sc, settings);
      const url = proxiedUrl(
        `https://generativelanguage.googleapis.com/v1beta/models/veo-3.0-generate-001:predictLongRunning?key=${encodeURIComponent(settings.googleAiKey)}`,
        settings
      );
      const requestBody = {
        instances: [{ prompt }],
        parameters: { aspectRatio: aspect, sampleCount: 1 },
      };
      logEvent('veo3-submit', 'request_body', { sceneId: sc.id, body: requestBody });
      try {
        const r = await loggedFetch('veo3-submit', url, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(requestBody),
        });
        const d = await r.json();
        const opName = d.name || d.operation?.name;
        if (!opName) throw new Error(`Veo 3 returned no operation name. Response: ${JSON.stringify(d).slice(0, 300)}`);
        jobs.push({ jobId: opName, sceneIds: [sc.id], provider: 'veo3' });
      } catch (e) {
        errors.push({ sceneId: sc.id, error: e.message });
        // On rate limit, stop submitting more — keep what succeeded.
        if (/429|RESOURCE_EXHAUSTED|quota|rate.?limit/i.test(e.message)) {
          logEvent('veo3-submit', 'rate_limit_partial_success', { completed: jobs.length, skipped: scenes.length - i });
          break;
        }
      }
    }
    if (jobs.length === 0) throw new Error(`Veo 3 failed for every scene. First error: ${errors[0]?.error || 'unknown'}`);
    if (errors.length > 0) logEvent('veo3-submit', 'partial_success', { ok: jobs.length, failed: errors.length });
    return { jobs };
  }

  static async pollJob({ jobId, settings }) {
    try {
      const url = proxiedUrl(
        `https://generativelanguage.googleapis.com/v1beta/${jobId}?key=${encodeURIComponent(settings.googleAiKey)}`,
        settings
      );
      const r = await loggedFetch('veo3-poll', url, {});
      const d = await r.json();
      logEvent('veo3-poll', 'response_body', { jobId, body: d });
      if (!d.done) {
        const pct = d.metadata?.progressPercent ?? d.metadata?.state;
        return { status: 'processing', progress: pct };
      }
      if (d.error) return { status: 'failed', error: d.error.message || JSON.stringify(d.error) };
      const sample = d.response?.generateVideoResponse?.generatedSamples?.[0]
                  || d.response?.predictions?.[0]?.video
                  || d.response?.predictions?.[0];
      let videoUri = sample?.video?.uri || sample?.uri || sample?.videoUri;
      if (!videoUri) return { status: 'failed', error: `Veo response had no video URI. Body: ${JSON.stringify(d.response).slice(0, 300)}` };
      // Veo download URIs require the API key. Append it so <video src=...>
      // can load directly through the worker proxy.
      const sep = videoUri.includes('?') ? '&' : '?';
      videoUri = `${videoUri}${sep}key=${encodeURIComponent(settings.googleAiKey)}`;
      return { status: 'completed', videoUrl: proxiedUrl(videoUri, settings) };
    } catch (e) {
      logEvent('veo3-poll', 'pollJob_error', { jobId, error: e.message, transient: isTransientFetchError(e.message) });
      return isTransientFetchError(e.message) ? { status: 'processing' } : { status: 'failed', error: e.message };
    }
  }
}

// Higgsfield AI — DoP (Director of Photography) cinematic image-to-video
// Official REST API: https://platform.higgsfield.ai  (docs.higgsfield.ai)
// Auth: "Authorization: Key {api_key}:{api_key_secret}" — joined by colon.
// Model endpoints (set settings.higgsfieldModelSlug):
//   higgsfield/dop-lite/image-to-video      — cheapest, fastest
//   higgsfield/dop-standard/image-to-video  — recommended balance (default)
//   higgsfield/dop-turbo/image-to-video     — fastest with quality
// Required params: image_url (public URL), prompt
// Optional: duration, aspect_ratio, resolution
// Submit response: { request_id, status: "queued", status_url, cancel_url }
// Poll: GET /requests/{request_id}/status
//   → when completed: { status: "completed", video: { url: "https://..." } }
class HiggsfieldProvider extends VideoProvider {
  static id = 'higgsfield';
  static name = 'Higgsfield (DoP)';
  static caps = { talkingHead: false, cinematic: true, lipSync: false, characterRef: true, multiScene: true };
  static availability(s) {
    const missing = [];
    if (!s.higgsfieldKey) missing.push('Higgsfield API key (cloud.higgsfield.ai/api-keys)');
    if (!s.higgsfieldSecret) missing.push('Higgsfield API secret (cloud.higgsfield.ai/api-keys)');
    if (!s.higgsfieldImageUrl && !s.hedraStartKeyframeUrl) missing.push('Reference photo URL (Settings → Higgsfield → Photo URL, or Hedra → start_keyframe_url)');
    return { available: missing.length === 0, missing };
  }
  // Higgsfield credits: ~2–9 credits per video. $1 = 16 credits → ~$0.13–$0.56/video.
  // Basic plan $9/mo includes a monthly credit allowance.
  static estimateCost(scenes) { return scenes.reduce((s, sc) => s + 0.30, 0); }

  static _authHeader(settings) {
    return `Key ${settings.higgsfieldKey}:${settings.higgsfieldSecret}`;
  }

  static async startRender({ storyboard, scenes, settings, aspect = '9:16' }) {
    const imageUrl = settings.higgsfieldImageUrl || settings.hedraStartKeyframeUrl;
    if (!imageUrl) throw new Error('Higgsfield requires a reference photo URL. Set it in Settings → Higgsfield → Photo URL.');
    if (!settings.higgsfieldKey || !settings.higgsfieldSecret) throw new Error('Higgsfield API key and secret are both required. Get them from cloud.higgsfield.ai/api-keys.');

    const jobs = [];
    for (const sc of scenes) {
      const prompt = applyCharacterBible(sc, settings);
      const durationSec = Math.min(Math.max(Math.round(sc.durationSec || 5), 4), 15);
      const requestBody = {
        image_url: imageUrl,
        prompt,
        duration: durationSec,
        aspect_ratio: aspect,
        resolution: '720p',
      };
      const modelSlug = settings.higgsfieldModelSlug || 'higgsfield/dop-standard/image-to-video';
      logEvent('higgsfield-submit', 'request_body', { sceneId: sc.id, model: modelSlug, body: { ...requestBody, image_url: imageUrl.slice(0, 60) + '…' } });
      const r = await loggedFetch('higgsfield-submit',
        proxiedUrl(`https://platform.higgsfield.ai/${modelSlug}`, settings),
        {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'accept': 'application/json',
            'authorization': HiggsfieldProvider._authHeader(settings),
          },
          body: JSON.stringify(requestBody),
        }
      );
      const d = await r.json();
      logEvent('higgsfield-submit', 'response_body', { sceneId: sc.id, body: d });
      if (!r.ok || d.error) throw new Error(`Higgsfield: ${d.error?.message || d.message || JSON.stringify(d).slice(0, 200)}`);
      const jobId = d.request_id || d.id;
      if (!jobId) throw new Error(`Higgsfield returned no request_id. Response: ${JSON.stringify(d).slice(0, 300)}`);
      jobs.push({ jobId, sceneIds: [sc.id], provider: 'higgsfield' });
    }
    return { jobs };
  }

  static async pollJob({ jobId, settings }) {
    try {
      const r = await loggedFetch('higgsfield-poll',
        proxiedUrl(`https://platform.higgsfield.ai/requests/${jobId}/status`, settings),
        {
          headers: {
            'accept': 'application/json',
            'authorization': HiggsfieldProvider._authHeader(settings),
          },
        }
      );
      const d = await r.json();
      logEvent('higgsfield-poll', 'response_body', { jobId, body: d });
      const status = (d.status || '').toLowerCase();
      if (status === 'completed') {
        const videoUrl = d.video?.url || d.video_url || d.output?.url;
        if (!videoUrl) return { status: 'failed', error: `Higgsfield completed but no video URL. Body: ${JSON.stringify(d).slice(0, 300)}` };
        return { status: 'completed', videoUrl: proxiedUrl(videoUrl, settings) };
      }
      if (status === 'failed' || status === 'nsfw' || status === 'cancelled' || status === 'error') {
        return { status: 'failed', error: d.error?.message || d.message || `Higgsfield status: ${status}` };
      }
      // queued | in_progress → still processing
      return { status: 'processing', progress: d.progress ?? null };
    } catch (e) {
      logEvent('higgsfield-poll', 'error', { jobId, error: e.message, transient: isTransientFetchError(e.message) });
      return isTransientFetchError(e.message) ? { status: 'processing' } : { status: 'failed', error: e.message };
    }
  }
}
