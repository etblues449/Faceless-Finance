// Runway Gen-4 / Gen-4 Turbo — cinematic image-to-video, top-tier quality
// Official API: https://api.dev.runwayml.com/v1
// Auth: Authorization: Bearer {api_key}, X-Runway-Version: 2024-11-06
// POST /image_to_video → { id }
// GET  /tasks/{id}     → { status: PENDING|RUNNING|SUCCEEDED|FAILED|THROTTLED, output: [url] }
// Models: gen4_turbo (default, ~$0.25/sec), gen4 (~$0.40/sec), gen3a_turbo
// Aspect ratios: 720:1280 (9:16), 1280:720 (16:9), 960:960 (1:1)
// Durations: 5 or 10 seconds only.
class RunwayGen4Provider extends VideoProvider {
  static id = 'runway_gen4';
  static name = 'Runway Gen-4 Turbo';
  static caps = { talkingHead: false, cinematic: true, lipSync: false, characterRef: true, multiScene: true };
  static availability(s) {
    const missing = [];
    if (!s.runwayKey) missing.push('Runway API key (dev.runwayml.com → Profile → API Keys)');
    if (!s.runwayImageUrl && !s.hedraStartKeyframeUrl && !s.higgsfieldImageUrl) {
      missing.push('Reference photo URL (Runway is image-to-video)');
    }
    return { available: missing.length === 0, missing };
  }
  static estimateCost(scenes) {
    return scenes.reduce((sum, sc) => sum + ((sc.durationSec || 5) > 7 ? 10 : 5) * 0.25, 0);
  }

  static async _submitOneScene({ scene, imageUrl, settings, aspect, model }) {
    const ratio = aspect === '16:9' ? '1280:720' : aspect === '1:1' ? '960:960' : '720:1280';
    const prompt = applyCharacterBible(scene, settings);
    const runwayDuration = (scene.durationSec || 5) > 7 ? 10 : 5;
    const promptText = prompt.length > 950 ? prompt.slice(0, 950) + '…' : prompt;
    const requestBody = { promptImage: imageUrl, promptText, model, ratio, duration: runwayDuration };
    const imgPreview = imageUrl.startsWith('data:') ? `data:image/jpeg (chained, ${Math.round(imageUrl.length/1024)}KB)` : imageUrl.slice(0, 60) + '…';
    logEvent('runway-submit', 'request_body', { sceneId: scene.id, model, body: { ...requestBody, promptImage: imgPreview } });
    const r = await loggedFetch('runway-submit',
      proxiedUrl('https://api.dev.runwayml.com/v1/image_to_video', settings),
      {
        method: 'POST',
        headers: { 'content-type':'application/json', 'accept':'application/json', 'authorization': `Bearer ${settings.runwayKey}` },
        body: JSON.stringify(requestBody),
      }
    );
    const d = await r.json();
    logEvent('runway-submit', 'response_body', { sceneId: scene.id, body: d });
    if (!r.ok || d.error) throw new Error(`Runway: ${d.error || d.message || JSON.stringify(d).slice(0, 200)}`);
    const jobId = d.id;
    if (!jobId) throw new Error(`Runway returned no task id. Response: ${JSON.stringify(d).slice(0, 300)}`);
    return { jobId, sceneIds: [scene.id], provider: 'runway_gen4' };
  }

  static async startRender({ storyboard, scenes, settings, aspect = '9:16' }) {
    const imageUrl = settings.runwayImageUrl || settings.hedraStartKeyframeUrl || settings.higgsfieldImageUrl;
    if (!imageUrl) throw new Error('Runway requires a reference photo URL. Set it in Settings → Runway → Photo URL.');
    if (!settings.runwayKey) throw new Error('Runway API key required. Get one from dev.runwayml.com.');
    const model = settings.runwayModel || 'gen4_turbo';
    const chain = settings.runwayChainScenes !== false && scenes.length > 1;

    if (!chain) {
      // Original parallel-submit behaviour.
      const jobs = [];
      for (const sc of scenes) {
        jobs.push(await RunwayGen4Provider._submitOneScene({ scene: sc, imageUrl, settings, aspect, model }));
      }
      return { jobs };
    }

    // Chain mode: submit scene 1 now; queue 2..n as awaitingChain placeholders
    // that the App polling loop will submit one-by-one as each previous scene
    // completes, using its last frame as the new start image. End result: one
    // visually-continuous shot rather than N disconnected clips.
    logEvent('runway-submit', 'chain_mode_on', { sceneCount: scenes.length });
    const first = await RunwayGen4Provider._submitOneScene({ scene: scenes[0], imageUrl, settings, aspect, model });
    const jobs = [first];
    for (let i = 1; i < scenes.length; i++) {
      jobs.push({
        jobId: null,
        sceneIds: [scenes[i].id],
        provider: 'runway_gen4',
        status: 'awaitingChain',
        awaitingChain: true,
        chainAfterSceneId: scenes[i - 1].id,
        scene: scenes[i],           // full scene obj — needed for later prompt build
        aspect, model,              // captured at startRender time
      });
    }
    return { jobs };
  }

  static async pollJob({ jobId, settings }) {
    try {
      const r = await loggedFetch('runway-poll',
        proxiedUrl(`https://api.dev.runwayml.com/v1/tasks/${jobId}`, settings),
        {
          headers: {
            'accept': 'application/json',
            'authorization': `Bearer ${settings.runwayKey}`,
          },
        }
      );
      const d = await r.json();
      logEvent('runway-poll', 'response_body', { jobId, status: d.status, progress: d.progress });
      const status = (d.status || '').toUpperCase();
      if (status === 'SUCCEEDED') {
        const videoUrl = d.output?.[0];
        if (!videoUrl) return { status: 'failed', error: `Runway SUCCEEDED but no output URL: ${JSON.stringify(d).slice(0, 300)}` };
        // Runway's CloudFront CDN serves video with public CORS headers — no
        // need to route through our worker proxy (and the worker would reject
        // 'dnznrvs05pmza.cloudfront.net' anyway since it's not in the allowlist).
        return { status: 'completed', videoUrl };
      }
      if (status === 'FAILED' || status === 'CANCELLED') {
        return { status: 'failed', error: d.failure || d.failureCode || d.error || `Runway: ${status}` };
      }
      // PENDING | RUNNING | THROTTLED
      return { status: 'processing', progress: d.progress ?? null };
    } catch (e) {
      logEvent('runway-poll', 'error', { jobId, error: e.message, transient: isTransientFetchError(e.message) });
      return isTransientFetchError(e.message) ? { status: 'processing' } : { status: 'failed', error: e.message };
    }
  }
}

// LongCat-Video-Avatar — Meituan's open-source audio-driven character animation
// model, served via a public Hugging Face Space (default cpuai/LongCat-Video-Avatar
// on ZeroGPU). Genuinely unique capability: cinematic walking-around video with
// real lip-sync to your ElevenLabs PVC voice — the rest of the cinematic stack
// (Runway, Veo, Higgsfield) doesn't sync the mouth to your audio track.
//
// EXPERIMENTAL: HF Spaces are unsupported, rate-limited (queue waits 5-15 min on
// ZeroGPU), and the API schema isn't formally published — on first connect we
// call client.view_api() and log the actual signature so you can debug. If the
// predict() call below errors with "no endpoint" or "wrong arg count", check the
// 🐞 panel for the schema and tell me — fix is one line.
const __longcatJobs = new Map(); // jobId → { promise, resolved, videoUrl, error, sceneId }
let __longcatClientLoader = null;
async function loadGradioClient() {
  if (__longcatClientLoader) return __longcatClientLoader;
  __longcatClientLoader = (async () => {
    const mod = await import('https://cdn.jsdelivr.net/npm/@gradio/client/+esm');
    return mod.Client || mod.client || mod.default;
  })();
  return __longcatClientLoader;
}

class LongCatAvatarProvider extends VideoProvider {
  static id = 'longcat_avatar';
  static name = 'LongCat-Avatar (HF Space)';
  static caps = { talkingHead: true, cinematic: true, lipSync: true, characterRef: true, multiScene: true };
  static availability(s) {
    const missing = [];
    if (!s.longcatAvatarEnabled) missing.push('Enable LongCat-Avatar in Settings → Phase 3 (experimental)');
    if (!s.elevenLabsKey || !s.elevenLabsVoiceId) missing.push('ElevenLabs key + voice ID (for the lip-synced audio)');
    if (!s.runwayImageUrl && !s.hedraStartKeyframeUrl && !s.higgsfieldImageUrl) missing.push('Reference photo URL (any of the Runway / Hedra / Higgsfield photo fields)');
    return { available: missing.length === 0, missing };
  }
  // Free via HF ZeroGPU (rate-limited). Treat as £0 for cost-cap purposes.
  static estimateCost() { return 0; }

  static async _connect(settings) {
    const Client = await loadGradioClient();
    const spaceId = settings.longcatAvatarSpace || 'cpuai/LongCat-Video-Avatar';
    const opts = settings.longcatHfToken ? { hf_token: settings.longcatHfToken } : {};
    const client = await Client.connect(spaceId, opts);
    try {
      const api = await client.view_api();
      logEvent('longcat-avatar', 'api_schema', { spaceId, endpoints: Object.keys(api?.named_endpoints || {}), unnamed: Object.keys(api?.unnamed_endpoints || {}).slice(0,3) });
      // Log the full parameter spec of /run so we can confirm input order/types.
      const runSpec = api?.named_endpoints?.['/run'];
      if (runSpec) logEvent('longcat-avatar', 'run_params', { parameters: runSpec.parameters?.map(p => ({ name: p.parameter_name || p.label, type: p.type, component: p.component, hasDefault: p.parameter_has_default })), returns: runSpec.returns?.map(r => ({ label: r.label, type: r.type, component: r.component })) });
    } catch (e) { logEvent('longcat-avatar', 'view_api_failed', { error: e.message }); }
    return client;
  }

  static async _renderOneScene({ scene, settings }) {
    const refUrl = settings.runwayImageUrl || settings.hedraStartKeyframeUrl || settings.higgsfieldImageUrl;
    if (!refUrl) throw new Error('No reference photo URL set');

    // 1. Generate the voice track for this scene's dialogue.
    logEvent('longcat-avatar', 'tts_start', { sceneId: scene.id, chars: (scene.dialogue||'').length });
    const audioBlob = await elevenLabsTTS({
      settings, apiKey: settings.elevenLabsKey, voiceId: settings.elevenLabsVoiceId,
      text: scene.dialogue || scene.visualPrompt || 'speaking to camera',
    });

    // 2. Fetch the reference photo as a Blob so we can pass it to Gradio.
    const imgResp = await fetch(refUrl);
    if (!imgResp.ok) throw new Error(`Reference photo fetch failed: ${imgResp.status}`);
    const imgBlob = await imgResp.blob();

    // 3. Connect to the Space and call predict. The exact endpoint name and
    //    input order is read from view_api() above. We try the common shapes
    //    in order: positional [image, audio, text], then named-arg variant.
    const client = await LongCatAvatarProvider._connect(settings);
    const prompt = applyCharacterBible(scene, settings);
    const promptText = prompt.length > 800 ? prompt.slice(0, 800) + '…' : prompt;

    logEvent('longcat-avatar', 'predict_start', { sceneId: scene.id, audioKB: Math.round(audioBlob.size/1024), imgKB: Math.round(imgBlob.size/1024) });
    let result;
    // Confirmed signature from view_api:
    //   mode_v   (Radio: 'at2v' = audio→video, 'ai2v' = audio+image→video)
    //   audio_fp (Audio, required)
    //   prompt_v (Textbox)
    //   img_fp   (Image, required)
    //   seed_v / res_v / seg_v / idx_v / ... all have defaults
    // We use 'ai2v' so the reference photo locks the character identity.
    const namedArgs = {
      mode_v: 'ai2v',
      audio_fp: audioBlob,
      prompt_v: promptText,
      img_fp: imgBlob,
    };
    // Positional fallback in the correct slot order (if the JS client refuses
    // named args on this Gradio version, this matches the parameter order).
    const positional = ['ai2v', audioBlob, promptText, imgBlob];
    const attempts = [
      { endpoint: '/run',     args: namedArgs   },
      { endpoint: '/run',     args: positional  },
      { endpoint: '/predict', args: namedArgs   },
      { endpoint: 0,          args: positional  },
    ];
    let lastErr = null;
    for (const a of attempts) {
      try {
        result = await client.predict(a.endpoint, a.args);
        logEvent('longcat-avatar', 'predict_endpoint_ok', { sceneId: scene.id, endpoint: a.endpoint, argsForm: Array.isArray(a.args) ? 'positional' : 'named' });
        break;
      } catch (e) {
        lastErr = e;
        logEvent('longcat-avatar', 'predict_endpoint_failed', { sceneId: scene.id, endpoint: a.endpoint, argsForm: Array.isArray(a.args) ? 'positional' : 'named', error: (e.message || String(e)).slice(0, 400) });
      }
    }
    if (!result) throw new Error(`LongCat predict failed on all endpoints. Last: ${lastErr?.message}`);
    logEvent('longcat-avatar', 'predict_done', { sceneId: scene.id, dataType: typeof result?.data, sample: JSON.stringify(result?.data).slice(0,200) });
    // result.data is typically an array; the video is either a string URL, or
    // an object { url, path, orig_name } depending on Gradio version.
    const out = Array.isArray(result?.data) ? result.data[0] : result?.data;
    const videoUrl = (typeof out === 'string') ? out
      : out?.url || out?.video?.url || out?.path && (`https://${settings.longcatAvatarSpace || 'cpuai-LongCat-Video-Avatar'}.hf.space/file=${out.path}`)
      || null;
    if (!videoUrl) throw new Error(`LongCat returned no video URL. Body: ${JSON.stringify(result?.data).slice(0,300)}`);
    return videoUrl;
  }

  static async startRender({ storyboard, scenes, settings, aspect = '9:16' }) {
    const jobs = [];
    // Pre-flight: kick off scene 1 and race against a 5-second window. If it
    // errors fast (e.g. HF ZeroGPU rejects "GPU duration (900s) too large" —
    // policy on the cpuai Space, can't be fixed client-side), THROW so the
    // orchestrator falls through to Runway instead of returning unrunnable
    // jobs. If still pending after 5s, assume it's running and proceed.
    const firstScene = scenes[0];
    const firstJobId = `longcat-${firstScene.id}-${Date.now().toString(36)}`;
    const firstEntry = { resolved: false, videoUrl: null, error: null, sceneId: firstScene.id };
    firstEntry.promise = (async () => {
      try { firstEntry.videoUrl = await LongCatAvatarProvider._renderOneScene({ scene: firstScene, settings }); firstEntry.resolved = true; }
      catch (e) { firstEntry.error = e.message; firstEntry.resolved = true; }
    })();
    const PROBE_MS = 5000;
    const probeStart = Date.now();
    while (!firstEntry.resolved && (Date.now() - probeStart) < PROBE_MS) {
      await new Promise(r => setTimeout(r, 200));
    }
    if (firstEntry.resolved && firstEntry.error) {
      // Categorise the failure for clearer logs and to decide whether to
      // recommend disabling the provider entirely.
      const err = firstEntry.error;
      const isGpuBudget = /GPU duration|larger than the maximum|gpu_duration/i.test(err);
      const isAuth = /401|403|unauthor|hf_token|auth/i.test(err);
      const isQuota = /quota|429|rate limit/i.test(err);
      const hint = isGpuBudget
        ? 'This HF Space requests 900s of ZeroGPU per call, but standard HF tiers grant ≤480s. Disable LongCat-Avatar in Settings (Phase 3) until a fork with shorter GPU duration is hosted, or self-host.'
        : isAuth ? 'Auth issue — paste a valid HF token in Settings → LongCat card.'
        : isQuota ? 'HF rate limit hit — wait, or add an HF token.'
        : 'See debug log for full error. Disable LongCat in Settings to render via Runway instead.';
      logEvent('longcat-avatar', 'probe_failed_falling_through', { error: err, category: isGpuBudget ? 'gpu_budget' : isAuth ? 'auth' : isQuota ? 'quota' : 'other', hint });
      throw new Error(`LongCat probe failed (${isGpuBudget ? 'GPU budget' : isAuth ? 'auth' : isQuota ? 'quota' : 'unknown'}): ${err}. ${hint}`);
    }
    // First scene either succeeded fast or is still in-flight — commit to the
    // run, save the first job, kick off the rest.
    __longcatJobs.set(firstJobId, firstEntry);
    jobs.push({ jobId: firstJobId, sceneIds: [firstScene.id], provider: 'longcat_avatar' });
    for (let i = 1; i < scenes.length; i++) {
      const sc = scenes[i];
      const jobId = `longcat-${sc.id}-${Date.now().toString(36)}`;
      const entry = { resolved: false, videoUrl: null, error: null, sceneId: sc.id };
      entry.promise = (async () => {
        try { entry.videoUrl = await LongCatAvatarProvider._renderOneScene({ scene: sc, settings }); entry.resolved = true; }
        catch (e) { entry.error = e.message; entry.resolved = true; }
      })();
      __longcatJobs.set(jobId, entry);
      jobs.push({ jobId, sceneIds: [sc.id], provider: 'longcat_avatar' });
    }
    return { jobs };
  }

  static async pollJob({ jobId }) {
    const entry = __longcatJobs.get(jobId);
    if (!entry) return { status: 'failed', error: 'LongCat job not found (tab may have been reloaded — in-memory state lost)' };
    if (!entry.resolved) return { status: 'processing' };
    if (entry.error) return { status: 'failed', error: entry.error };
    if (entry.videoUrl) return { status: 'completed', videoUrl: entry.videoUrl };
    return { status: 'failed', error: 'LongCat returned no video URL' };
  }
}

// ----------------------------------------------------------------------------
// Provider Registry + Picker
// ----------------------------------------------------------------------------

const PROVIDERS = {
  heygen: HeyGenProvider,
  hedra_act_two: HedraActTwoProvider,
  hedra_character: HedraCharacterProvider,
  longcat_avatar: LongCatAvatarProvider,
  higgsfield: HiggsfieldProvider,
  fal_seedance2: FalSeedance2Provider,
  veo3: Veo3Provider,
  sora2: Sora2Provider,
  runway_gen4: RunwayGen4Provider,
};

function listProvidersFor(sceneType, settings) {
  const cap = sceneType === 'cinematic' ? 'cinematic' : 'talkingHead';
  return Object.values(PROVIDERS).filter(p => p.caps[cap]).map(p => ({
    P: p,
    id: p.id,
    name: p.name,
    available: p.availability(settings).available,
    missing: p.availability(settings).missing,
  }));
}

// Evaluate a single routing rule against a scene. Fields supported:
//   sceneType  (eq with 'cinematic'|'talking-head')
//   duration   (gt/lt/eq numeric, seconds)
function matchRoutingRule(rule, scene) {
  if (!rule || !rule.field || !rule.then) return false;
  const op = rule.op || 'eq';
  let lhs;
  if (rule.field === 'sceneType') lhs = scene.type || 'talking-head';
  else if (rule.field === 'duration') lhs = scene.durationSec || 5;
  else return false;
  const rhs = (rule.field === 'duration') ? Number(rule.value) : String(rule.value);
  if (op === 'eq') return String(lhs) === String(rhs);
  if (op === 'gt') return Number(lhs) > rhs;
  if (op === 'lt') return Number(lhs) < rhs;
  return false;
}

function pickProviderForScene(scene, settings) {
  // 1. Manual override on the scene
  if (scene.providerOverride && PROVIDERS[scene.providerOverride]) {
    const P = PROVIDERS[scene.providerOverride];
    if (P.availability(settings).available) return P;
  }
  // 1.5 Smart routing rules (Settings → Smart Fallback Rule Builder).
  // First matching rule wins, but only if the targeted provider is available;
  // otherwise we keep going so the normal fallback chain still works.
  for (const rule of (settings.routingRules || [])) {
    if (matchRoutingRule(rule, scene) && PROVIDERS[rule.then] && PROVIDERS[rule.then].availability(settings).available) {
      return PROVIDERS[rule.then];
    }
  }
  // 2. User's default for this scene type
  const defaultId = scene.type === 'cinematic'
    ? settings.defaultCinematicProvider
    : settings.defaultTalkingHeadProvider;
  if (defaultId && defaultId !== 'auto' && PROVIDERS[defaultId]) {
    const P = PROVIDERS[defaultId];
    if (P.availability(settings).available) return P;
  }
  // 3. Auto: cheapest available provider with the required capability
  const candidates = listProvidersFor(scene.type, settings).filter(c => c.available);
  if (!candidates.length) return null;
  candidates.sort((a, b) => a.P.estimateCost([scene]) - b.P.estimateCost([scene]));
  return candidates[0].P;
}

function estimateStoryboardCost(storyboard, settings) {
  if (!storyboard?.scenes) return { total: 0, byProvider: {}, unrenderableScenes: [] };
  const byProvider = {};
  const unrenderable = [];
  for (const sc of storyboard.scenes) {
    const P = pickProviderForScene(sc, settings);
    if (!P) { unrenderable.push(sc.id); continue; }
    byProvider[P.id] = byProvider[P.id] || { name: P.name, scenes: [], cost: 0 };
    byProvider[P.id].scenes.push(sc);
  }
  for (const id of Object.keys(byProvider)) {
    byProvider[id].cost = PROVIDERS[id].estimateCost(byProvider[id].scenes);
  }
  const total = Object.values(byProvider).reduce((s, p) => s + p.cost, 0);
  return { total, byProvider, unrenderableScenes: unrenderable };
}

// ----------------------------------------------------------------------------
// ElevenLabs direct audio (provider-agnostic voice track for Hedra/Veo/etc.)
// ----------------------------------------------------------------------------

async function elevenLabsTTS({ apiKey, voiceId, text, settings = {} }) {
  if (!apiKey || !voiceId) throw new Error('ElevenLabs key + voice ID required.');
  const r = await fetch(proxiedUrl(`https://api.elevenlabs.io/v1/text-to-speech/${encodeURIComponent(voiceId)}`, settings), {
    method: 'POST',
    headers: { 'xi-api-key': apiKey, 'content-type': 'application/json', 'accept': 'audio/mpeg' },
    body: JSON.stringify({
      text,
      model_id: 'eleven_multilingual_v2',
      voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.4, use_speaker_boost: true },
    }),
  });
  if (!r.ok) throw new Error(`ElevenLabs ${r.status}: ${(await r.text()).slice(0, 200)}`);
  return r.blob(); // returns audio/mpeg Blob — caller decides what to do with it
}

// Upload an audio Blob to Hedra's assets endpoint. Returns an asset id Hedra
// can reference internally (no public URL needed — solves the blob-URL problem).
// Hedra exposes a two-step upload (init → put) for media; we use a single
// multipart POST which their API also accepts for short audio clips.
// Hedra audio upload — verified two-step flow per hedra-labs/hedra-api-starter:
//   1. POST /assets with JSON {name, type:"audio"} → response {id}
//   2. POST /assets/{id}/upload with multipart form-data, field name "file"
// (No presigned PUT URL for audio — that's only returned for type:"video".)
async function hedraUploadAudio(blob, settings) {
  if (!settings.hedraKey) throw new Error('Hedra API key required for audio upload.');
  // Step 1: create asset record
  const init = await loggedFetch('hedra-asset-init', hedraUrl(settings, '/assets'), {
    method: 'POST',
    headers: hedraAuthHeaders(settings),
    body: JSON.stringify({ name: 'scene_audio.mp3', type: 'audio' }),
  });
  const initData = await init.json();
  const assetId = initData.id;
  if (!assetId) throw new Error(`Hedra POST /assets did not return id. Response: ${JSON.stringify(initData).slice(0, 200)}`);
  // Step 2: multipart upload to /assets/{id}/upload
  const form = new FormData();
  form.append('file', blob, 'scene_audio.mp3');
  await loggedFetch('hedra-asset-upload', hedraUrl(settings, `/assets/${assetId}/upload`), {
    method: 'POST',
    headers: hedraAuthHeaders(settings, null), // no content-type — let browser set multipart boundary
    body: form,
  });
  return assetId;
}

// Hedra image upload (for setting start_keyframe_id from a public photo URL or local Blob).
// Used by the "Upload reference photo" helper in Settings.
async function hedraUploadImage(blob, settings, name = 'reference.jpg') {
  if (!settings.hedraKey) throw new Error('Hedra API key required.');
  const init = await loggedFetch('hedra-image-init', hedraUrl(settings, '/assets'), {
    method: 'POST',
    headers: hedraAuthHeaders(settings),
    body: JSON.stringify({ name, type: 'image' }),
  });
  const initData = await init.json();
  const assetId = initData.id;
  if (!assetId) throw new Error(`Hedra POST /assets did not return id. Response: ${JSON.stringify(initData).slice(0, 200)}`);
  const form = new FormData();
  form.append('file', blob, name);
  await loggedFetch('hedra-image-upload', hedraUrl(settings, `/assets/${assetId}/upload`), {
    method: 'POST',
    headers: hedraAuthHeaders(settings, null),
    body: form,
  });
  return assetId;
}

// Fetch Hedra's available AI models — returns list of {id, name, ...}
async function hedraListModels(settings) {
  const r = await loggedFetch('hedra-models', hedraUrl(settings, '/models'), {
    headers: hedraAuthHeaders(settings, null),
  });
  const d = await r.json();
  return d.models || d.data || d;
}

// ----------------------------------------------------------------------------
// Render orchestrator — takes a storyboard, picks providers per scene,
// dispatches renders, returns job handles for polling.
// ----------------------------------------------------------------------------

// HeyGen audio asset upload — used for single-shot renders that pair an
// external ElevenLabs voice track with a HeyGen avatar. Returns the
// asset_id that goes into video_inputs[0].voice.audio_asset_id.
// Endpoint: POST https://upload.heygen.com/v1/asset (separate host from API).
async function heygenUploadAudio(blob, settings) {
  if (!settings.heygenKey) throw new Error('HeyGen API key required for audio upload.');
  const url = proxiedUrl('https://upload.heygen.com/v1/asset', settings);
  const r = await loggedFetch('heygen-upload-audio', url, {
    method: 'POST',
    headers: { 'content-type': blob.type || 'audio/mpeg', 'x-api-key': settings.heygenKey },
    body: blob,
  });
  const d = await r.json();
  const id = d?.data?.id || d?.id;
  if (!id) throw new Error(`HeyGen upload returned no asset id. Response: ${JSON.stringify(d).slice(0, 200)}`);
  return id;
}

async function orchestrateRender({ storyboard, settings, aspect = '9:16' }) {
  const cost = estimateStoryboardCost(storyboard, settings);
  if (cost.unrenderableScenes.length) {
    throw new Error(`No available provider for scene(s): ${cost.unrenderableScenes.join(', ')}. Configure a provider in Settings.`);
  }
  if (settings.costCapPerVideoGBP && cost.total > settings.costCapPerVideoGBP) {
    throw new Error(`Estimated cost £${cost.total.toFixed(2)} exceeds your cap of £${settings.costCapPerVideoGBP}. Raise cap in Settings or use cheaper providers.`);
  }

  const totalDuration = storyboard.scenes.reduce((s, sc) => s + (sc.durationSec || 5), 0);
  const fullText = storyboard.scenes.map(sc => sc.dialogue).filter(Boolean).join(' ').trim();
  const singleShotEnabled = settings.singleShotRender !== false;

  // FAST PATH -1 — LongCat-Video-Avatar (experimental, opt-in).
  // The ONLY open-source cinematic-with-lip-sync option. Generates video where
  // the character's mouth actually matches your ElevenLabs voice. Slow on the
  // public HF Space (ZeroGPU queue 5-15 min), unsupported API, but free.
  if (settings.longcatAvatarEnabled && settings.elevenLabsKey && settings.elevenLabsVoiceId) {
    const avail = LongCatAvatarProvider.availability(settings);
    if (avail.available) {
      logEvent('orchestrate', 'longcat_start', { totalDuration, sceneCount: storyboard.scenes.length, space: settings.longcatAvatarSpace });
      try {
        const { jobs } = await LongCatAvatarProvider.startRender({ storyboard, scenes: storyboard.scenes, settings, aspect });
        return { jobs, cost };
      } catch (e) {
        logEvent('orchestrate', 'longcat_failed_fallback', { error: e.message });
        // Fall through to Runway / others on any LongCat failure.
      }
    }
  }

  // FAST PATH 0 — Runway Gen-4 Turbo (top priority, cinematic).
  // The user's reference quality target. Image-to-video, ~$0.25/sec at Gen-4 Turbo.
  // Per-scene clips animated from the reference photo + character bible prompt.
  // Auto-stitched in-browser with ffmpeg.wasm + ElevenLabs voice overlay.
  if (settings.runwayKey) {
    logEvent('orchestrate', 'runway_start', { totalDuration, sceneCount: storyboard.scenes.length, model: settings.runwayModel || 'gen4_turbo' });
    try {
      const { jobs } = await RunwayGen4Provider.startRender({
        storyboard, scenes: storyboard.scenes, settings, aspect,
      });
      return { jobs, cost };
    } catch (e) {
      logEvent('orchestrate', 'runway_failed_fallback', { error: e.message });
      // Fall through to Fal.ai / Higgsfield / Veo 3 / HeyGen
    }
  }

  // FAST PATH 0a — Fal.ai Seedance 2.0 (text-to-video, no reference photo needed).
  // Seedance 2.0 is ByteDance's latest cinematic model. Fal.ai hosts it with a
  // stable documented API. Per-scene clips rendered from visualPrompt + character
  // bible; ElevenLabs audio muxed in-browser via ffmpeg.wasm.
  // ~$0.30/sec at 720p. Enable by adding a Fal.ai key in Settings.
  if (settings.falKey) {
    logEvent('orchestrate', 'fal_seedance2_start', { totalDuration, sceneCount: storyboard.scenes.length });
    try {
      const { jobs } = await FalSeedance2Provider.startRender({
        storyboard, scenes: storyboard.scenes, settings, aspect,
      });
      return { jobs, cost };
    } catch (e) {
      logEvent('orchestrate', 'fal_seedance2_failed_fallback', { error: e.message });
      // Fall through to Higgsfield / Veo 3 / HeyGen / Hedra
    }
  }

  // FAST PATH 0b — Higgsfield Seedance v1 Pro (image-to-video).
  // Requires a reference photo URL (your face → Higgsfield animates it with
  // cinematic motion). Needs both higgsfieldKey AND higgsfieldSecret from
  // cloud.higgsfield.ai/api-keys. Basic plan $9/mo.
  if (settings.higgsfieldKey && settings.higgsfieldSecret) {
    logEvent('orchestrate', 'higgsfield_start', { totalDuration, sceneCount: storyboard.scenes.length });
    try {
      const { jobs } = await HiggsfieldProvider.startRender({
        storyboard, scenes: storyboard.scenes, settings, aspect,
      });
      return { jobs, cost };
    } catch (e) {
      logEvent('orchestrate', 'higgsfield_failed_fallback', { error: e.message });
      // Fall through to Veo 3 / HeyGen / Hedra if Higgsfield fails
    }
  }

  // FAST PATH 1 — Veo 3 cinematic per-scene render (Google AI Studio).
  // When the user has a free Google AI Studio API key set, Veo 3 takes
  // priority for genuine cinematic output (multi-shot composition matching
  // Veo's reference quality — walking shots, environments, etc.). Each
  // scene is its own Veo 3 8-second clip generated from the scene's
  // visualPrompt + character bible. Audio is overlaid post-render in the
  // browser via ffmpeg.wasm using the user's ElevenLabs PVC voice (next
  // commit). For now: generate per-scene clips, user sees them in the
  // storyboard preview and downloads to edit in CapCut.
  if (singleShotEnabled && settings.googleAiKey) {
    logEvent('orchestrate', 'veo3_multi_scene_start', { totalDuration, sceneCount: storyboard.scenes.length });
    try {
      const { jobs } = await Veo3Provider.startRender({
        storyboard, scenes: storyboard.scenes, settings, aspect,
      });
      return { jobs, cost };
    } catch (e) {
      logEvent('orchestrate', 'veo3_failed_fallback', { error: e.message });
      // Fall through to HeyGen / Hedra paths if Veo fails (quota, key issue, etc.)
    }
  }

  // FAST PATH 2 — HeyGen multi-input render with ElevenLabs audio + Pexels b-roll.
  // HeyGen v2 supports multiple video_inputs[] in ONE generate request:
  // each entry gets its own character (avatar position/scale), its own voice
  // audio (a different ElevenLabs audio segment per scene), and optionally
  // its own background (image OR video — we pull cinematic Pexels b-roll
  // matched to each scene's visualPrompt). HeyGen concatenates them into a
  // single output video.
  //
  // This produces visual variety across the video (different b-roll behind
  // the avatar per scene) at the same speed as single-shot (~3-5 min total
  // for the full render — ONE queue wait, not N).
  const heygenEligible =
    singleShotEnabled &&
    settings.heygenKey && settings.heygenAvatarId &&
    settings.elevenLabsKey && settings.elevenLabsVoiceId &&
    fullText && totalDuration <= 120;
  if (heygenEligible) {
    logEvent('orchestrate', 'heygen_multi_input_start', { totalDuration, sceneCount: storyboard.scenes.length, charCount: fullText.length, hasPexels: !!settings.pexelsKey });
    try {
      const dim = aspect === '16:9' ? { width: 1920, height: 1080 } : { width: 1080, height: 1920 };
      const video_inputs = [];
      for (let i = 0; i < storyboard.scenes.length; i++) {
        const sc = storyboard.scenes[i];
        if (!sc.dialogue?.trim()) continue;
        const audioBlob = await elevenLabsTTS({
          settings, apiKey: settings.elevenLabsKey, voiceId: settings.elevenLabsVoiceId, text: sc.dialogue,
        });
        const audioAssetId = await heygenUploadAudio(audioBlob, settings);
        let background = null;
        if (settings.pexelsKey && sc.visualPrompt) {
          try {
            const pex = await pexelsSearch({ apiKey: settings.pexelsKey, query: sc.visualPrompt, perPage: 3, settings });
            const vid = pex?.videos?.[0];
            const file = vid?.video_files?.find(f => f.width >= 720 && f.height >= f.width) || vid?.video_files?.[0];
            if (file?.link) {
              background = { type: 'video', url: file.link, fit: 'cover', play_style: 'loop' };
              logEvent('orchestrate', 'broll_matched', { scene: i, query: sc.visualPrompt.slice(0, 80), pexelsId: vid.id });
            }
          } catch (e) { logEvent('orchestrate', 'broll_skipped', { scene: i, error: e.message }); }
        }
        const isCinematic = sc.type === 'cinematic';
        const character = {
          type: 'avatar',
          avatar_id: settings.heygenAvatarId,
          avatar_style: sc.avatarScale === 'close' ? 'closeUp' : 'normal',
          scale: isCinematic ? 0.6 : (sc.avatarScale === 'wide' ? 0.7 : sc.avatarScale === 'close' ? 1.2 : 1.0),
          offset: sc.avatarPosition === 'left' ? { x: -0.3, y: 0 } : sc.avatarPosition === 'right' ? { x: 0.3, y: 0 } : { x: 0, y: 0 },
        };
        video_inputs.push({
          character, voice: { type: 'audio', audio_asset_id: audioAssetId },
          ...(background ? { background } : {}),
        });
      }
      if (!video_inputs.length) throw new Error('No renderable scenes — every scene had empty dialogue.');
      const r = await loggedFetch('heygen-multi-input', proxiedUrl('https://api.heygen.com/v2/video/generate', settings), {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': settings.heygenKey },
        body: JSON.stringify({ video_inputs, dimension: dim, test: false }),
      });
      const data = await r.json();
      if (data.error) throw new Error(`HeyGen: ${JSON.stringify(data.error)}`);
      const videoId = data?.data?.video_id;
      if (!videoId) throw new Error(`HeyGen returned no video_id. Response: ${JSON.stringify(data).slice(0, 200)}`);
      return {
        jobs: [{
          jobId: videoId, sceneIds: storyboard.scenes.map(sc => sc.id),
          provider: 'heygen', singleShot: true,
          sceneCount: video_inputs.length, hasBackgrounds: video_inputs.some(v => v.background),
        }],
        cost,
      };
    } catch (e) {
      // HeyGen credit exhaustion → fall through to next path. Any other
      // HeyGen error (network, malformed response, etc.) is real and we
      // re-throw so the user sees it.
      if (/insufficient credit|out of quota|quota exceeded|api credits|trial.*ended/i.test(e.message)) {
        logEvent('orchestrate', 'heygen_credits_exhausted_fallback', { error: e.message });
      } else {
        throw e;
      }
    }
  }

  // FAST PATH 3 — Hedra Act-Two single-shot (slower than HeyGen but works
  // when the user only has Hedra configured). Bundles every scene's
  // dialogue into ONE Hedra job — 1 × queue wait instead of N.
  const hedraEligible =
    singleShotEnabled &&
    settings.hedraKey && settings.hedraActTwoModelId && (settings.hedraStartKeyframeId || settings.hedraStartKeyframeUrl) &&
    settings.elevenLabsKey && settings.elevenLabsVoiceId &&
    fullText && totalDuration <= 60;
  if (hedraEligible) {
    logEvent('orchestrate', 'hedra_single_shot_start', { totalDuration, sceneCount: storyboard.scenes.length, charCount: fullText.length });
    const audioBlob = await elevenLabsTTS({ settings, apiKey: settings.elevenLabsKey, voiceId: settings.elevenLabsVoiceId, text: fullText });
    const audioAssetId = await hedraUploadAudio(audioBlob, settings);
    const promptHint = applyCharacterBible({ visualPrompt: storyboard.scenes[0]?.visualPrompt, dialogue: fullText.slice(0, 400) }, settings);
    const body = {
      type: 'video',
      ai_model_id: settings.hedraActTwoModelId,
      audio_id: audioAssetId,
      generated_video_inputs: { text_prompt: promptHint, resolution: '720p', aspect_ratio: aspect },
    };
    if (settings.hedraStartKeyframeId) body.start_keyframe_id = settings.hedraStartKeyframeId;
    else body.start_keyframe_url = settings.hedraStartKeyframeUrl;
    const r = await loggedFetch('hedra-single-shot', hedraUrl(settings, '/generations'), {
      method: 'POST', headers: hedraAuthHeaders(settings), body: JSON.stringify(body),
    });
    const d = await r.json();
    return {
      jobs: [{
        jobId: d.id || d.generation_id,
        sceneIds: storyboard.scenes.map(sc => sc.id),
        provider: 'hedra_act_two',
        singleShot: true,
      }],
      cost,
    };
  }

  // FALLBACK — per-scene render. Used when total duration > 60–120s or
  // when single-shot is disabled or required keys are missing.
  logEvent('orchestrate', 'multi_scene_fallback', { totalDuration, sceneCount: storyboard.scenes.length });
  const groups = {};
  for (const sc of storyboard.scenes) {
    const P = pickProviderForScene(sc, settings);
    groups[P.id] = groups[P.id] || { P, scenes: [] };
    groups[P.id].scenes.push(sc);
  }
  const allJobs = [];
  for (const { P, scenes } of Object.values(groups)) {
    const { jobs } = await P.startRender({ storyboard, scenes, settings, aspect });
    allJobs.push(...jobs);
  }
  return { jobs: allJobs, cost };
}

async function pollAllJobs({ jobs, settings, onProgress }) {
  const results = jobs.map(j => ({ ...j, status: 'pending', videoUrl: null }));
  let pending = results.length;
  const maxAttempts = 120; // 10 min @ 5s
  for (let i = 0; i < maxAttempts && pending > 0; i++) {
    await new Promise(r => setTimeout(r, 5000));
    for (const r of results) {
      if (r.status === 'completed' || r.status === 'failed') continue;
      try {
        const P = PROVIDERS[r.provider];
        const upd = await P.pollJob({ jobId: r.jobId, settings });
        if (upd.status === 'completed') { r.status = 'completed'; r.videoUrl = upd.videoUrl; pending--; }
        else if (upd.status === 'failed') { r.status = 'failed'; r.error = upd.error; pending--; }
        else { r.progress = upd.progress; }
      } catch (e) { r.status = 'failed'; r.error = e.message; pending--; }
    }
    onProgress?.(results);
  }
  return results;
}

// Buffer compose URL — phase 1 (no backend). Opens Buffer with prefilled text + media URL.
function bufferComposeUrl({ text, mediaUrl }) {
  const base = 'https://buffer.com/compose';
  const params = new URLSearchParams();
  if (text) params.set('text', text);
  if (mediaUrl) params.set('picture', mediaUrl);
  return `${base}?${params.toString()}`;
}

function scriptSystemPrompt(settings, tone, platform, mood='neutral') {

  const m = MOOD_PRESETS[mood] || MOOD_PRESETS.neutral;

Channel niche: ${settings.niche}
Audience: ${settings.audience}

${t.promptStyle}

${m.hint ? `Mood angle (overlay on tone):\n${m.hint}\n` : ''}
Hard rules:

- Educational framing only. Never recommend a specific product. No "you should buy/invest in X."
- Never mention specific brokers, platforms, or fund names.
- Numbers must be plausible and round to whole pounds.
- The script will be read aloud by an AI avatar. Write it as continuous spoken sentences (no headers, no bullets, no stage directions in the script field).
- Approx ${t.wpmTarget} words per minute → aim for ${Math.round(t.wpmTarget * targetSec / 60)} words.
- Do NOT include the disclaimer in the spoken script — it will be added separately to captions.

PROSODY rules (CRITICAL — without these the TTS sounds robotic):
- Use commas every 5–8 words to mark micro-pauses. Even where written grammar wouldn't strictly need one.
- Use em-dashes ( — ) to insert dramatic mid-sentence pauses where you'd take a breath.
- Use ellipses (…) sparingly for dramatic effect (max once or twice per script).
- Vary sentence length: never have more than 2 short sentences in a row before a longer one.
- Front-load filler beats that real speech uses: "Look,", "Right,", "Here's the thing —", "OK so —" (use 1–2 of these per script, not more).
- Stress key numbers by isolating them: "That's £20… in your pocket… every year." rather than "That's £20 in your pocket every year."
- Spell out tricky numbers if HeyGen mispronounces them: "twelve five seventy" instead of "12,570" if rendering says it wrong (only spell out if you're confident TTS will mispronounce).

SCENE BREAKDOWN (CRITICAL):
- Break the script into 3–6 short scenes (one per beat: hook, problem, lever, proof, payoff).
- Each scene gets its own DIALOGUE (the spoken words, voiceover) AND a VISUALPROMPT (what's on screen) AND a TYPE.
- ALL SCENES MUST BE TYPE 'cinematic'. Never 'talking-head'. The channel format is a continuous cinematic shoot — the character is shown walking through environments, gesturing in real-world settings (UK streets, kitchens, offices, cafés, the Tube, parks). The voiceover plays over the cinematic visuals. NO scenes where the character is sitting/standing speaking directly to the camera in a fixed framing. That's a podcast, not the channel.
- CRITICAL DISTINCTION:
  * The dialogue field is what the VOICE says. Spoken words only. NEVER write camera direction, scene description, or stage notes here. e.g. "And here's where it gets interesting…" YES. "Close-up of hands pulling coins off a table" NO — that's a visual.

function tryParseJSON(text) {
  if (!text) return null;
  // Strip code fences if present
  const cleaned = text.replace(/```json\s*/g,'').replace(/```\s*$/g,'').trim();
  try { return JSON.parse(cleaned); } catch {}
  // Try to find first JSON object/array
  const m = cleaned.match(/[\[{][\s\S]*[\]}]/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  return null;
}

function copy(text) {
  try { navigator.clipboard.writeText(text); return true; } catch { return false; }
}

function download(filename, blobOrText, mime='text/plain') {
  const blob = blobOrText instanceof Blob ? blobOrText : new Blob([blobOrText], { type:mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function downloadRemote(url, filename) {
  // Trigger browser download of a remote MP4. Some hosts CORS-block fetch; falling back to opening in a new tab.
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('fetch failed');
    const blob = await r.blob();
    download(filename, blob, blob.type || 'video/mp4');
  } catch {
    window.open(url, '_blank', 'noopener');
  }
}

function checkKeys(settings) {

    if (!hgOk && !hdOk) missing.push('Either a complete HeyGen setup OR a complete Hedra+ElevenLabs setup');

  const cnId = settings.defaultCinematicProvider;
  if (cnId === 'hedra_character' || cnId === 'auto' || !cnId) {
    if (!settings.hedraKey) missing.push('Hedra API key (for cinematic scenes)');
    if (!settings.hedraCharacter2ModelId) missing.push('Hedra Character-2 model ID (tap "Fetch models")');
    if (!settings.hedraStartKeyframeId && !settings.hedraStartKeyframeUrl) missing.push('Hedra reference photo (URL or asset ID)');
  }
  // Dedupe
  const unique = Array.from(new Set(missing));
  return { ok: unique.length === 0, missing: unique };
}

function KeyStatus({ state }) {
  const { ok } = checkKeys(state.settings);
  return <span className="key-status"><span className={`dot ${ok?'ok':'bad'}`}></span>{ok?'Keys OK':'Keys missing'}</span>;
}

function PipelinePage({ go }) {
  const { state, dispatch } = useStore();
  const [openVideo, setOpenVideo] = useState(null);
  const [selectMode, setSelectMode] = useState(false);
  const [selected, setSelected] = useState(() => new Set());
  const [busy, setBusy] = useState('');
  const cols = [
    { stage:'idea',      label:'Idea' },
    { stage:'script',    label:'Script' },
    { stage:'render',    label:'Rendering' },
    { stage:'approval',  label:'Awaiting approval' },
    { stage:'approved',  label:'Approved' },
    { stage:'published', label:'Published' },
  ];
  const keys = checkKeys(state.settings);
  const toggle = (id) => setSelected(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const selectAllIn = (stage) => setSelected(s => {
    const ids = state.videos.filter(v => v.stage === stage).map(v => v.id);
    const allIn = ids.length > 0 && ids.every(id => s.has(id));
    const n = new Set(s);
    ids.forEach(id => allIn ? n.delete(id) : n.add(id));
    return n;
  });
  const exitSelect = () => { setSelectMode(false); setSelected(new Set()); };
  const selectedVideos = () => state.videos.filter(v => selected.has(v.id));

  const bulkMoveToApproval = () => {
    selectedVideos().forEach(v => dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'approval' } }));
    exitSelect();
  };
  const bulkSendToScript = () => {
    selectedVideos().forEach(v => dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'script' } }));
    exitSelect();
  };
  const bulkDelete = () => {
    const n = selected.size;
    if (!confirm(`Delete ${n} selected video${n===1?'':'s'}? Cannot be undone.`)) return;
    selectedVideos().forEach(v => dispatch({ type:'DELETE_VIDEO', id:v.id }));
    exitSelect();
  };
  const bulkRender = async () => {
    const targets = selectedVideos().filter(v => v.storyboard?.scenes?.length && v.stage !== 'render');
    if (!targets.length) { alert('No selected videos have a storyboard ready to render (and aren\'t already rendering).'); return; }
    if (!confirm(`Re-render ${targets.length} video${targets.length===1?'':'s'} via the multi-provider orchestrator? This may cost credits.`)) return;
    setBusy('render');
    for (const v of targets) {
      const aspect = v.render?.aspect || PLATFORMS[v.idea?.platform || 'tiktok']?.aspect || '9:16';
      dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'render', render:{ ...(v.render||{}), status:'queued', jobs:[], startedAt:Date.now(), aspect } } });
      try {
        const { jobs } = await orchestrateRender({ storyboard: v.storyboard, settings: state.settings, aspect });
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ render:{ ...(v.render||{}), status:'processing', jobs, startedAt:Date.now(), aspect } } });
      } catch (e) {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ render:{ ...(v.render||{}), status:'failed', error:e.message } } });
      }
    }
    setBusy(''); exitSelect();
  };

  const renderProgress = (v) => {
    const jobs = v.render?.jobs || [];
    if (!jobs.length) return null;
    const done = jobs.filter(j => j.status === 'completed').length;
    return Math.round((done / jobs.length) * 100);
  };

  return (
    <div style={{paddingBottom: selectMode ? 90 : 24}}>
      <div className="page-head">
        <div>
          <div className="page-title">Pipeline</div>
          <div className="page-sub">{selectMode ? 'Tap cards to select · use the bar below for batch actions' : `${state.videos.length} video production${state.videos.length===1?'':'s'}`}</div>
        </div>
        <div style={{display:'flex', gap:8}}>
          {selectMode
            ? <button className="btn btn-ghost btn-sm" onClick={exitSelect}>Done</button>
            : <>
                <button className="btn btn-ghost btn-sm" onClick={()=>setSelectMode(true)} disabled={state.videos.length===0}>☑ Select</button>
                <button className="btn btn-sm" onClick={()=>go && go('new')}>+ Create New</button>
              </>}
        </div>
      </div>
      {state.videos.length === 0 && (
        <div className="empty">No videos yet. Hit <strong>+ Create New</strong> to start your first one.</div>
      )}
      <div style={{display:'flex', flexDirection:'column', gap:24}}>
        {cols.map(c => {
          const items = state.videos.filter(v => v.stage === c.stage);
          if (items.length === 0 && !selectMode) return null;
          const allSel = items.length > 0 && items.every(v => selected.has(v.id));
          return (
            <section key={c.stage}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10}}>
                <h3 style={{fontWeight:700, fontSize:15, margin:0}}>{c.label}</h3>
                <span style={{background:'var(--card2)', color:'var(--text-dim)', fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99}}>{items.length}</span>
                {selectMode && items.length > 0 && (
                  <button onClick={()=>selectAllIn(c.stage)} style={{marginLeft:'auto', border:'none', background:'transparent', color:'var(--accent)', fontSize:11, cursor:'pointer', fontWeight:600}}>{allSel?'clear all':'select all'}</button>
                )}
              </div>
              {items.length === 0 && <div style={{fontSize:12, color:'var(--muted)', padding:'4px 0'}}>—</div>}
              <div style={{display:'flex', flexDirection:'column', gap:10}}>
                {items.map(v => {
                  const sel = selected.has(v.id);
                  const pct = c.stage === 'render' ? renderProgress(v) : null;
                  return (
                    <div key={v.id} className="card" style={{padding:14, cursor:'pointer', ...(selectMode && sel ? {borderColor:'var(--accent)', boxShadow:'0 0 0 2px var(--accent-dim)'} : {})}}
                         onClick={() => selectMode ? toggle(v.id) : setOpenVideo(v.id)}>
                      <div style={{display:'flex', alignItems:'flex-start', gap:10}}>
                        {selectMode && (
                          <span style={{flexShrink:0, width:18, height:18, borderRadius:5, border:`2px solid ${sel?'var(--accent)':'var(--border2)'}`, background:sel?'var(--accent)':'transparent', color:'var(--on-accent)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, marginTop:1}}>{sel?'✓':''}</span>
                        )}
                        <div style={{flex:1, minWidth:0}}>
                          <div style={{display:'flex', justifyContent:'space-between', gap:8, marginBottom:8}}>
                            <span className={stageBadgeCls(v.stage)}>{v.stage}</span>
                            <span style={{fontSize:10, color:'var(--muted)', whiteSpace:'nowrap'}}>{fmt(v.updatedAt)}</span>
                          </div>
                          <div style={{fontWeight:600, fontSize:14, lineHeight:1.35}}>{v.idea?.title || 'Untitled'}</div>
                          {pct != null && (
                            <div style={{marginTop:10}}>
                              <div style={{height:6, borderRadius:99, background:'var(--card2)', overflow:'hidden'}}>
                                <div style={{height:'100%', width:`${pct}%`, background:'var(--warn)', transition:'width .3s'}} />
                              </div>
                              <div style={{fontSize:11, color:'var(--muted)', marginTop:5}}>{pct}% · {v.render?.jobs?.filter(j=>j.status==='completed').length}/{v.render?.jobs?.length} scenes</div>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>
          );
        })}
      </div>
      {!selectMode && state.videos.length > 0 && (
        <div className="card" style={{marginTop:24, padding:12, display:'flex', alignItems:'center', gap:10}}>
          <span className="dot" style={{background: keys.ok ? '#2DC26B' : 'var(--danger)'}} />
          <span style={{fontSize:12, fontWeight:600}}>{keys.ok ? 'Keys OK' : 'Keys missing'}</span>
          {!keys.ok && <span style={{fontSize:11, color:'var(--muted)'}}>{keys.missing.slice(0,2).join(', ')}{keys.missing.length>2?'…':''}</span>}
          <span style={{flex:1}}/>
          <span style={{fontSize:10, fontWeight:700, color:'var(--muted)', letterSpacing:'.08em'}}>FACELESS FINANCE APP · v{APP_VERSION}</span>
        </div>
      )}
      {openVideo && <VideoModal id={openVideo} onClose={() => setOpenVideo(null)} />}
      {selectMode && (
        <div style={{position:'fixed', left:0, right:0, bottom:64, zIndex:40, background:'var(--card)', borderTop:'1px solid var(--border)', boxShadow:'0 -4px 16px rgba(0,0,0,.3)', padding:'10px 14px', display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <strong style={{fontSize:13}}>{selected.size} selected</strong>
          <span style={{flex:1}}/>
          <button className="btn btn-ghost btn-sm" disabled={!selected.size || !!busy} onClick={bulkRender}>{busy==='render'?<><span className="spin"></span> Rendering…</>:'⟳ Re-render'}</button>
          <button className="btn btn-ghost btn-sm" disabled={!selected.size} onClick={bulkMoveToApproval}>→ To Approval</button>
          <button className="btn btn-ghost btn-sm" disabled={!selected.size} onClick={bulkSendToScript}>↩ To Script</button>
          <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} disabled={!selected.size} onClick={bulkDelete}>🗑 Delete</button>
        </div>
      )}
    </div>
  );
}

function NewVideoPage({ go }) {
  const { state, dispatch } = useStore();
  const [step, setStep] = useState(1);
  const [tone, setTone] = useState(state.settings.defaultTone || 'matStyle');
  const [platform, setPlatform] = useState('tiktok');
  const [mood, setMood] = useState('neutral');
  const [ideas, setIdeas] = useState([]);
  const [topic, setTopic] = useState('');
  const [generating, setGenerating] = useState(false);
  const [error, setError] = useState('');
  const [picked, setPicked] = useState(null); // selected idea
  const [scriptObj, setScriptObj] = useState(null);
  const [renderId, setRenderId] = useState(null);
  const [heygenSpeed, setHeygenSpeed] = useState(TONE_PRESETS[tone].speed);
  const [heygenPitch, setHeygenPitch] = useState(TONE_PRESETS[tone].pitch || 0);
  const [createdVideoId, setCreatedVideoId] = useState(null);
  const [sampleUrl, setSampleUrl] = useState('');
  const [sampling, setSampling] = useState(false);
  const [sampleErr, setSampleErr] = useState('');

  const generateIdeas = async () => {
    setError(''); setGenerating(true);
    try {
      const out = await callClaude({
        apiKey: state.settings.anthropicKey,
        model: state.settings.llmModel,
        system: ideaSystemPrompt(state.settings),
        user: topic ? `Generate 6 ideas focused on: ${topic}` : 'Generate 6 fresh ideas now.',
        maxTokens: 1400,
        settings: state.settings,
      });
      const parsed = tryParseJSON(out);
      if (!Array.isArray(parsed)) throw new Error('Could not parse ideas. Raw: ' + out.slice(0,200));
      setIdeas(parsed);
    } catch (e) { setError(e.message); }
    finally { setGenerating(false); }
  };

  const generateScript = async (idea) => {
    setError(''); setGenerating(true);
    try {
      const out = await callClaude({
        apiKey: state.settings.anthropicKey,
        model: state.settings.llmModel,
        system: scriptSystemPrompt(state.settings, tone, platform, mood),
        user: `Write the script for this idea:\nTitle: ${idea.title}\nHook: ${idea.hook}\nAngle: ${idea.angle}`,
        maxTokens: 3200,
        settings: state.settings,
      });
      const parsed = tryParseJSON(out);
      // New format: parsed.scenes[]. Old format: parsed.script (string). Accept either.
      if (!parsed || (!parsed.scenes && !parsed.script)) throw new Error('Could not parse script. Raw: ' + out.slice(0,200));
      // Force every parsed scene to type:'cinematic'. The channel is cinematic-only;
      // a regressed model output shouldn't silently produce talking-head scenes.
      if (parsed.scenes) {
        const forced = parsed.scenes.filter(s => s.type && s.type !== 'cinematic').length;
        parsed.scenes = parsed.scenes.map(s => ({ ...s, type: 'cinematic' }));
        if (forced > 0) logEvent('script-parse', 'forced_cinematic', { count: forced, total: parsed.scenes.length });
      }
      // If LLM returned old format, migrate inline
      const storyboard = parsed.scenes
        ? { version: STORYBOARD_VERSION, ...parsed }
        : migrateScriptToStoryboard(parsed);
      // Stash combined object: storyboard + legacy fields for any code still reading them
      setScriptObj({ ...parsed, storyboard, script: storyboardToFlatScript(storyboard) });
      setPicked(idea);
      setStep(3);
    } catch (e) { setError(e.message); }
    finally { setGenerating(false); }
  };

  const startRender = async () => {
    if (!scriptObj?.storyboard) { setError('No storyboard. Regenerate the script.'); return; }
    setError(''); setGenerating(true);
    try {
      // Pre-flight via cost estimator (also surfaces missing providers)
      const cost = estimateStoryboardCost(scriptObj.storyboard, state.settings);
      if (cost.unrenderableScenes.length) {
        throw new Error(`No provider available for scene(s): ${cost.unrenderableScenes.join(', ')}. Configure a provider in Settings.`);
      }

      // Persist video first
      const id = uid();
      const flatScript = storyboardToFlatScript(scriptObj.storyboard);
      const video = {
        id, createdAt:Date.now(), updatedAt:Date.now(),
        stage: 'render',
        idea: { ...picked, platform },
        script: { text: flatScript, durationSec: storyboardDuration(scriptObj.storyboard), generatedAt: Date.now(), tone },
        storyboard: scriptObj.storyboard,
        platforms: {
          tiktok:  { caption: scriptObj.captions?.tiktok || '', hashtags: scriptObj.hashtags?.tiktok || [], posted:false, postUrl:'', scheduledAt:null },
          reels:   { caption: scriptObj.captions?.reels  || '', hashtags: scriptObj.hashtags?.reels  || [], posted:false, postUrl:'', scheduledAt:null },
          shorts:  { caption: scriptObj.captions?.shorts || '', hashtags: scriptObj.hashtags?.shorts || [], posted:false, postUrl:'', scheduledAt:null, title: scriptObj.youtubeTitle || scriptObj.title || '' },
          long:    { caption: scriptObj.captions?.long   || '', hashtags: scriptObj.hashtags?.long   || [], posted:false, postUrl:'', scheduledAt:null, title: scriptObj.title || '' },
        },
        broll: scriptObj.broll || [],
        render: {
          status: 'queued',
          jobs: [],
          estimatedCostGBP: cost.total,
          providersUsed: Object.keys(cost.byProvider),
          aspect: PLATFORMS[platform].aspect,
          startedAt: Date.now(),
        },
        // Legacy field for backward-compat with existing UI code
        heygen: { videoId:'', status:'queued', videoUrl:'', thumbnailUrl:'', error:'', aspect: PLATFORMS[platform].aspect },
      };
      dispatch({ type:'CREATE_VIDEO', video });
      setCreatedVideoId(id);

      // Orchestrate
      const { jobs } = await orchestrateRender({
        storyboard: scriptObj.storyboard,
        settings: state.settings,
        aspect: PLATFORMS[platform].aspect,
      });

      // Only mirror jobId into the legacy v.heygen.videoId field when the
      // first job is actually a HeyGen render — otherwise we'd pollute it
      // with Hedra/Veo/Sora UUIDs and break legacy code paths (the
      // "↗ HeyGen" deep-link, the legacy poll fallback, etc.).
      const isHeyGenJob = jobs[0]?.provider === 'heygen';
      dispatch({ type:'UPDATE_VIDEO', id, patch:{
        render: { ...video.render, status: 'processing', jobs },
        heygen: { ...video.heygen, videoId: isHeyGenJob ? (jobs[0]?.jobId || '') : '', status: 'processing' },
      } });
      setRenderId(jobs[0]?.jobId);
      setStep(4);
    } catch (e) {
      setError(e.message);
      if (createdVideoId) {
        dispatch({ type:'UPDATE_VIDEO', id:createdVideoId, patch:{
          render: { status: 'failed', error: e.message },
          heygen: { status: 'failed', error: e.message },
        } });
      }
    } finally { setGenerating(false); }
  };

  const reset = () => {
    setStep(1); setIdeas([]); setTopic(''); setPicked(null); setScriptObj(null); setRenderId(null); setCreatedVideoId(null); setError('');
    setSampleUrl(''); setSampleErr('');
  };

  const renderSample = async () => {
    if (!scriptObj?.script) return;
    const missing = preflightRender(state.settings, scriptObj.script);
    if (missing.length) { setSampleErr('Missing: ' + missing.join(', ')); return; }
    setSampleErr(''); setSampleUrl(''); setSampling(true);
    try {
      // Take first ~30 words for a ~10-second sample
      const words = scriptObj.script.split(/\s+/);
      const sampleText = words.slice(0, 30).join(' ') + (words.length > 30 ? '…' : '');
      const id = await heygenGenerate({
        apiKey: state.settings.heygenKey,
        avatarId: state.settings.heygenAvatarId,
        voiceId: state.settings.heygenVoiceId,
        scriptText: sampleText,
        aspect: PLATFORMS[platform].aspect,
        speed: heygenSpeed, pitch: heygenPitch,
        settings: state.settings,
      });
      // Poll
      for (let i = 0; i < 40; i++) {
        await new Promise(r => setTimeout(r, 5000));
        const r = await heygenStatus({ apiKey: state.settings.heygenKey, videoId: id, settings: state.settings });
        if (r.status === 'completed' && r.video_url) { setSampleUrl(r.video_url); break; }
        if (r.status === 'failed') throw new Error(r.error?.message || 'render failed');
      }
    } catch (e) { setSampleErr(e.message); }
    finally { setSampling(false); }
  };

  const keys = checkKeys(state.settings);
  const keysOk = keys.ok;

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">New Video</div>
          <div className="page-sub">Idea → Script → Render → Approval</div>
        </div>
        {step > 1 && <button className="btn btn-ghost btn-sm" onClick={reset}>Start over</button>}
      </div>

      {!keysOk && (
        <div className="alert alert-warn" style={{marginBottom:16}}>
          <strong>Keys missing — check Settings:</strong>
          <ul style={{margin:'6px 0 0 16px', padding:0, fontSize:13}}>
            {keys.missing.map((m, i) => <li key={i}>{m}</li>)}
          </ul>
        </div>
      )}

      <div className="step-dots">
        {[1,2,3,4].map(n => <div key={n} className={`step-dot ${step===n?'active':step>n?'done':''}`} />)}
      </div>

      {error && <div className="alert alert-err" style={{marginBottom:14}}>{error}</div>}

      {step === 1 && (
        <div className="card">
          <div className="card-title">Step 1 · Choose tone & platform</div>
          <div className="grid2" style={{marginBottom:14}}>
            <div>
              <label className="label">Tone</label>
              <select value={tone} onChange={e=>{ setTone(e.target.value); setHeygenSpeed(TONE_PRESETS[e.target.value].speed); }}>
                {Object.entries(TONE_PRESETS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
              <div className="help">{TONE_PRESETS[tone].desc}</div>
            </div>
            <div>
              <label className="label">Primary platform</label>
              <select value={platform} onChange={e=>setPlatform(e.target.value)}>
                {Object.entries(PLATFORMS).map(([k,v]) => <option key={k} value={k}>{v.name} ({v.aspect})</option>)}
              </select>
              <div className="help">Script length and caption rules adapt to this. Other platforms get adapted captions automatically.</div>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label className="label">Mood / angle</label>
            <select value={mood} onChange={e=>setMood(e.target.value)}>
              {Object.entries(MOOD_PRESETS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
            <div className="help">{MOOD_PRESETS[mood].desc}</div>
          </div>
          <button className="btn" onClick={() => setStep(2)} disabled={!keysOk}>Next: Pick an idea →</button>
        </div>
      )}

      {step === 2 && (
        <div className="card">
          <div className="card-title">Step 2 · Pick or generate an idea</div>
          <div style={{display:'flex', gap:8, marginBottom:14}}>
            <input
              placeholder="Topic angle (optional, e.g. 'salary sacrifice for higher rate')"
              value={topic} onChange={e=>setTopic(e.target.value)}
              onKeyDown={e => e.key==='Enter' && generateIdeas()} />
            <button className="btn" onClick={generateIdeas} disabled={generating || !state.settings.anthropicKey} style={{flexShrink:0}}>
              {generating ? <><span className="spin"></span> Generating…</> : '✦ Generate 6 ideas'}
            </button>
          </div>
          {ideas.length === 0 && <div className="empty">No ideas yet. Hit Generate.</div>}
          {ideas.map((idea, i) => (
            <div key={i} className="vcard" style={{marginBottom:8}} onClick={() => generateScript(idea)}>
              <div className="vcard-title">{idea.title}</div>
              <div style={{fontSize:11, color:'var(--text-dim)', marginTop:4}}>{idea.hook}</div>
              <div className="vcard-meta" style={{marginTop:6}}>
                <span className="pill">{idea.angle}</span>
                {idea.platform && <span className="pill">{idea.platform}</span>}
              </div>
            </div>
          ))}
          {generating && ideas.length>0 && <div style={{marginTop:8,color:'var(--accent)'}}><span className="spin"></span> Writing script…</div>}
        </div>
      )}

      {step === 3 && scriptObj && (() => {
        const s = state.settings;
        const renderVia = s.runwayKey ? `Runway · ${s.runwayModel || 'gen4_turbo'}`
          : s.falKey ? 'Fal.ai · Seedance 2.0'
          : (s.higgsfieldKey && s.higgsfieldSecret) ? 'Higgsfield · DoP'
          : s.googleAiKey ? 'Google Veo 3'
          : (s.heygenKey && s.heygenAvatarId) ? 'HeyGen (talking-head)'
          : (s.hedraKey && s.hedraActTwoModelId) ? 'Hedra Act-Two'
          : null;
        const willHeyGen = renderVia && renderVia.startsWith('HeyGen');
        return (
        <div className="card">
          <div className="card-title">Step 3 · Review script &amp; render</div>
          <div style={{marginBottom:12}}>
            <label className="label">Title</label>
            <input value={scriptObj.title} onChange={e=>setScriptObj({...scriptObj, title:e.target.value})} />
          </div>
          <div style={{marginBottom:12}}>
            <label className="label">Spoken script ({wordCount(scriptObj.script)} words · ~{scriptObj.estimatedDurationSec}s)</label>
            <textarea value={scriptObj.script} onChange={e=>setScriptObj({...scriptObj, script:e.target.value})} style={{minHeight:200}} />
          </div>
          <div style={{padding:'10px 12px', borderRadius:'var(--radius-input)', background:'var(--accent-dim)', border:'1px solid var(--accent)', marginBottom:14, fontSize:12}}>
            {renderVia
              ? <>Renders via <strong>{renderVia}</strong> first {willHeyGen ? '' : '(auto-falls through to other configured providers on error)'}. Voice track: ElevenLabs PVC, muxed in-browser.</>
              : <span style={{color:'var(--danger)'}}>No video provider configured. Add a key in Settings → Phase 3 (Runway recommended) before rendering.</span>}
          </div>
          <details style={{marginBottom:14}}>
            <summary>HeyGen fallback voice settings (only used if HeyGen renders this video)</summary>
            <div style={{marginTop:10}}>
              <label className="label">Voice speed: <strong>{heygenSpeed.toFixed(2)}x</strong></label>
              <input type="range" className="slider" min="0.5" max="1.5" step="0.05" value={heygenSpeed} onChange={e=>setHeygenSpeed(parseFloat(e.target.value))} />
              <div className="help">Suggested for {TONE_PRESETS[tone].label}: {TONE_PRESETS[tone].speed.toFixed(2)}x.</div>
            </div>
            <div style={{marginTop:10}}>
              <label className="label">Voice pitch: <strong>{heygenPitch > 0 ? '+' : ''}{heygenPitch}</strong></label>
              <input type="range" className="slider" min="-50" max="50" step="5" value={heygenPitch} onChange={e=>setHeygenPitch(parseInt(e.target.value))} />
              <div className="help">0 = neutral. Most cloned voices sound best at 0.</div>
            </div>
          </details>
          {willHeyGen && (
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
              <button className="btn btn-outline btn-sm" onClick={renderSample} disabled={sampling || generating}>
                {sampling ? <><span className="spin"></span> Sampling… (~60s)</> : '▶ Render 10s HeyGen sample (1 credit)'}
              </button>
              <span className="help" style={{fontSize:11}}>Optional pre-check. Skip and do the full render if you like.</span>
            </div>
          )}
          {sampleErr && <div className="alert alert-err" style={{marginBottom:10}}>{sampleErr}</div>}
          {sampleUrl && (
            <div style={{marginBottom:14}}>
              <video src={sampleUrl} controls style={{width:'100%',maxHeight:360,borderRadius:'var(--radius-input)',background:'#000'}} />
              <div className="help" style={{marginTop:6}}>If the voice is wrong, try a different Voice ID in Settings, or adjust speed/pitch above and sample again.</div>
            </div>
          )}
          <div style={{display:'flex',gap:8}}>
            <button className="btn" onClick={startRender} disabled={generating || sampling || !renderVia}>
              {generating ? <><span className="spin"></span> Starting render…</> : '→ Render full video'}
            </button>
            <button className="btn btn-ghost" onClick={() => setStep(2)}>Back</button>
          </div>
        </div>
        );
      })()}

      {step === 4 && (
        <div className="card">
          <div className="card-title">Step 4 · Rendering</div>
          <div style={{fontSize:14, marginBottom:14}}>
            Your video is rendering. Single-shot mode: typical wait 1–3 min queue + 30–60s render = roughly 3 min total.<br/>
            You can leave this page — when it's done it will appear in the <strong>Approval</strong> tab.
          </div>
          {createdVideoId && (() => {
            const v = state.videos.find(x => x.id===createdVideoId);
            if (!v) return null;
            const jobs = v.render?.jobs;
            const isSingleShot = jobs?.length === 1 && jobs[0].singleShot;
            const statusLabel = isSingleShot
              ? (jobs[0].status === 'completed' ? 'rendered' : (jobs[0].status === 'processing' ? 'rendering' : 'queued at Hedra'))
              : jobs?.length
                ? `${jobs.filter(j => j.status === 'completed').length}/${jobs.length} scenes done`
                : (v.heygen?.status || 'queued');
            return (
              <div>
                <div style={{marginBottom:12}}>
                  Status: <span className="pill"><span className="spin" style={{marginRight:6}}></span>{statusLabel}</span>
                </div>
                {v.heygen?.videoUrl && (
                  <>
                    <video src={v.heygen.videoUrl} controls className="preview-vid" style={{marginBottom:12}} />
                    <div className="alert alert-ok">Render complete. Head to Approval tab.</div>
                  </>
                )}
                {v.heygen?.error && <div className="alert alert-err">{v.heygen.error}</div>}
              </div>
            );
          })()}
          <div style={{display:'flex',gap:8, marginTop:14}}>
            <button className="btn" onClick={() => go('approval')}>Go to Approval →</button>
            <button className="btn btn-ghost" onClick={reset}>Start another</button>
          </div>
        </div>
      )}
    </div>
  );
}
