              {Object.entries(TONE_PRESETS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Channel handle (for reference)</label>
            <input value={s.channelHandle} onChange={e=>set({ channelHandle:e.target.value })} placeholder="@yourhandle" />
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">FCA Disclaimer (auto-appended to every caption)</div>
        <textarea value={s.disclaimer} onChange={e=>set({ disclaimer:e.target.value })} style={{minHeight:80}} />
        <div className="help">UK financial-promotion rules require this on educational content. Edit only if you know what you're doing.</div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">Appearance</div>
        <div className="grid2">
          <div>
            <label className="label">Theme</label>
            <select value={s.theme} onChange={e=>set({ theme:e.target.value })}>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>
          <div>
            <label className="label">Claude model</label>
            <select value={s.llmModel} onChange={e=>set({ llmModel:e.target.value })}>
              <option value="claude-sonnet-4-6">claude-sonnet-4-6 (recommended)</option>
              <option value="claude-opus-4-7">claude-opus-4-7 (best quality, more expensive)</option>
              <option value="claude-haiku-4-5">claude-haiku-4-5 (cheapest)</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Data</div>
        <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
          <button className="btn btn-ghost btn-sm" onClick={exportData}>⬇ Export backup (JSON)</button>
          <label className="btn btn-ghost btn-sm" style={{cursor:'pointer'}}>
            ⬆ Import backup
            <input type="file" accept="application/json" onChange={importData} style={{display:'none'}} />
          </label>
          <button className="btn btn-danger btn-sm" onClick={() => { if(confirm('Delete ALL videos and reset settings to defaults? This cannot be undone.')) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }}>Reset everything</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// APP ROOT
// ============================================================================

// ============================================================================
// CINEMATIC STITCHING — concat per-scene Veo clips + overlay PVC voice
// ----------------------------------------------------------------------------
// Loads ffmpeg.wasm on first use (one-time ~30 MB CDN download), runs entirely
// client-side. After Veo 3 finishes per-scene cinematic clips, this stitches
// them into one MP4 with the user's ElevenLabs voice as the audio track.
// ============================================================================

let __ffmpegInstance = null;
let __ffmpegLoading = null;

// Try multiple CDNs in order until one works. jsDelivr sometimes rate-limits
// or has transient issues on mobile networks; unpkg is a mirror.
const FFMPEG_VERSIONS = [
  { v: '0.12.15', base: 'https://cdn.jsdelivr.net/npm' },
  { v: '0.12.15', base: 'https://unpkg.com' },
  { v: '0.12.10', base: 'https://cdn.jsdelivr.net/npm' },
  { v: '0.12.10', base: 'https://unpkg.com' },
  { v: '0.12.6',  base: 'https://cdn.jsdelivr.net/npm' },
];

async function tryLoadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.onload = resolve;
    s.onerror = () => reject(new Error(`script load failed: ${url}`));
    document.head.appendChild(s);
    setTimeout(() => reject(new Error(`script load timeout: ${url}`)), 25000);
  });
}

async function loadFFmpeg() {
  if (__ffmpegInstance) return __ffmpegInstance;
  if (__ffmpegLoading) return __ffmpegLoading;
  __ffmpegLoading = (async () => {
    let lastErr = null;
    for (const spec of FFMPEG_VERSIONS) {
      const ffmpegUrl = `${spec.base}/@ffmpeg/ffmpeg@${spec.v}/dist/umd/ffmpeg.js`;
      const coreUrl   = `${spec.base}/@ffmpeg/core@${spec.v}/dist/umd/ffmpeg-core.js`;
      const wasmUrl   = `${spec.base}/@ffmpeg/core@${spec.v}/dist/umd/ffmpeg-core.wasm`;
      try {
        logEvent('stitch', 'ffmpeg_cdn_attempt', { version: spec.v, base: spec.base });
        if (!window.FFmpegWASM) {
          await tryLoadScript(ffmpegUrl);
        }
        const { FFmpeg } = window.FFmpegWASM;
        const ffmpeg = new FFmpeg();
        await ffmpeg.load({ coreURL: coreUrl, wasmURL: wasmUrl });
        __ffmpegInstance = ffmpeg;
        logEvent('stitch', 'ffmpeg_loaded', { version: spec.v, base: spec.base });
        return ffmpeg;
      } catch (e) {
        lastErr = e;
        logEvent('stitch', 'ffmpeg_cdn_failed', { version: spec.v, base: spec.base, error: e.message });
        if (window.FFmpegWASM) delete window.FFmpegWASM;
      }
    }
    throw new Error(`ffmpeg.wasm failed on all CDN fallbacks. Last: ${lastErr?.message}`);
  })();
  return __ffmpegLoading;
}

async function fetchToBytes(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Stitch fetch failed ${r.status}: ${url.slice(0, 120)}`);
  return new Uint8Array(await r.arrayBuffer());
}

// Extract the last frame of a video URL as a JPEG data URI. Used by Runway
// last-frame chaining: feed clip N's final frame as clip N+1's start image
// so the AI generates one visually-continuous shot. Requires the video host
// to serve with permissive CORS (Runway's CloudFront does).
async function extractLastFrameDataUri(videoUrl) {
  return new Promise((resolve, reject) => {
    const v = document.createElement('video');
    v.crossOrigin = 'anonymous';
    v.muted = true;
    v.playsInline = true;
    v.preload = 'auto';
    let done = false;
    const finish = (errOrDataUri) => {
      if (done) return; done = true;
      v.removeAttribute('src'); try { v.load(); } catch {}
      if (errOrDataUri instanceof Error) reject(errOrDataUri); else resolve(errOrDataUri);
    };
    const timer = setTimeout(() => finish(new Error('extractLastFrame timeout (20s)')), 20000);
    v.onloadedmetadata = () => {
      // Seek 100ms before the very end — exact-end seeking sometimes errors.
      v.currentTime = Math.max(0, (v.duration || 1) - 0.1);
    };
    v.onseeked = () => {
      try {
        const c = document.createElement('canvas');
        c.width = v.videoWidth || 720;
        c.height = v.videoHeight || 1280;
        const ctx = c.getContext('2d');
        ctx.drawImage(v, 0, 0, c.width, c.height);
        const dataUri = c.toDataURL('image/jpeg', 0.92);
        clearTimeout(timer); finish(dataUri);
      } catch (e) { clearTimeout(timer); finish(new Error('canvas extract failed: ' + e.message)); }
    };
    v.onerror = () => { clearTimeout(timer); finish(new Error('video load failed (CORS or 404)')); };
    v.src = videoUrl;
  });
}

// Module-level Set of Runway chain submissions currently in flight, keyed by
// the awaiting-chain scene's sceneId. Prevents the polling tick from kicking
// off duplicate submits while one is still pending.
const __runwayChainInFlight = new Set();

// Global stitch lock. Multiple videos may try to stitch concurrently (e.g.
// after the user runs several test renders); ElevenLabs concurrent-request
// limits and ffmpeg.wasm memory cost mean we MUST serialize. Each call
// queues behind the previous one.
let __stitchQueue = Promise.resolve();

// Concatenates per-scene videos (drops their audio) and muxes a single
// audio track over the combined output. Returns a blob URL for <video src>.
async function stitchVeoCinematic(args) {
  const next = __stitchQueue.then(() => _stitchVeoCinematicInner(args));
  // Don't propagate failures into the queue's chain — they'd block all
  // subsequent stitches. Swallow here, propagate the original error to caller.
  __stitchQueue = next.catch(() => {});
  return next;
}

async function _stitchVeoCinematicInner({ videoUrls, audioBlob, onProgress }) {
  const ffmpeg = await loadFFmpeg();
  logEvent('stitch', 'start', { sceneCount: videoUrls.length });
  onProgress?.({ stage: 'fetching', progress: 0 });
  for (let i = 0; i < videoUrls.length; i++) {
    const bytes = await fetchToBytes(videoUrls[i]);
    await ffmpeg.writeFile(`scene${i}.mp4`, bytes);
    onProgress?.({ stage: 'fetching', progress: (i + 1) / videoUrls.length });
  }
  const audioBytes = new Uint8Array(await audioBlob.arrayBuffer());
  await ffmpeg.writeFile('voice.mp3', audioBytes);
  const list = videoUrls.map((_, i) => `file 'scene${i}.mp4'`).join('\n');
  await ffmpeg.writeFile('list.txt', new TextEncoder().encode(list));
  // Concat (no audio) — videos may have differing codecs, so re-encode
  // (slower than -c copy but bulletproof for varied Veo outputs).
  onProgress?.({ stage: 'concat', progress: 0.0 });
  await ffmpeg.exec([
    '-f', 'concat', '-safe', '0', '-i', 'list.txt',
    '-c:v', 'libx264', '-preset', 'ultrafast', '-an', 'concat.mp4',
  ]);
  onProgress?.({ stage: 'mux', progress: 0.5 });
  await ffmpeg.exec([
    '-i', 'concat.mp4', '-i', 'voice.mp3',
    '-c:v', 'copy', '-c:a', 'aac', '-shortest', 'output.mp4',
  ]);
  const data = await ffmpeg.readFile('output.mp4');
  const blob = new Blob([data.buffer], { type: 'video/mp4' });
  const url = URL.createObjectURL(blob);
  logEvent('stitch', 'done', { bytes: data.byteLength });
  onProgress?.({ stage: 'done', progress: 1.0 });
  return url;
}

function App() {
  const [state, dispatch] = useReducer(reducer, null, loadState);
  const [page, setPage] = useState('pipeline');
  const stateRef = useRef(state);
  useEffect(() => { stateRef.current = state; });

  useEffect(() => { saveState(state); }, [state]);

  // One-shot: on page load, unwrap any worker-proxied Runway URLs in stored
  // render state. Runway video URLs were briefly proxied through the worker
  // (which rejected them because CloudFront wasn't in the allowlist). The
  // raw CloudFront URLs work directly — no proxy needed.
  useEffect(() => {
    const PROXY_PREFIX = '/proxy/';
    const videos = stateRef.current.videos;
    let anyChanged = false;
    for (const v of videos) {
      if (!v.render?.jobs?.length) continue;
      if (v.render.jobs[0]?.provider !== 'runway_gen4') continue;
      const fixed = v.render.jobs.map(j => {
        if (!j.videoUrl) return j;
        const ix = j.videoUrl.indexOf(PROXY_PREFIX);
        if (ix < 0) return j;
        // Worker URL like .../proxy/{host}/{path...} → reconstruct https://{host}/{path...}
        const tail = j.videoUrl.slice(ix + PROXY_PREFIX.length);
        const slashAt = tail.indexOf('/');
        if (slashAt < 0) return j;
        const host = tail.slice(0, slashAt);
        const path = tail.slice(slashAt + 1);
        if (host.includes('cloudfront.net') || host.includes('runwayml.com')) {
          anyChanged = true;
          return { ...j, videoUrl: `https://${host}/${path}` };
        }
        return j;
      });
      if (fixed.some((j, i) => j !== v.render.jobs[i])) {
        dispatch({ type:'UPDATE_VIDEO', id: v.id, patch: { render: { ...v.render, jobs: fixed } } });
      }
    }
    if (anyChanged) logEvent('migrate', 'unwrapped_runway_proxy_urls', {});
  }, []);

  // One-shot: on page load, auto-retry any previously failed stitches if
  // all per-scene clips are still in render.jobs[].videoUrl. Avoids losing
  // the expensive Runway/Veo cinematic clips when ffmpeg.wasm failed to
  // load on a previous attempt.
  useEffect(() => {
    const eligibleProviders = ['runway_gen4', 'veo3', 'higgsfield', 'fal_seedance2'];
    const candidates = stateRef.current.videos.filter(v =>
      v.render?.stitchError &&
      !v.render?.stitchedUrl &&
      !v.render?.stitchRetried &&
      v.render?.jobs?.length > 1 &&
      v.render.jobs.every(j => j.videoUrl) &&
      eligibleProviders.includes(v.render.jobs[0]?.provider)
    );
    const settings = stateRef.current.settings;
    if (!candidates.length || !settings.elevenLabsKey || !settings.elevenLabsVoiceId) return;
    for (const v of candidates) {
      logEvent('stitch', 'auto_retry_start', { videoId: v.id, sceneCount: v.render.jobs.length });
      dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
        render: { ...v.render, status:'stitching', stitchRetried: true, stitchError: null, stitchProgress: { stage:'starting', progress:0 } },
      }});
      (async () => {
        try {
          const fullText = v.storyboard.scenes.map(sc => sc.dialogue).filter(Boolean).join(' ').trim();
          const audioBlob = await elevenLabsTTS({
            settings, apiKey: settings.elevenLabsKey, voiceId: settings.elevenLabsVoiceId, text: fullText,
          });
          const stitchedUrl = await stitchVeoCinematic({
            videoUrls: v.render.jobs.map(j => j.videoUrl),
            audioBlob,
            onProgress: (p) => dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
              render: { ...stateRef.current.videos.find(x => x.id === v.id)?.render, stitchProgress: p },
            }}),
          });
          dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
            render: { ...stateRef.current.videos.find(x => x.id === v.id)?.render, status:'stitched', stitchedUrl, stitchProgress: { stage:'done', progress:1 } },
            heygen: { ...stateRef.current.videos.find(x => x.id === v.id)?.heygen, videoUrl: stitchedUrl },
          }});
          logEvent('stitch', 'auto_retry_success', { videoId: v.id });
        } catch (e) {
          logEvent('stitch', 'auto_retry_failed', { videoId: v.id, error: e.message });
          dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
            render: { ...stateRef.current.videos.find(x => x.id === v.id)?.render, status:'completed', stitchError: e.message },
          }});
        }
      })();
    }
  }, []);

  useEffect(() => {
    document.documentElement.dataset.theme = state.settings.theme || 'light';
    const tc = document.querySelector('meta[name="theme-color"]');
    if (tc) tc.setAttribute('content', (state.settings.theme === 'dark') ? '#0F172A' : '#FCF8FA');
  }, [state.settings.theme]);

  // Global multi-provider polling: survives page navigation. Polls every 8s.
  // Handles new render.jobs[] (multi-provider) and legacy heygen.videoId (single HeyGen job).
  useEffect(() => {
    const tick = async () => {
      const s = stateRef.current;
      const rendering = s.videos.filter(v => v.stage === 'render');
      for (const v of rendering) {
        // NEW PATH: render.jobs[]
        if (v.render?.jobs?.length) {
          let allDone = true;
          let anyFailed = false;
          let updatedJobs = [...v.render.jobs];
          for (let i = 0; i < updatedJobs.length; i++) {
            const job = updatedJobs[i];
            if (job.status === 'completed' || job.status === 'failed') continue;
            // Chained Runway jobs awaiting submission have no jobId yet — skip
            // polling; the chain-submission block below handles them.
            if (!job.jobId) { allDone = false; continue; }
            const P = PROVIDERS[job.provider];
            if (!P) { allDone = false; continue; }
            try {
              const upd = await P.pollJob({ jobId: job.jobId, settings: s.settings });
              if (upd.status === 'completed' && upd.videoUrl) {
                updatedJobs[i] = { ...job, status: 'completed', videoUrl: upd.videoUrl };
              } else if (upd.status === 'failed') {
                updatedJobs[i] = { ...job, status: 'failed', error: upd.error };
                anyFailed = true;
              } else {
                updatedJobs[i] = { ...job, status: upd.status || 'processing' };
                allDone = false;
              }
            } catch (e) { console.warn('poll error', e); allDone = false; }
          }

          // Runway last-frame chaining: for any newly-completed Runway scene
          // with a queued chained follower, extract its last frame and submit
          // the next scene with that frame as promptImage.
          for (let i = 0; i < updatedJobs.length; i++) {
            const job = updatedJobs[i];
            if (!job.awaitingChain) continue;
            const sceneIdKey = job.sceneIds[0];
            if (__runwayChainInFlight.has(sceneIdKey)) { allDone = false; continue; }
            const prev = updatedJobs.find(j => j.sceneIds?.includes(job.chainAfterSceneId));
            if (!prev) {
              updatedJobs[i] = { ...job, status: 'failed', error: 'chain: previous scene not found', awaitingChain: false };
              anyFailed = true; continue;
            }
            if (prev.status === 'failed') {
              updatedJobs[i] = { ...job, status: 'failed', error: 'chain: previous scene failed', awaitingChain: false };
              anyFailed = true; continue;
            }
            if (prev.status !== 'completed' || !prev.videoUrl) {
              allDone = false; continue; // still waiting for prev to render
            }
            // Ready to chain. Fire async submit (don't block this tick).
            __runwayChainInFlight.add(sceneIdKey);
            updatedJobs[i] = { ...job, status: 'submitting' };
            allDone = false;
            (async () => {
              const videoId = v.id;
              try {
                logEvent('runway-chain', 'extracting_frame', { sceneId: sceneIdKey, prevVideo: prev.videoUrl.slice(0, 80) });
                const frameDataUri = await extractLastFrameDataUri(prev.videoUrl);
                logEvent('runway-chain', 'frame_extracted', { sceneId: sceneIdKey, kb: Math.round(frameDataUri.length/1024) });
                const newJob = await RunwayGen4Provider._submitOneScene({
                  scene: job.scene, imageUrl: frameDataUri, settings: stateRef.current.settings,
                  aspect: job.aspect, model: job.model,
                });
                logEvent('runway-chain', 'submitted', { sceneId: sceneIdKey, jobId: newJob.jobId });
                const cur = stateRef.current.videos.find(x => x.id === videoId);
                if (!cur?.render) return;
                dispatch({ type:'UPDATE_VIDEO', id: videoId, patch: { render: { ...cur.render, jobs: cur.render.jobs.map(j => j.sceneIds?.[0] === sceneIdKey ? { ...j, jobId: newJob.jobId, status: 'processing', awaitingChain: false, scene: undefined } : j) } } });
              } catch (e) {
                logEvent('runway-chain', 'failed', { sceneId: sceneIdKey, error: e.message });
                const cur = stateRef.current.videos.find(x => x.id === videoId);
                if (!cur?.render) return;
                dispatch({ type:'UPDATE_VIDEO', id: videoId, patch: { render: { ...cur.render, jobs: cur.render.jobs.map(j => j.sceneIds?.[0] === sceneIdKey ? { ...j, status: 'failed', error: 'Chain: ' + e.message, awaitingChain: false } : j) } } });
              } finally {
                __runwayChainInFlight.delete(sceneIdKey);
              }
            })();
          }
          // If all jobs done and at least one succeeded, advance to approval
          if (allDone) {
            const successful = updatedJobs.filter(j => j.status === 'completed');
            if (successful.length === updatedJobs.length) {
              const primaryUrl = successful[0].videoUrl;
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                stage: 'approval',
                render: { ...v.render, status: 'completed', jobs: updatedJobs, completedAt: Date.now() },
                heygen: { ...v.heygen, status: 'completed', videoUrl: primaryUrl, error: '' },
              }});
              // Auto-stitch multi-scene cinematic renders (Higgsfield / Veo 3)
              // into a single video with the user's ElevenLabs PVC voice.
              // Runs in the background so the Approval card shows the first
              // scene immediately and swaps to the stitched final once complete.
              const isVeoMulti = updatedJobs.length > 1
                && ['runway_gen4', 'veo3', 'higgsfield', 'fal_seedance2'].includes(updatedJobs[0]?.provider)
                && !v.render?.stitchedUrl
                && v.render?.status !== 'stitching'
                && !v.render?.stitchError;
              if (isVeoMulti && s.settings.elevenLabsKey && s.settings.elevenLabsVoiceId) {
                (async () => {
                  try {
                    dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                      render: { ...v.render, status: 'stitching', jobs: updatedJobs, stitchProgress: { stage: 'starting', progress: 0 } },
                    }});
                    const fullText = v.storyboard.scenes.map(sc => sc.dialogue).filter(Boolean).join(' ').trim();
                    const audioBlob = await elevenLabsTTS({
                      settings: s.settings, apiKey: s.settings.elevenLabsKey, voiceId: s.settings.elevenLabsVoiceId, text: fullText,
                    });
                    const stitchedUrl = await stitchVeoCinematic({
                      videoUrls: updatedJobs.map(j => j.videoUrl),
                      audioBlob,
                      onProgress: (p) => dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                        render: { ...stateRef.current.videos.find(x => x.id === v.id)?.render, stitchProgress: p },
                      }}),
                    });
                    dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                      render: { ...stateRef.current.videos.find(x => x.id === v.id)?.render, status: 'stitched', stitchedUrl, stitchProgress: { stage: 'done', progress: 1 } },
                      heygen: { ...stateRef.current.videos.find(x => x.id === v.id)?.heygen, videoUrl: stitchedUrl },
                    }});
                  } catch (e) {
                    logEvent('stitch', 'failed', { error: e.message });
                    dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                      render: { ...stateRef.current.videos.find(x => x.id === v.id)?.render, status: 'completed', stitchError: e.message },
                    }});
                  }
                })();
              }
            } else if (anyFailed) {
              const errs = updatedJobs.filter(j => j.status === 'failed').map(j => j.error).join('; ');
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                render: { ...v.render, status: 'failed', jobs: updatedJobs, error: errs },
                heygen: { ...v.heygen, status: 'failed', error: errs },
              }});
            }
          } else {
            dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ render: { ...v.render, jobs: updatedJobs } } });
          }
          continue;
        }
        // LEGACY PATH: old videos with v.heygen.videoId, no render.jobs.
        // Only fires for videos rendered BEFORE multi-provider was wired in
        // (i.e. genuine legacy HeyGen jobs). New videos always have v.render
        // present — even with empty jobs[] — so we skip them here to avoid
        // polling HeyGen with a non-HeyGen job ID.
        if (!v.render && v.heygen?.videoId && s.settings.heygenKey) {
          try {
            const r = await heygenStatus({ apiKey: s.settings.heygenKey, videoId: v.heygen.videoId, settings: s.settings });
            if (r.status === 'completed' && r.video_url) {
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                stage:'approval',
                heygen:{ ...v.heygen, status:'completed', videoUrl: r.video_url, thumbnailUrl: r.thumbnail_url, duration: r.duration, error:'' },
              }});
            } else if (r.status === 'failed') {
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                heygen:{ ...v.heygen, status:'failed', error: r.error?.message || r.error?.detail || 'render failed' },
              }});
            } else if (r.status && r.status !== v.heygen.status) {
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ heygen:{ ...v.heygen, status: r.status } } });
            }
          } catch (e) { console.warn('poll error', e); }
        }
      }
    };
    tick();
    const iv = setInterval(tick, 8000);
    return () => clearInterval(iv);
  }, []);

  const store = useMemo(() => ({ state, dispatch }), [state]);

  return (
    <StoreCtx.Provider value={store}>
      <div className="app">
        <Sidebar page={page} setPage={setPage} state={state} />
        <div className="main">
          {page === 'pipeline'  && <PipelinePage go={setPage} />}
          {page === 'new'       && <NewVideoPage go={setPage} />}
          {page === 'approval'  && <ApprovalPage go={setPage} />}
          {page === 'analytics' && <AnalyticsPage />}
          {page === 'publish'   && <PublishPage />}
          {page === 'calendar'  && <CalendarPage />}
          {page === 'settings'  && <SettingsPage />}
        </div>
        <DebugPanel />
      </div>
    </StoreCtx.Provider>
  );
}

// Floating debug panel — fixed bottom-right. Tap the bug icon to expand.
// Shows the last N entries from __debugLog (every provider request, response,
// raw response body, and error) so users can see ground truth when something
// looks stuck. Auto-refreshes every 2s while open.
function DebugPanel() {
  const [open, setOpen] = useState(false);
  const [paused, setPaused] = useState(false);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [, force] = useState(0);
  useEffect(() => {
    if (!open || paused) return;
    const iv = setInterval(() => force(x => x + 1), 2000);
    return () => clearInterval(iv);
  }, [open, paused]);
  const entries = open ? getDebugLog().slice(0, 60) : [];
  const copyAll = async () => {
    const text = entries.map(e => `[${new Date(e.ts).toISOString()}] [${e.provider}] ${e.action}: ${e.detail}`).join('\n');
    try { await navigator.clipboard.writeText(text); alert('Copied ' + entries.length + ' log lines.'); }
    catch { alert('Copy failed; long-press the panel text to select instead.'); }
  };
  const copyOne = async (e, i) => {
    const payload = JSON.stringify({ ts: new Date(e.ts).toISOString(), provider: e.provider, action: e.action, detail: e.detail }, null, 2);
    try { await navigator.clipboard.writeText(payload); setCopiedIdx(i); setTimeout(()=>setCopiedIdx(null), 1200); }
    catch { alert('Copy failed; long-press to select.'); }
  };
  return (
    <>
      <button
        onClick={() => setOpen(o => !o)}
        title="Live events"
        style={{position:'fixed', right:14, bottom:14, zIndex:9999, width:44, height:44, borderRadius:22, border:'1px solid var(--border)', background:'var(--card)', color:'var(--text)', fontSize:18, cursor:'pointer', boxShadow:'var(--shadow-modal)'}}
      >🐞</button>
      {open && (
        <div style={{position:'fixed', right:14, bottom:64, width:'min(92vw, 560px)', maxHeight:'70vh', zIndex:9999, background:'var(--card)', border:'1px solid var(--border)', borderRadius:'var(--radius-card)', boxShadow:'var(--shadow-modal)', display:'flex', flexDirection:'column'}}>
          <div style={{padding:'12px 14px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:8}}>
            <strong style={{fontSize:14}}>Live Events</strong>
            <span style={{fontSize:11, color:'var(--muted)'}}>{entries.length}{paused?' · paused':''}</span>
            <span style={{flex:1}}/>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPaused(p=>!p)}>{paused?'▶ Resume':'⏸ Pause'}</button>
            <button className="btn btn-ghost btn-sm" onClick={copyAll}>Copy all</button>
            <button className="btn btn-ghost btn-sm" onClick={() => { clearDebugLog(); force(x => x + 1); }}>Clear</button>
          </div>
          <div style={{overflow:'auto', padding:'8px 14px', fontFamily:'ui-monospace, SFMono-Regular, Menlo, monospace', fontSize:11, lineHeight:1.45}}>
            {entries.length === 0 && <div style={{color:'var(--muted)'}}>No events yet. Trigger a render or tap "Check now" to see provider traffic here.</div>}
            {entries.map((e, i) => {
              const isErr = e.action.includes('error') || e.action.includes('fail');
              const color = isErr ? 'var(--danger)' : (e.action === 'response_body' || e.action.includes('response_body') ? '#9BB4FF' : 'var(--text)');
              return (
                <div key={i} style={{padding:'8px 0', borderBottom:'1px dashed var(--border)', color}}>
                  <div style={{display:'flex', alignItems:'center', gap:6, color:'var(--muted)', fontSize:10}}>
                    <span>{new Date(e.ts).toLocaleTimeString()} · <strong style={{color}}>{e.provider}</strong> · {e.action}</span>
                    <span style={{flex:1}}/>
                    <button onClick={()=>copyOne(e,i)} style={{border:'1px solid var(--border)', background:'var(--card2)', color:copiedIdx===i?'var(--accent)':'var(--text-dim)', borderRadius:6, padding:'1px 6px', fontSize:9, cursor:'pointer'}}>{copiedIdx===i?'✓ JSON':'Copy JSON'}</button>
                  </div>
                  <div style={{whiteSpace:'pre-wrap', wordBreak:'break-word', marginTop:3}}>{e.detail}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
