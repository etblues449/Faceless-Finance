<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FinCast Studio — UK Tax Saving</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="FinCast" />

<style>
  :root {
    --bg:#F7F8FA; --surface:#F0F2F6; --card:#FFFFFF; --card2:#E5E8EE;
    --border:#DDE1E7; --border2:#C5C9D2;
    --accent:#00A878; --accent-dim:rgba(0,168,120,.10); --accent-hover:#00C490;
    --gold:#B8860B; --danger:#DC2626; --warn:#D97706;
    --text:#0F1419; --text-dim:#4B5563; --muted:#6B7280;
    --shadow:0 1px 2px rgba(15,20,25,0.04), 0 1px 3px rgba(15,20,25,0.05);
    --shadow-modal:0 20px 60px rgba(15,20,25,0.18);
  }
  [data-theme="dark"] {
    --bg:#0A0A0F; --surface:#12121A; --card:#1A1A26; --card2:#22222F;
    --border:#2A2A3E; --border2:#3A3A52;
    --accent:#00E5A0; --accent-dim:rgba(0,229,160,.12); --accent-hover:#00FFB3;
    --gold:#FFD166; --danger:#FF6B6B; --warn:#FFA94D;
    --text:#E8E8F0; --text-dim:#9898B8; --muted:#6B6B8A;
    --shadow:none;
    --shadow-modal:0 20px 60px rgba(0,0,0,0.6);
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body,#root { height:100%; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif; overflow:hidden; }
  button { font:inherit; color:inherit; cursor:pointer; }
  input,textarea,select { font:inherit; color:inherit; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 12px; outline:none; width:100%; }
  input:focus,textarea:focus,select:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:90px; }
  a { color:var(--accent); }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:6px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--border2); }
  .app { display:flex; height:100vh; height:100dvh; }
  .side { width:230px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .brand { padding:20px 18px; border-bottom:1px solid var(--border); }
  .brand-name { font-size:18px; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:8px; }
  .brand-sub { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:.04em; }
  .nav { flex:1; padding:10px 0; overflow-y:auto; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 18px; cursor:pointer; color:var(--text-dim); font-size:13px; border-left:3px solid transparent; transition:all .12s; user-select:none; }
  .nav-item:hover { color:var(--text); background:rgba(255,255,255,.02); }
  .nav-item.active { color:var(--accent); background:var(--accent-dim); border-left-color:var(--accent); font-weight:600; }
  .nav-icon { width:18px; text-align:center; opacity:.85; }
  .side-foot { padding:14px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); }
  .main { flex:1; overflow-y:auto; padding:24px 28px; }
  .page-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; gap:16px; }
  .page-title { font-size:22px; font-weight:700; }
  .page-sub { font-size:13px; color:var(--muted); margin-top:3px; }
  .row { display:flex; gap:12px; }
  .col { flex:1; min-width:0; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; box-shadow:var(--shadow); }
  .card-title { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px; }
  .label { font-size:12px; color:var(--text-dim); margin-bottom:6px; display:block; font-weight:500; }
  .help { font-size:11px; color:var(--muted); margin-top:5px; line-height:1.4; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:8px; border:none; background:var(--accent); color:#000; font-weight:600; font-size:13px; transition:all .12s; }
  .btn:hover:not(:disabled) { background:var(--accent-hover); transform:translateY(-1px); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-ghost { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background:var(--card2); color:var(--text); transform:none; }
  .btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  .btn-outline:hover:not(:disabled) { background:var(--accent-dim); transform:none; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger:hover:not(:disabled) { background:#ff5252; }
  .btn-sm { padding:5px 11px; font-size:12px; }
  .badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; background:var(--card2); color:var(--text-dim); }
  .badge-idea { background:rgba(255,209,102,.15); color:var(--gold); }
  .badge-script { background:rgba(155,180,255,.15); color:#9BB4FF; }
  .badge-render { background:rgba(255,169,77,.18); color:var(--warn); }
  .badge-approval { background:rgba(0,229,160,.15); color:var(--accent); }
  .badge-approved { background:rgba(0,229,160,.25); color:var(--accent); }
  .badge-published { background:#22413a; color:var(--accent); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; font-size:11px; background:var(--card2); color:var(--text-dim); }
  .empty { padding:32px 16px; text-align:center; color:var(--muted); font-size:13px; border:1px dashed var(--border); border-radius:10px; }
  .alert { padding:12px 14px; border-radius:8px; font-size:12px; line-height:1.5; }
  .alert-warn { background:rgba(217,119,6,.08); border:1px solid rgba(217,119,6,.25); color:var(--warn); }
  .alert-err { background:rgba(220,38,38,.06); border:1px solid rgba(220,38,38,.25); color:var(--danger); }
  .alert-ok { background:var(--accent-dim); border:1px solid rgba(0,168,120,.3); color:var(--accent); }
  [data-theme="dark"] .alert-warn { background:rgba(255,169,77,.1); border-color:rgba(255,169,77,.3); }
  [data-theme="dark"] .alert-err { background:rgba(255,107,107,.08); border-color:rgba(255,107,107,.3); }
  [data-theme="dark"] .alert-ok { border-color:rgba(0,229,160,.3); }
  .stage-col { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; min-height:60px; }
  .stage-col-h { font-size:11px; font-weight:700; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase; padding:4px 6px 10px; display:flex; justify-content:space-between; align-items:center; }
  .vcard { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:border-color .1s; }
  .vcard:hover { border-color:var(--accent); }
  .vcard-title { font-size:13px; font-weight:500; line-height:1.35; margin-bottom:6px; }
  .vcard-meta { display:flex; gap:6px; flex-wrap:wrap; font-size:10px; color:var(--muted); }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:50; padding:24px; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:14px; max-width:720px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-modal); }
  .modal-h { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .modal-b { padding:22px; }
  .modal-f { padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
  .seg { display:inline-flex; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:3px; gap:2px; }
  .seg-btn { padding:6px 12px; border:none; background:transparent; color:var(--text-dim); border-radius:6px; font-size:12px; }
  .seg-btn.active { background:var(--accent-dim); color:var(--accent); font-weight:600; }
  .kbd { display:inline-block; font-family:monospace; font-size:11px; padding:2px 6px; border-radius:4px; background:var(--card2); color:var(--text-dim); border:1px solid var(--border); }
  .preview-vid { width:100%; max-height:540px; background:#000; border-radius:8px; }
  .platform-card { border:1px solid var(--border); border-radius:10px; padding:14px; background:var(--card); }
  .platform-card.tiktok { border-left:3px solid #FE2C55; }
  .platform-card.reels { border-left:3px solid #E4405F; }
  .platform-card.shorts { border-left:3px solid #FF0000; }
  .platform-card.long { border-left:3px solid #aaa; }
  .platform-h { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .platform-name { font-weight:700; font-size:13px; }
  .char-count { font-size:11px; color:var(--muted); font-family:monospace; }
  .char-count.over { color:var(--danger); }
  .slider { -webkit-appearance:none; width:100%; height:4px; background:var(--border); border-radius:2px; outline:none; padding:0; }
  .slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; }
  .slider::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; border:none; }
  .key-status { display:inline-flex; align-items:center; gap:4px; font-size:11px; }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
  .dot.ok { background:var(--accent); }
  .dot.bad { background:var(--danger); }
  .step-dots { display:flex; gap:6px; margin-bottom:18px; }
  .step-dot { flex:1; height:3px; border-radius:2px; background:var(--border); }
  .step-dot.done { background:var(--accent); }
  .step-dot.active { background:var(--accent); box-shadow:0 0 0 2px var(--accent-dim); }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid var(--accent); border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; vertical-align:-2px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .copy-tip { font-size:10px; color:var(--accent); margin-left:6px; opacity:0; transition:opacity .2s; }
  .copy-tip.show { opacity:1; }
  details { margin-top:8px; }
  summary { cursor:pointer; font-size:12px; color:var(--text-dim); user-select:none; }
  summary:hover { color:var(--text); }
  pre.script-text { font:13px/1.7 -apple-system,Inter,sans-serif; white-space:pre-wrap; margin:0; color:var(--text-dim); }
  /* === Mobile (cover screen, narrow phones) === */
  @media (max-width: 768px) {
    body { font-size:14px; }
    .app { flex-direction:column-reverse; }
    .side { width:100%; height:auto; min-height:62px; flex-direction:row; border-right:none; border-top:1px solid var(--border); padding:0; flex-shrink:0; }
    .brand, .side-foot { display:none; }
    .nav { display:flex; flex-direction:row; padding:0; flex:1; overflow-x:auto; }
    .nav-item { flex:1; min-width:64px; flex-direction:column; padding:8px 4px; border-left:none; border-top:3px solid transparent; gap:3px; font-size:10px; text-align:center; justify-content:center; align-items:center; }
    .nav-item.active { border-left:none; border-top-color:var(--accent); }
    .nav-item .pill { display:none; }
    .nav-icon { font-size:18px; }
    .main { padding:16px 14px 24px; }
    .page-head { flex-direction:column; gap:10px; }
    .page-title { font-size:20px; }
    .grid2, .grid3 { grid-template-columns:1fr; }
    .pipeline-grid { grid-template-columns:none !important; grid-auto-flow:column; grid-auto-columns:78vw; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:8px; }
    .pipeline-grid > * { scroll-snap-align:start; }
    .calendar-grid { grid-template-columns:none !important; grid-auto-flow:column; grid-auto-columns:60vw; overflow-x:auto; }
    .modal { max-width:100%; max-height:100vh; border-radius:0; }
    .seg { flex-wrap:wrap; }
    .platform-card .row { flex-direction:column; }
  }
  /* === Tablet / Fold inner screen unfolded (769–1100px) === */
  @media (min-width: 769px) and (max-width: 1100px) {
    .side { width: 200px; }
    .main { padding: 20px 22px; }
    .grid3 { grid-template-columns: repeat(2, 1fr); }
    .pipeline-grid { grid-template-columns: repeat(3, minmax(220px, 1fr)) !important; overflow-x: auto; }
    .calendar-grid { grid-template-columns: repeat(7, minmax(110px, 1fr)) !important; overflow-x: auto; }
    .modal { max-width: 640px; }
  }
  /* Touch devices: bigger tap targets */
  @media (pointer: coarse) {
    .nav-item { min-height: 48px; }
    .btn { min-height: 40px; }
    .btn-sm { min-height: 34px; }
    input, textarea, select { min-height: 40px; padding: 10px 12px; }
    .vcard { padding: 12px 14px; }
    .seg-btn { padding: 8px 14px; min-height: 36px; }
  }
  /* === Foldable: when device reports two viewport segments (Fold open), keep modal off the hinge === */
  @media (horizontal-viewport-segments: 2) {
    .modal { max-width: calc(env(viewport-segment-right 0 0) - env(viewport-segment-left 1 0) - 32px); margin-right: calc(100vw - env(viewport-segment-right 0 0) + 16px); }
  }
  /* iOS safe-area for standalone app mode */
  @supports (padding: max(0px)) {
    .side { padding-bottom: max(0px, env(safe-area-inset-bottom)); }
    .main { padding-top: max(16px, env(safe-area-inset-top)); }
  }
</style>

<body>
<div id="root" style="padding:24px;color:#9898B8;font:14px sans-serif">Loading FinCast Studio…</div>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useReducer, useMemo, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';

// ============================================================================
// CONSTANTS
// ============================================================================

const STORAGE_KEY = 'fincast.v1';
const APP_VERSION = '1.0.0';

const PLATFORMS = {
  tiktok:  { name:'TikTok',         aspect:'9:16', maxCaption:2200, ideal:[20,60],  hashtagLimit:5,  uploadUrl:'https://www.tiktok.com/upload', studioUrl:'https://www.tiktok.com/tiktokstudio/upload' },
  reels:   { name:'Instagram Reels',aspect:'9:16', maxCaption:2200, ideal:[15,90],  hashtagLimit:10, uploadUrl:'https://www.instagram.com/reels/create/', studioUrl:'https://business.facebook.com/latest/content_calendar' },
  shorts:  { name:'YouTube Shorts', aspect:'9:16', maxCaption:5000, ideal:[15,60],  hashtagLimit:5,  uploadUrl:'https://www.youtube.com/upload',     studioUrl:'https://studio.youtube.com' },
  long:    { name:'YouTube Long',   aspect:'16:9', maxCaption:5000, ideal:[180,420],hashtagLimit:5,  uploadUrl:'https://www.youtube.com/upload',     studioUrl:'https://studio.youtube.com' },
};

const STAGES = ['idea','script','render','approval','approved','published'];

const MOOD_PRESETS = {
  neutral:       { label:'Neutral / educational', desc:'Balanced framing, no special angle.', hint:'' },
  dataDriven:    { label:'Data-driven',           desc:'Lead with hard numbers and comparisons.',
                   hint:'Lead with a precise £ figure in the first 5 words. Use 2-3 specific numerical comparisons in the body. Pose the punchline as a calculation: "X minus Y equals £Z in your pocket."' },
  personalStory: { label:'Personal story',        desc:'Open with a character/scenario. Walk through their decision.',
                   hint:'Open with a one-sentence character: "A 35-year-old PAYE earner on £80k..." Track that person through the body. End with what the listener should do given they are like that character.' },
  hype:          { label:'Hype / urgent',         desc:'High-energy. Hard CTA. Time-bound.',
                   hint:'Maximum energy. Sentences as short as 3-4 words. Repeat the CTA twice. Anchor urgency to a real UK tax date ("before April 5", "this tax year").' },
  investigative: { label:'Investigative',         desc:'Expose a hidden cost or trap most people miss.',
                   hint:'Frame as exposing a hidden truth. Use "most people miss this" or "what your payslip hides" once (not more). Walk through the trap, then the fix.' },
};

const TONE_PRESETS = {
  matStyle: {
    label: 'Mat-style (QuidSquid)',
    desc: 'Punchy. 6–10 word sentences. Brutal hook. £-saved on screen. Sub-30 sec.',
    speed: 1.0,
    pitch: 0,
    wpmTarget: 165,
    promptStyle: `Tone reference: like UK creator "QuidSquid" (Mat).
- Open with a sharp hook in the first 3 seconds. No setup, no greeting.
- Sentences 6-10 words. Punchy. No jargon.
- Use one specific number per video (£X saved or owed).
- Working-class register. No "let's dive in" / "in this video" filler.
- End with a clear single action ("set up the SIPP this week", "claim it before April 5").
- Total spoken duration: 25-45 seconds.`,
  },
  rebeccaStyle: {
    label: 'Rebecca-style (chartered accountant)',
    desc: 'Warm, technical-but-clear, slower educational pace, defines terms.',
    speed: 0.95,
    pitch: 0,
    wpmTarget: 135,
    promptStyle: `Tone reference: like UK creator "Rebecca's Finance Channel".
- Calm, qualified-accountant register but warm and accessible.
- Define every technical term in plain English ("Personal allowance — that's the £12,570 you can earn before any tax.").
- Walk through one concept thoroughly with one worked example.
- Slower pace, longer sentences allowed but never run-on.
- Confidence without hype. No "you won't believe this" framing.
- Total spoken duration: 60-90 seconds.`,
  },
  neutral: {
    label: 'Neutral / educational',
    desc: 'Clear, mid-pace, balanced.',
    speed: 1.0,
    pitch: 0,
    wpmTarget: 150,
    promptStyle: `Tone: clear, neutral, educational. No clickbait. Define terms briefly. 45-60 seconds spoken.`,
  },
};

const FCA_DISCLAIMER = 'This is for educational purposes only and is not financial advice. I am not authorised by the Financial Conduct Authority. Always consult a qualified adviser before making financial decisions. Capital at risk.';

const DEFAULT_SETTINGS = {
  anthropicKey: '',
  heygenKey: '',
  heygenAvatarId: '',
  heygenVoiceId: '',
  pexelsKey: '',
  bufferToken: '',
  // Phase 3 — multi-provider video stack
  hedraKey: '',
  hedraCharacterId: '',           // Saved Character in Hedra (uploaded reference photos)
  hedraBaseUrl: 'https://api.hedra.com/web-app/public',  // Verified: hedra-labs/hedra-api-starter
  hedraAuthScheme: 'x-api-key',   // Verified: Hedra public API ONLY accepts X-API-Key. Bearer is rejected.
  hedraActTwoModelId: '',         // Hedra Act-Two model UUID — get via "Fetch models" in Settings
  hedraCharacter2ModelId: '',     // Hedra Character-2 model UUID — get via "Fetch models" in Settings
  hedraStartKeyframeUrl: '',      // Public URL to your reference photo (used as start_keyframe_url). Drop photo in Drive, share publicly, paste URL here.
  hedraStartKeyframeId: '',       // OR upload photo to Hedra and paste asset ID here (alternative to URL)
  corsProxy: '',                  // CORS proxy prefix (Hedra has CORS allowlist; browser direct calls are rejected)
  elevenLabsKey: '',              // Direct ElevenLabs audio generation (provider-agnostic voice track)
  elevenLabsVoiceId: '',          // PVC voice ID
  veoKey: '',                     // Google Vertex AI (Veo 3) — stub
  veoProjectId: '',
  openaiKey: '',                  // OpenAI (Sora 2) — stub
  runwayKey: '',                  // Runway Gen-4 — stub
  defaultTalkingHeadProvider: 'hedra_act_two', // Hedra Act-Two preferred — uses ElevenLabs voice natively
  defaultCinematicProvider: 'hedra_character',  // Hedra Character-2 for cinematic
  costCapPerVideoGBP: 5,          // Renders refuse if estimate exceeds
  characterBible: 'Strong squared jawline. Defined cheekbones. Light blue-grey eyes. Tight beard stubble. Athletic build. Forearm sleeve tattoo on right arm. Late twenties. Smart-casual British style.',
  niche: 'UK tax saving for PAYE earners in the 20% and 40% income tax bands (£12,570–£125,140), including the £100k 60% trap.',
  audience: 'UK PAYE earners earning between minimum wage and £125,140. Particular relevance to those approaching or in the £100k–£125,140 personal-allowance taper zone.',
  channelHandle: '',
  defaultTone: 'matStyle',
  defaultPlatforms: ['tiktok','reels','shorts'],
  disclaimer: FCA_DISCLAIMER,
  llmModel: 'claude-sonnet-4-6',
  theme: 'light',
};

// ============================================================================
// STATE / PERSISTENCE
// ============================================================================

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { settings:{...DEFAULT_SETTINGS}, videos:[] };
    const parsed = JSON.parse(raw);
    return {
      settings: { ...DEFAULT_SETTINGS, ...(parsed.settings||{}) },
      videos: parsed.videos || [],
    };
  } catch (e) {
    console.warn('State load failed', e);
    return { settings:{...DEFAULT_SETTINGS}, videos:[] };
  }
}
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.warn(e); } }

function reducer(state, action) {
  switch (action.type) {
    case 'SET_SETTINGS': return { ...state, settings:{...state.settings, ...action.patch} };
    case 'CREATE_VIDEO': return { ...state, videos:[action.video, ...state.videos] };
    case 'UPDATE_VIDEO': return { ...state, videos: state.videos.map(v => v.id===action.id ? {...v, ...action.patch, updatedAt:Date.now()} : v) };
    case 'DELETE_VIDEO': return { ...state, videos: state.videos.filter(v => v.id !== action.id) };
    case 'IMPORT': return action.state;
    default: return state;
  }
}

// ============================================================================
// API HELPERS
// ============================================================================

async function callClaude({ apiKey, model='claude-sonnet-4-6', system, user, maxTokens=2400 }) {
  if (!apiKey) throw new Error('Missing Anthropic API key. Add it in Settings.');
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers: {
      'content-type':'application/json',
      'x-api-key': apiKey,

// ============================================================================
// PHASE 3 — STORYBOARD SCHEMA + VIDEO PROVIDER ABSTRACTION
// ============================================================================
//
// A Storyboard is the provider-agnostic source of truth for a video. Any
// provider (HeyGen, Hedra, Veo, Sora, Runway, future) can render it.
//
// Storyboard {
//   version: 2,
//   title, hook,
//   scenes: [
//     {
//       id, dialogue, durationSec,
//       type: 'talking-head' | 'cinematic',
//       visualPrompt,           // text prompt for cinematic; background hint for talking-head
//       brollKeywords: [str],
//       avatarPosition?: 'left'|'center'|'right',
//       avatarScale?: 'close'|'medium'|'wide',
//       textOverlay?,
//       transition?: 'cut'|'fade'|'slide',
//       providerOverride?,      // force a specific provider for this scene
//     }
//   ],
//   captions, hashtags, broll,
//   totalDurationSec
// }

const STORYBOARD_VERSION = 2;

// Build a storyboard from a flat script (backward-compat for old videos).
function migrateScriptToStoryboard(scriptObj) {
  if (!scriptObj) return null;
  if (scriptObj.scenes && Array.isArray(scriptObj.scenes)) return scriptObj; // already a storyboard
  const fullText = scriptObj.script || scriptObj.text || '';
  // Split on em-dashes/double-line-breaks/full stops at scene-like boundaries
  const sentences = fullText.split(/(?<=[.!?])\s+/).filter(s => s.trim());
  const sceneCount = Math.max(1, Math.min(6, Math.ceil(sentences.length / 3)));
  const perScene = Math.ceil(sentences.length / sceneCount);
  const scenes = [];
  for (let i = 0; i < sceneCount; i++) {
    const dialogue = sentences.slice(i * perScene, (i + 1) * perScene).join(' ').trim();
    if (!dialogue) continue;
    const wpm = 150;
    const wordCount = dialogue.split(/\s+/).length;
    scenes.push({
      id: 'scene_' + i,
      dialogue,
      durationSec: Math.round((wordCount / wpm) * 60),
      type: 'talking-head',
      visualPrompt: '',
      brollKeywords: scriptObj.broll?.[i] ? [scriptObj.broll[i]] : [],
      avatarPosition: 'center',
      avatarScale: 'medium',
      textOverlay: '',
      transition: 'cut',
    });
  }
  return {
    version: STORYBOARD_VERSION,
    title: scriptObj.title || '',
    hook: scriptObj.hook || '',
    scenes,
    captions: scriptObj.captions || {},
    hashtags: scriptObj.hashtags || {},
    broll: scriptObj.broll || [],
    totalDurationSec: scenes.reduce((s, sc) => s + sc.durationSec, 0),
  };
}

function storyboardToFlatScript(storyboard) {
  if (!storyboard?.scenes) return '';
  // Filter out scenes where the dialogue looks like a visual prompt
  // (cinematic-only scenes can have empty dialogue, or dialogue that
  // duplicates the visualPrompt — only include real spoken lines).
  return storyboard.scenes
    .filter(s => {
      const d = (s.dialogue || '').trim();
      if (!d) return false;
      // Heuristic: if dialogue starts with "A close-up", "A wide shot",
      // "Camera tracks", etc., it's a visual direction not voiceover
      const visualMarkers = /^(a (close[\- ]up|wide|medium|tight|low|high|tracking|aerial|drone|dolly|slow|fast)|camera (tracks|pans|zooms|pushes)|cut to|fade (to|from)|close[\- ]up of|wide shot of|tracking shot|cinematic shot|interior|exterior|setting:|scene:)\b/i;
      return !visualMarkers.test(d);
    })
    .map(s => s.dialogue.trim())
    .join('\n\n');
}

// ============================================================================
// IN-APP DEBUG LOG — captures every provider request/response
// ============================================================================
const __debugLog = [];
const MAX_DEBUG_ENTRIES = 100;
function logEvent(provider, action, detail) {
  const entry = { ts: Date.now(), provider, action, detail: typeof detail === 'string' ? detail : JSON.stringify(detail).slice(0, 600) };
  __debugLog.unshift(entry);
  if (__debugLog.length > MAX_DEBUG_ENTRIES) __debugLog.length = MAX_DEBUG_ENTRIES;
  // Also log to browser console for desktop devtools
  console.log(`[${provider}] ${action}:`, detail);
}
function getDebugLog() { return [...__debugLog]; }
function clearDebugLog() { __debugLog.length = 0; }
window.__fincastDebugLog = getDebugLog; // allow `window.__fincastDebugLog()` from console

// Wrapped fetch that logs every request, every response, every error.
// All provider code should use this instead of raw fetch.
async function loggedFetch(provider, url, opts = {}) {
  const startedAt = Date.now();
  logEvent(provider, 'request', { url, method: opts.method || 'GET' });
  try {
    const r = await fetch(url, opts);
    const durationMs = Date.now() - startedAt;
    if (!r.ok) {
      const text = await r.text().catch(() => '');
      logEvent(provider, 'response_error', { url, status: r.status, body: text.slice(0, 400), durationMs });
      throw new Error(`${provider} ${r.status} (${durationMs}ms): ${text.slice(0, 300)}`);
    }
    logEvent(provider, 'response_ok', { url, status: r.status, durationMs });
    return r;
  } catch (e) {
    const durationMs = Date.now() - startedAt;
    if (e.message?.includes(provider)) throw e;
    logEvent(provider, 'fetch_error', { url, error: e.message, durationMs, hint: 'Likely CORS, DNS, or network. Check provider base URL in Settings.' });
    throw new Error(`${provider} fetch failed (${durationMs}ms): ${e.message}. URL: ${url}. Likely CORS/DNS issue — try changing the base URL in Settings.`);
  }
}

// Build Hedra auth headers from settings — tries Bearer or x-api-key per user pref.
function hedraAuthHeaders(settings, contentType = 'application/json') {
  const h = {};
  if (settings.hedraAuthScheme === 'bearer') {
    h['Authorization'] = `Bearer ${settings.hedraKey}`;
  } else {
    h['X-API-Key'] = settings.hedraKey;
  }
  if (contentType) h['content-type'] = contentType;
  return h;
}

function hedraUrl(settings, path) {
  const base = (settings.hedraBaseUrl || 'https://api.hedra.com/web-app/public').replace(/\/+$/, '');
  const fullUrl = `${base}${path.startsWith('/') ? '' : '/'}${path}`;
  // If a CORS proxy is configured, prepend it. Supports two patterns:
  //   1. Prefix style: "https://corsproxy.io/?url=" → proxy + encodeURIComponent(fullUrl)
  //   2. Wrap style:   "https://my-worker.workers.dev/proxy?url=" → same as above
  // Heuristic: if proxy ends with "?url=" or "=" or "?", we URL-encode the target.
  // Otherwise we just concatenate.
  const proxy = (settings.corsProxy || '').trim();
  if (!proxy) return fullUrl;
  if (proxy.endsWith('=') || proxy.endsWith('?url=')) return proxy + encodeURIComponent(fullUrl);
  if (proxy.endsWith('/')) return proxy + fullUrl.replace(/^https?:\/\//, '');
  return proxy + '/' + fullUrl.replace(/^https?:\/\//, '');
}

function storyboardDuration(storyboard) {
  if (!storyboard?.scenes) return 0;
  return storyboard.scenes.reduce((s, sc) => s + (sc.durationSec || 0), 0);
}

// ----------------------------------------------------------------------------
// HeyGenProvider — wraps existing HeyGen logic
// ----------------------------------------------------------------------------

class HeyGenProvider extends VideoProvider {
  static id = 'heygen';
  static name = 'HeyGen';
  static caps = { talkingHead: true, cinematic: false, lipSync: true, characterRef: false, multiScene: true };

  static availability(s) {
    const missing = [];
    if (!s.heygenKey) missing.push('HeyGen API key');
    if (!s.heygenAvatarId) missing.push('HeyGen Avatar ID');
    if (!s.heygenVoiceId) missing.push('HeyGen Voice ID');
    return { available: missing.length === 0, missing };
  }

  // HeyGen ~$0.10–0.30/min depending on plan; we model £0.05/scene flat
  static estimateCost(scenes) { return Math.max(0.05, scenes.reduce((s, sc) => s + (sc.durationSec || 5) / 60 * 0.20, 0)); }

  static async startRender({ storyboard, scenes, settings, aspect }) {
    const { heygenKey, heygenAvatarId, heygenVoiceId } = settings;
    const dim = aspect === '16:9' ? { width: 1920, height: 1080 } : { width: 1080, height: 1920 };
    // HeyGen supports multi-scene via video_inputs[]. One entry per scene.
    const video_inputs = scenes.map(sc => ({
      character: {
        type: 'avatar',
        avatar_id: heygenAvatarId,
        avatar_style: sc.avatarScale === 'close' ? 'closeUp' : 'normal',
        scale: sc.avatarScale === 'wide' ? 0.7 : (sc.avatarScale === 'close' ? 1.2 : 1.0),
        offset: sc.avatarPosition === 'left' ? { x: -0.25, y: 0 } : sc.avatarPosition === 'right' ? { x: 0.25, y: 0 } : { x: 0, y: 0 },
      },
      voice: { type: 'text', input_text: sc.dialogue, voice_id: heygenVoiceId },
      ...(sc.textOverlay ? { caption: { text: sc.textOverlay } } : {}),
    }));
    const r = await fetch('https://api.heygen.com/v2/video/generate', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-api-key': heygenKey },
      body: JSON.stringify({ video_inputs, dimension: dim, test: false }),
    });
    if (!r.ok) throw new Error(`HeyGen ${r.status}: ${(await r.text()).slice(0, 300)}`);
    const data = await r.json();
    if (data.error) throw new Error(`HeyGen: ${JSON.stringify(data.error)}`);
    return { jobs: [{ jobId: data.data?.video_id, sceneIds: scenes.map(s => s.id), provider: 'heygen' }] };
  }

  static async pollJob({ jobId, settings }) {
    const r = await fetch(`https://api.heygen.com/v1/video_status.get?video_id=${encodeURIComponent(jobId)}`, {
      headers: { 'x-api-key': settings.heygenKey },
    });
    if (!r.ok) return { status: 'failed', error: `HeyGen status ${r.status}` };
    const d = (await r.json()).data || {};
    return { status: d.status, videoUrl: d.video_url, error: d.error?.message, progress: d.progress };
  }
}

// ----------------------------------------------------------------------------
// HedraActTwoProvider — talking-head via Hedra Act-Two (character image + audio)
// ----------------------------------------------------------------------------

class HedraActTwoProvider extends VideoProvider {
  static id = 'hedra_act_two';
  static name = 'Hedra Act-Two';
  static caps = { talkingHead: true, cinematic: false, lipSync: true, characterRef: true, multiScene: false };

  static availability(s) {
    const missing = [];
    if (!s.hedraKey) missing.push('Hedra API key');
    if (!s.hedraActTwoModelId) missing.push('Hedra Act-Two model ID (Settings → Fetch models)');
    if (!s.hedraStartKeyframeId && !s.hedraStartKeyframeUrl) missing.push('Hedra reference photo (URL or asset ID)');
    if (!s.elevenLabsKey || !s.elevenLabsVoiceId) missing.push('ElevenLabs voice (key + voice ID)');
    return { available: missing.length === 0, missing };
  }

  // Hedra Act-Two ~30 credits/sec at ~$0.001/credit ≈ $0.03/sec → £0.024/sec
  static estimateCost(scenes) { return scenes.reduce((s, sc) => s + (sc.durationSec || 5) * 0.024, 0); }

  static async startRender({ storyboard, scenes, settings, aspect = '9:16' }) {
    if (!settings.hedraActTwoModelId) {
      throw new Error('Hedra Act-Two model ID not set. Settings → Phase 3 → Hedra → tap "Fetch Hedra models" to populate.');
    }
    if (!settings.hedraStartKeyframeId && !settings.hedraStartKeyframeUrl) {
      throw new Error('Hedra needs a reference image. Set hedraStartKeyframeUrl (public photo URL) or hedraStartKeyframeId (uploaded asset ID) in Settings.');
    }
    const jobs = [];
    for (const sc of scenes) {
      // 1. ElevenLabs renders dialogue → audio Blob
      const audioBlob = await elevenLabsTTS({
        apiKey: settings.elevenLabsKey,
        voiceId: settings.elevenLabsVoiceId,
        text: sc.dialogue,
      });
      // 2. Upload audio to Hedra (two-step multipart per real API spec)
      const audioAssetId = await hedraUploadAudio(audioBlob, settings);
      // 3. Submit Act-Two generation (real API body shape)
      const body = {
        type: 'video',
        ai_model_id: settings.hedraActTwoModelId,
        audio_id: audioAssetId,
        generated_video_inputs: {
          text_prompt: sc.dialogue,
          resolution: '720p',
          aspect_ratio: aspect,
        },
      };
      if (settings.hedraStartKeyframeId) body.start_keyframe_id = settings.hedraStartKeyframeId;
      else body.start_keyframe_url = settings.hedraStartKeyframeUrl;
      const r = await loggedFetch('hedra-act-two', hedraUrl(settings, '/generations'), {
        method: 'POST',
        headers: hedraAuthHeaders(settings),
        body: JSON.stringify(body),
      });
      const d = await r.json();
      jobs.push({ jobId: d.id || d.generation_id, sceneIds: [sc.id], provider: 'hedra_act_two' });
    }
    return { jobs };
  }

  static async pollJob({ jobId, settings }) {
    try {
      // Verified endpoint: GET /generations/{id}/status (per Hedra starter)
      const r = await loggedFetch('hedra-poll', hedraUrl(settings, `/generations/${jobId}/status`), {
        headers: hedraAuthHeaders(settings, null),
      });
      const d = await r.json();
      // Verified status values: queued | processing | finalizing | complete | error
      const map = {
        queued: 'pending',
        processing: 'processing',
        finalizing: 'processing',
        complete: 'completed',
        error: 'failed',
      };
      return {
        status: map[d.status] || d.status,
        videoUrl: d.download_url, // verified field name (presigned S3 URL — fetch without API key)
        progress: d.progress,
        error: d.error_message,
      };
    } catch (e) {
      return { status: 'failed', error: e.message };
    }
  }
}

// Builds the final cinematic prompt by prepending the Character Bible.
// Centralised so EVERY cinematic provider (Hedra, Veo, Sora, Runway) gets
// the same locked persona description — regardless of which one renders.
function applyCharacterBible(scene, settings) {
  const bible = (settings?.characterBible || '').trim();
  const scenePrompt = (scene.visualPrompt || scene.dialogue || '').trim();
  if (!bible) return scenePrompt;
  return `Subject reference (must match across all scenes): ${bible}\n\nScene: ${scenePrompt}`;
}

// ----------------------------------------------------------------------------
// Provider Registry + Picker
// ----------------------------------------------------------------------------

const PROVIDERS = {
  heygen: HeyGenProvider,
  hedra_act_two: HedraActTwoProvider,
  hedra_character: HedraCharacterProvider,
  veo3: Veo3Provider,
  sora2: Sora2Provider,
  runway_gen4: RunwayGen4Provider,
};

function listProvidersFor(sceneType, settings) {
  const cap = sceneType === 'cinematic' ? 'cinematic' : 'talkingHead';
  return Object.values(PROVIDERS).filter(p => p.caps[cap]).map(p => ({
    P: p,
    id: p.id,
    name: p.name,
    available: p.availability(settings).available,
    missing: p.availability(settings).missing,
  }));
}

function pickProviderForScene(scene, settings) {
  // 1. Manual override on the scene
  if (scene.providerOverride && PROVIDERS[scene.providerOverride]) {
    const P = PROVIDERS[scene.providerOverride];
    if (P.availability(settings).available) return P;
  }
  // 2. User's default for this scene type
  const defaultId = scene.type === 'cinematic'
    ? settings.defaultCinematicProvider
    : settings.defaultTalkingHeadProvider;
  if (defaultId && defaultId !== 'auto' && PROVIDERS[defaultId]) {
    const P = PROVIDERS[defaultId];
    if (P.availability(settings).available) return P;
  }
  // 3. Auto: cheapest available provider with the required capability
  const candidates = listProvidersFor(scene.type, settings).filter(c => c.available);
  if (!candidates.length) return null;
  candidates.sort((a, b) => a.P.estimateCost([scene]) - b.P.estimateCost([scene]));
  return candidates[0].P;
}

function estimateStoryboardCost(storyboard, settings) {
  if (!storyboard?.scenes) return { total: 0, byProvider: {}, unrenderableScenes: [] };
  const byProvider = {};
  const unrenderable = [];
  for (const sc of storyboard.scenes) {
    const P = pickProviderForScene(sc, settings);
    if (!P) { unrenderable.push(sc.id); continue; }
    byProvider[P.id] = byProvider[P.id] || { name: P.name, scenes: [], cost: 0 };
    byProvider[P.id].scenes.push(sc);
  }
  for (const id of Object.keys(byProvider)) {
    byProvider[id].cost = PROVIDERS[id].estimateCost(byProvider[id].scenes);
  }
  const total = Object.values(byProvider).reduce((s, p) => s + p.cost, 0);
  return { total, byProvider, unrenderableScenes: unrenderable };
}

async function elevenLabsTTS({ apiKey, voiceId, text }) {
  if (!apiKey || !voiceId) throw new Error('ElevenLabs key + voice ID required.');
  const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${encodeURIComponent(voiceId)}`, {

      model_id: 'eleven_multilingual_v2',
      voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.4, use_speaker_boost: true },
    }),
  });
  if (!r.ok) throw new Error(`ElevenLabs ${r.status}: ${(await r.text()).slice(0, 200)}`);
  return r.blob(); // returns audio/mpeg Blob — caller decides what to do with it
}

// Upload an audio Blob to Hedra's assets endpoint. Returns an asset id Hedra
// can reference internally (no public URL needed — solves the blob-URL problem).
// Hedra exposes a two-step upload (init → put) for media; we use a single
// multipart POST which their API also accepts for short audio clips.
// Hedra audio upload — verified two-step flow per hedra-labs/hedra-api-starter:
//   1. POST /assets with JSON {name, type:"audio"} → response {id}
//   2. POST /assets/{id}/upload with multipart form-data, field name "file"
// (No presigned PUT URL for audio — that's only returned for type:"video".)
async function hedraUploadAudio(blob, settings) {
  if (!settings.hedraKey) throw new Error('Hedra API key required for audio upload.');
  // Step 1: create asset record
  const init = await loggedFetch('hedra-asset-init', hedraUrl(settings, '/assets'), {
    method: 'POST',
    headers: hedraAuthHeaders(settings),
    body: JSON.stringify({ name: 'scene_audio.mp3', type: 'audio' }),
  });
  const initData = await init.json();
  const assetId = initData.id;
  if (!assetId) throw new Error(`Hedra POST /assets did not return id. Response: ${JSON.stringify(initData).slice(0, 200)}`);
  // Step 2: multipart upload to /assets/{id}/upload
  const form = new FormData();
  form.append('file', blob, 'scene_audio.mp3');
  await loggedFetch('hedra-asset-upload', hedraUrl(settings, `/assets/${assetId}/upload`), {
    method: 'POST',
    headers: hedraAuthHeaders(settings, null), // no content-type — let browser set multipart boundary
    body: form,
  });
  return assetId;
}

// Hedra image upload (for setting start_keyframe_id from a public photo URL or local Blob).
// Used by the "Upload reference photo" helper in Settings.
async function hedraUploadImage(blob, settings, name = 'reference.jpg') {
  if (!settings.hedraKey) throw new Error('Hedra API key required.');
  const init = await loggedFetch('hedra-image-init', hedraUrl(settings, '/assets'), {
    method: 'POST',
    headers: hedraAuthHeaders(settings),
    body: JSON.stringify({ name, type: 'image' }),
  });

  const assetId = initData.id;
  if (!assetId) throw new Error(`Hedra POST /assets did not return id. Response: ${JSON.stringify(initData).slice(0, 200)}`);
  const form = new FormData();
  form.append('file', blob, name);
  await loggedFetch('hedra-image-upload', hedraUrl(settings, `/assets/${assetId}/upload`), {
    method: 'POST',
    headers: hedraAuthHeaders(settings, null),
    body: form,
  });
  return assetId;
}

// ----------------------------------------------------------------------------
// Render orchestrator — takes a storyboard, picks providers per scene,
// dispatches renders, returns job handles for polling.
// ----------------------------------------------------------------------------

async function orchestrateRender({ storyboard, settings, aspect = '9:16' }) {
  const cost = estimateStoryboardCost(storyboard, settings);
  if (cost.unrenderableScenes.length) {
    throw new Error(`No available provider for scene(s): ${cost.unrenderableScenes.join(', ')}. Configure a provider in Settings.`);
  }
  if (settings.costCapPerVideoGBP && cost.total > settings.costCapPerVideoGBP) {
    throw new Error(`Estimated cost £${cost.total.toFixed(2)} exceeds your cap of £${settings.costCapPerVideoGBP}. Raise cap in Settings or use cheaper providers.`);
  }
  // Group scenes by provider. Each provider is now self-contained — it does
  // its own audio rendering / upload as needed. The orchestrator just
  // dispatches and aggregates.
  const groups = {};
  for (const sc of storyboard.scenes) {
    const P = pickProviderForScene(sc, settings);
    groups[P.id] = groups[P.id] || { P, scenes: [] };
    groups[P.id].scenes.push(sc);
  }
  const allJobs = [];
  for (const { P, scenes } of Object.values(groups)) {
    const { jobs } = await P.startRender({ storyboard, scenes, settings, aspect });
    allJobs.push(...jobs);
  }
  return { jobs: allJobs, cost };
}

async function pollAllJobs({ jobs, settings, onProgress }) {
  const results = jobs.map(j => ({ ...j, status: 'pending', videoUrl: null }));
  let pending = results.length;
  const maxAttempts = 120; // 10 min @ 5s
  for (let i = 0; i < maxAttempts && pending > 0; i++) {
    await new Promise(r => setTimeout(r, 5000));
    for (const r of results) {
      if (r.status === 'completed' || r.status === 'failed') continue;
      try {
        const P = PROVIDERS[r.provider];
        const upd = await P.pollJob({ jobId: r.jobId, settings });
        if (upd.status === 'completed') { r.status = 'completed'; r.videoUrl = upd.videoUrl; pending--; }
        else if (upd.status === 'failed') { r.status = 'failed'; r.error = upd.error; pending--; }
        else { r.progress = upd.progress; }
      } catch (e) { r.status = 'failed'; r.error = e.message; pending--; }
    }
    onProgress?.(results);
  }
  return results;
}

// Buffer compose URL — phase 1 (no backend). Opens Buffer with prefilled text + media URL.
function bufferComposeUrl({ text, mediaUrl }) {
  const base = 'https://buffer.com/compose';
  const params = new URLSearchParams();
  if (text) params.set('text', text);
  if (mediaUrl) params.set('picture', mediaUrl);
  return `${base}?${params.toString()}`;
}

- Use ellipses (…) sparingly for dramatic effect (max once or twice per script).

const fmt = ts => ts ? new Date(ts).toLocaleString('en-GB', { dateStyle:'medium', timeStyle:'short' }) : '—';
const stageBadgeCls = s => `badge badge-${s}`;

function tryParseJSON(text) {
  if (!text) return null;
  // Strip code fences if present
  const cleaned = text.replace(/```json\s*/g,'').replace(/```\s*$/g,'').trim();
  try { return JSON.parse(cleaned); } catch {}
  // Try to find first JSON object/array
  const m = cleaned.match(/[\[{][\s\S]*[\]}]/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  return null;
}

function copy(text) {
  try { navigator.clipboard.writeText(text); return true; } catch { return false; }
}

function download(filename, blobOrText, mime='text/plain') {
  const blob = blobOrText instanceof Blob ? blobOrText : new Blob([blobOrText], { type:mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function downloadRemote(url, filename) {
  // Trigger browser download of a remote MP4. Some hosts CORS-block fetch; falling back to opening in a new tab.
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('fetch failed');
    const blob = await r.blob();
    download(filename, blob, blob.type || 'video/mp4');
  } catch {
    window.open(url, '_blank', 'noopener');
  }
}

function checkKeys(settings) {
  // Provider-aware keys check. Returns { ok, missing[] }.
  if (!settings.anthropicKey) return { ok: false, missing: ['Anthropic API key (script generation)'] };
  const missing = [];
  // Talking-head provider keys
  const thId = settings.defaultTalkingHeadProvider;
  if (thId === 'heygen') {
    if (!settings.heygenKey) missing.push('HeyGen API key');
    if (!settings.heygenAvatarId) missing.push('HeyGen Avatar ID');
    if (!settings.heygenVoiceId) missing.push('HeyGen Voice ID');
  } else if (thId === 'hedra_act_two') {
    if (!settings.hedraKey) missing.push('Hedra API key');
    if (!settings.hedraActTwoModelId) missing.push('Hedra Act-Two model ID (tap "Fetch models")');
    if (!settings.hedraStartKeyframeId && !settings.hedraStartKeyframeUrl) missing.push('Hedra reference photo (URL or uploaded asset ID)');
    if (!settings.elevenLabsKey) missing.push('ElevenLabs API key');
    if (!settings.elevenLabsVoiceId) missing.push('ElevenLabs Voice ID');
  } else if (thId === 'auto' || !thId) {
    const hgOk = settings.heygenKey && settings.heygenAvatarId && settings.heygenVoiceId;
    const hdOk = settings.hedraKey && settings.hedraActTwoModelId && (settings.hedraStartKeyframeId || settings.hedraStartKeyframeUrl) && settings.elevenLabsKey && settings.elevenLabsVoiceId;
    if (!hgOk && !hdOk) missing.push('Either a complete HeyGen setup OR a complete Hedra+ElevenLabs setup');
  }
  const cnId = settings.defaultCinematicProvider;
  if (cnId === 'hedra_character' || cnId === 'auto' || !cnId) {
    if (!settings.hedraKey) missing.push('Hedra API key (for cinematic scenes)');
    if (!settings.hedraCharacter2ModelId) missing.push('Hedra Character-2 model ID (tap "Fetch models")');
    if (!settings.hedraStartKeyframeId && !settings.hedraStartKeyframeUrl) missing.push('Hedra reference photo (URL or asset ID)');
  }
  // Dedupe
  const unique = Array.from(new Set(missing));
  return { ok: unique.length === 0, missing: unique };
}

function KeyStatus({ state }) {
  const { ok } = checkKeys(state.settings);
  return <span className="key-status"><span className={`dot ${ok?'ok':'bad'}`}></span>{ok?'Keys OK':'Keys missing'}</span>;
}

  const [sampleErr, setSampleErr] = useState('');

  const generateIdeas = async () => {
    setError(''); setGenerating(true);
    try {
      const out = await callClaude({
        apiKey: state.settings.anthropicKey,
        model: state.settings.llmModel,
        system: ideaSystemPrompt(state.settings),
        user: topic ? `Generate 6 ideas focused on: ${topic}` : 'Generate 6 fresh ideas now.',
        maxTokens: 1400,
      });
      const parsed = tryParseJSON(out);
      if (!Array.isArray(parsed)) throw new Error('Could not parse ideas. Raw: ' + out.slice(0,200));
      setIdeas(parsed);
    } catch (e) { setError(e.message); }
    finally { setGenerating(false); }
  };

  const generateScript = async (idea) => {
    setError(''); setGenerating(true);
    try {
      const out = await callClaude({
        apiKey: state.settings.anthropicKey,
        model: state.settings.llmModel,
        system: scriptSystemPrompt(state.settings, tone, platform, mood),
        user: `Write the script for this idea:\nTitle: ${idea.title}\nHook: ${idea.hook}\nAngle: ${idea.angle}`,
        maxTokens: 3200,
      });
      const parsed = tryParseJSON(out);
      // New format: parsed.scenes[]. Old format: parsed.script (string). Accept either.
      if (!parsed || (!parsed.scenes && !parsed.script)) throw new Error('Could not parse script. Raw: ' + out.slice(0,200));
      // If LLM returned old format, migrate inline
      const storyboard = parsed.scenes
        ? { version: STORYBOARD_VERSION, ...parsed }
        : migrateScriptToStoryboard(parsed);
      // Stash combined object: storyboard + legacy fields for any code still reading them
      setScriptObj({ ...parsed, storyboard, script: storyboardToFlatScript(storyboard) });
      setPicked(idea);
      setStep(3);
    } catch (e) { setError(e.message); }
    finally { setGenerating(false); }
  };

  const startRender = async () => {
    if (!scriptObj?.storyboard) { setError('No storyboard. Regenerate the script.'); return; }
    setError(''); setGenerating(true);
    try {
      // Pre-flight via cost estimator (also surfaces missing providers)
      const cost = estimateStoryboardCost(scriptObj.storyboard, state.settings);
      if (cost.unrenderableScenes.length) {
        throw new Error(`No provider available for scene(s): ${cost.unrenderableScenes.join(', ')}. Configure a provider in Settings.`);
      }

      // Persist video first
      const id = uid();
      const flatScript = storyboardToFlatScript(scriptObj.storyboard);
      const video = {
        id, createdAt:Date.now(), updatedAt:Date.now(),
        stage: 'render',
        idea: { ...picked, platform },
        script: { text: flatScript, durationSec: storyboardDuration(scriptObj.storyboard), generatedAt: Date.now(), tone },
        storyboard: scriptObj.storyboard,
        platforms: {
          tiktok:  { caption: scriptObj.captions?.tiktok || '', hashtags: scriptObj.hashtags?.tiktok || [], posted:false, postUrl:'', scheduledAt:null },
          reels:   { caption: scriptObj.captions?.reels  || '', hashtags: scriptObj.hashtags?.reels  || [], posted:false, postUrl:'', scheduledAt:null },
          shorts:  { caption: scriptObj.captions?.shorts || '', hashtags: scriptObj.hashtags?.shorts || [], posted:false, postUrl:'', scheduledAt:null, title: scriptObj.youtubeTitle || scriptObj.title || '' },
          long:    { caption: scriptObj.captions?.long   || '', hashtags: scriptObj.hashtags?.long   || [], posted:false, postUrl:'', scheduledAt:null, title: scriptObj.title || '' },
        },
        broll: scriptObj.broll || [],
        render: {
          status: 'queued',
          jobs: [],
          estimatedCostGBP: cost.total,
          providersUsed: Object.keys(cost.byProvider),
          aspect: PLATFORMS[platform].aspect,
          startedAt: Date.now(),
        },
        // Legacy field for backward-compat with existing UI code
        heygen: { videoId:'', status:'queued', videoUrl:'', thumbnailUrl:'', error:'', aspect: PLATFORMS[platform].aspect },
      };
      dispatch({ type:'CREATE_VIDEO', video });
      setCreatedVideoId(id);

      // Orchestrate
      const { jobs } = await orchestrateRender({
        storyboard: scriptObj.storyboard,
        settings: state.settings,
        aspect: PLATFORMS[platform].aspect,
      });

      dispatch({ type:'UPDATE_VIDEO', id, patch:{
        render: { ...video.render, status: 'processing', jobs },
        // For single-job HeyGen renders, also populate legacy heygen.videoId so old UI works
        heygen: { ...video.heygen, videoId: jobs[0]?.jobId || '', status: 'processing' },
      } });
      setRenderId(jobs[0]?.jobId);
      setStep(4);
    } catch (e) {
      setError(e.message);
      if (createdVideoId) {
        dispatch({ type:'UPDATE_VIDEO', id:createdVideoId, patch:{
          render: { status: 'failed', error: e.message },
          heygen: { status: 'failed', error: e.message },
        } });
      }
    } finally { setGenerating(false); }
  };

  const reset = () => {
    setStep(1); setIdeas([]); setTopic(''); setPicked(null); setScriptObj(null); setRenderId(null); setCreatedVideoId(null); setError('');
    setSampleUrl(''); setSampleErr('');
  };

  const renderSample = async () => {
    if (!scriptObj?.script) return;
    const missing = preflightRender(state.settings, scriptObj.script);
    if (missing.length) { setSampleErr('Missing: ' + missing.join(', ')); return; }
    setSampleErr(''); setSampleUrl(''); setSampling(true);
    try {
      // Take first ~30 words for a ~10-second sample
      const words = scriptObj.script.split(/\s+/);
      const sampleText = words.slice(0, 30).join(' ') + (words.length > 30 ? '…' : '');
      const id = await heygenGenerate({
        apiKey: state.settings.heygenKey,
        avatarId: state.settings.heygenAvatarId,
        voiceId: state.settings.heygenVoiceId,
        scriptText: sampleText,
        aspect: PLATFORMS[platform].aspect,
        speed: heygenSpeed, pitch: heygenPitch,
      });
      // Poll
      for (let i = 0; i < 40; i++) {
        await new Promise(r => setTimeout(r, 5000));
        const r = await heygenStatus({ apiKey: state.settings.heygenKey, videoId: id });
        if (r.status === 'completed' && r.video_url) { setSampleUrl(r.video_url); break; }
        if (r.status === 'failed') throw new Error(r.error?.message || 'render failed');
      }
    } catch (e) { setSampleErr(e.message); }
    finally { setSampling(false); }
  };

  const keys = checkKeys(state.settings);
  const keysOk = keys.ok;

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">New Video</div>
          <div className="page-sub">Idea → Script → Render → Approval</div>
        </div>
        {step > 1 && <button className="btn btn-ghost btn-sm" onClick={reset}>Start over</button>}
      </div>

      {!keysOk && (
        <div className="alert alert-warn" style={{marginBottom:16}}>
          <strong>Keys missing — check Settings:</strong>
          <ul style={{margin:'6px 0 0 16px', padding:0, fontSize:13}}>
            {keys.missing.map((m, i) => <li key={i}>{m}</li>)}
          </ul>
        </div>
      )}

      <div className="step-dots">
        {[1,2,3,4].map(n => <div key={n} className={`step-dot ${step===n?'active':step>n?'done':''}`} />)}
      </div>

      {error && <div className="alert alert-err" style={{marginBottom:14}}>{error}</div>}

      {step === 1 && (
        <div className="card">
          <div className="card-title">Step 1 · Choose tone & platform</div>
          <div className="grid2" style={{marginBottom:14}}>
            <div>
              <label className="label">Tone</label>
              <select value={tone} onChange={e=>{ setTone(e.target.value); setHeygenSpeed(TONE_PRESETS[e.target.value].speed); }}>
                {Object.entries(TONE_PRESETS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
              <div className="help">{TONE_PRESETS[tone].desc}</div>
            </div>
            <div>
              <label className="label">Primary platform</label>
              <select value={platform} onChange={e=>setPlatform(e.target.value)}>
                {Object.entries(PLATFORMS).map(([k,v]) => <option key={k} value={k}>{v.name} ({v.aspect})</option>)}
              </select>
              <div className="help">Script length and caption rules adapt to this. Other platforms get adapted captions automatically.</div>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label className="label">Mood / angle</label>
            <select value={mood} onChange={e=>setMood(e.target.value)}>
              {Object.entries(MOOD_PRESETS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
            <div className="help">{MOOD_PRESETS[mood].desc}</div>
          </div>
          <button className="btn" onClick={() => setStep(2)} disabled={!keysOk}>Next: Pick an idea →</button>
        </div>
      )}

      {step === 2 && (
        <div className="card">
          <div className="card-title">Step 2 · Pick or generate an idea</div>
          <div style={{display:'flex', gap:8, marginBottom:14}}>
            <input
              placeholder="Topic angle (optional, e.g. 'salary sacrifice for higher rate')"
              value={topic} onChange={e=>setTopic(e.target.value)}
              onKeyDown={e => e.key==='Enter' && generateIdeas()} />
            <button className="btn" onClick={generateIdeas} disabled={generating || !state.settings.anthropicKey} style={{flexShrink:0}}>
              {generating ? <><span className="spin"></span> Generating…</> : '✦ Generate 6 ideas'}
            </button>
          </div>
          {ideas.length === 0 && <div className="empty">No ideas yet. Hit Generate.</div>}
          {ideas.map((idea, i) => (
            <div key={i} className="vcard" style={{marginBottom:8}} onClick={() => generateScript(idea)}>
              <div className="vcard-title">{idea.title}</div>
              <div style={{fontSize:11, color:'var(--text-dim)', marginTop:4}}>{idea.hook}</div>
              <div className="vcard-meta" style={{marginTop:6}}>
                <span className="pill">{idea.angle}</span>
                {idea.platform && <span className="pill">{idea.platform}</span>}
              </div>
            </div>
          ))}
          {generating && ideas.length>0 && <div style={{marginTop:8,color:'var(--accent)'}}><span className="spin"></span> Writing script…</div>}
        </div>
      )}

      {step === 3 && scriptObj && (
        <div className="card">
          <div className="card-title">Step 3 · Review script & set HeyGen voice speed</div>
          <div style={{marginBottom:12}}>
            <label className="label">Title</label>
            <input value={scriptObj.title} onChange={e=>setScriptObj({...scriptObj, title:e.target.value})} />
          </div>
          <div style={{marginBottom:12}}>
            <label className="label">Spoken script ({wordCount(scriptObj.script)} words · ~{scriptObj.estimatedDurationSec}s)</label>
            <textarea value={scriptObj.script} onChange={e=>setScriptObj({...scriptObj, script:e.target.value})} style={{minHeight:200}} />
          </div>
          <div style={{marginBottom:14}}>
            <label className="label">HeyGen voice speed: <strong>{heygenSpeed.toFixed(2)}x</strong></label>
            <input type="range" className="slider" min="0.5" max="1.5" step="0.05" value={heygenSpeed} onChange={e=>setHeygenSpeed(parseFloat(e.target.value))} />
            <div className="help">Suggested for {TONE_PRESETS[tone].label}: {TONE_PRESETS[tone].speed.toFixed(2)}x.</div>
          </div>
          <div style={{marginBottom:14}}>
            <label className="label">HeyGen voice pitch: <strong>{heygenPitch > 0 ? '+' : ''}{heygenPitch}</strong></label>
            <input type="range" className="slider" min="-50" max="50" step="5" value={heygenPitch} onChange={e=>setHeygenPitch(parseInt(e.target.value))} />
            <div className="help">0 = neutral. Negative = deeper, positive = higher. Most cloned voices sound best at 0; only adjust if your clone is consistently too high or low.</div>
          </div>
          {state.settings.defaultTalkingHeadProvider === 'heygen' && (
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
              <button className="btn btn-outline btn-sm" onClick={renderSample} disabled={sampling || generating}>
                {sampling ? <><span className="spin"></span> Sampling… (~60s)</> : '▶ Render 10s sample (1 credit)'}
              </button>
              <span className="help" style={{fontSize:11}}>Legacy HeyGen-only test. Skip — use full render.</span>
            </div>
          )}
          {sampleErr && <div className="alert alert-err" style={{marginBottom:10}}>{sampleErr}</div>}
          {sampleUrl && (
            <div style={{marginBottom:14}}>
              <video src={sampleUrl} controls style={{width:'100%',maxHeight:360,borderRadius:8,background:'#000'}} />
              <div className="help" style={{marginTop:6}}>If the voice is wrong, try a different Voice ID in Settings, or adjust speed/pitch above and sample again.</div>
            </div>
          )}
          <div style={{display:'flex',gap:8}}>
            <button className="btn" onClick={startRender} disabled={generating || sampling}>
              {generating ? <><span className="spin"></span> Sending to HeyGen…</> : '→ Render full video'}
            </button>
            <button className="btn btn-ghost" onClick={() => setStep(2)}>Back</button>
          </div>
        </div>
      )}

      {step === 4 && (
        <div className="card">
          <div className="card-title">Step 4 · Rendering</div>
          <div style={{fontSize:14, marginBottom:14}}>
            HeyGen is rendering your video. Typical wait: 1–4 minutes for 30–60 seconds.<br/>
            You can leave this page — when it's done it will appear in the <strong>Approval</strong> tab.
          </div>
          {createdVideoId && (() => {
            const v = state.videos.find(x => x.id===createdVideoId);
            if (!v) return null;
            return (
              <div>
                <div style={{marginBottom:12}}>
                  Status: <span className="pill"><span className="spin" style={{marginRight:6}}></span>{v.heygen?.status || 'queued'}</span>
                </div>
                {v.heygen?.videoUrl && (
                  <>
                    <video src={v.heygen.videoUrl} controls className="preview-vid" style={{marginBottom:12}} />
                    <div className="alert alert-ok">Render complete. Head to Approval tab.</div>
                  </>
                )}
                {v.heygen?.error && <div className="alert alert-err">{v.heygen.error}</div>}
              </div>
            );
          })()}
          <div style={{display:'flex',gap:8, marginTop:14}}>
            <button className="btn" onClick={() => go('approval')}>Go to Approval →</button>
            <button className="btn btn-ghost" onClick={reset}>Start another</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ApprovalPage({ go }) {
  const { state, dispatch } = useStore();
  const [rerenderingId, setRerenderingId] = useState(null);
  const items = state.videos.filter(v => v.stage === 'approval' || v.stage === 'render');

  const approve = (v) => dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'approved' } });
  const reject = (v) => {
    if (!confirm('Send back to script stage? You can edit and re-render.')) return;
    dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'script' } });
  };
  const checkNow = async (v) => {
    if (!v.heygen?.videoId) return;
    try {
      const r = await heygenStatus({ apiKey: state.settings.heygenKey, videoId: v.heygen.videoId });
      if (r.status === 'completed' && r.video_url) {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
          stage:'approval',
          heygen:{ ...v.heygen, status:'completed', videoUrl: r.video_url, thumbnailUrl: r.thumbnail_url, duration: r.duration, error:'' },
        }});
      } else if (r.status === 'failed') {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ heygen:{ ...v.heygen, status:'failed', error: r.error?.message || 'render failed' } } });
      } else if (r.status) {
        dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ heygen:{ ...v.heygen, status: r.status } } });
      }
    } catch (e) { alert('Status check failed: ' + e.message); }
  };
  const del = (v) => { if (confirm(`Delete "${v.idea?.title || 'this video'}"? Cannot be undone.`)) dispatch({ type:'DELETE_VIDEO', id:v.id }); };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Approval (Final Product)</div>
          <div className="page-sub">Watch every render. Approve to unlock publishing, or send back.</div>
        </div>
      </div>
      {items.length === 0 && <div className="empty">Nothing to review. New renders land here automatically.</div>}
      {items.map(v => (
        <div key={v.id} className="card" style={{marginBottom:14}}>
          <div className="row" style={{alignItems:'flex-start', marginBottom:10}}>
            <div className="col">
              <div style={{fontWeight:600, fontSize:15}}>{v.idea?.title}</div>
              <div style={{fontSize:11, color:'var(--muted)', marginTop:3}}>
                <span className={stageBadgeCls(v.stage)}>{v.stage}</span> · {v.idea?.platform || '—'} · {v.script?.tone || '—'} · {fmt(v.updatedAt)}
              </div>
            </div>
            <div style={{display:'flex',gap:8, flexWrap:'wrap'}}>
              {v.stage === 'approval' && <>
                <button className="btn btn-ghost btn-sm" onClick={() => setRerenderingId(rerenderingId===v.id?null:v.id)}>↻ Re-render</button>
                <button className="btn btn-ghost btn-sm" onClick={() => reject(v)}>Send back</button>
                <button className="btn btn-sm" onClick={() => approve(v)}>✓ Approve</button>
              </>}
              {v.heygen?.videoId && <a className="btn btn-ghost btn-sm" href={`https://app.heygen.com/videos/${v.heygen.videoId}`} target="_blank" rel="noopener">↗ HeyGen</a>}
              <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => del(v)}>× Delete</button>
            </div>
          </div>
          {rerenderingId === v.id && <RerenderControls video={v} onClose={()=>setRerenderingId(null)} />}
          {v.heygen?.videoUrl ? (
            <video src={v.heygen.videoUrl} controls className="preview-vid" />
          ) : (
            <div className="alert alert-warn">
              {v.heygen?.status === 'failed'
                ? `Render failed: ${v.heygen.error || 'unknown error'}`
                : <><span className="spin"></span> Rendering ({v.heygen?.status || 'queued'})… auto-polls every 8s.</>}
              {v.heygen?.status === 'failed' && (
                <button className="btn btn-ghost btn-sm" style={{marginLeft:10}} onClick={() => dispatch({type:'UPDATE_VIDEO', id:v.id, patch:{ stage:'script' }})}>Back to script</button>
              )}
              {v.heygen?.status !== 'failed' && (
                <button className="btn btn-ghost btn-sm" style={{marginLeft:10}} onClick={() => checkNow(v)}>↻ Check now</button>
              )}
            </div>
          )}
          {v.storyboard?.scenes?.length ? (
            <StoryboardPreview storyboard={v.storyboard} jobs={v.render?.jobs} settings={state.settings} />
          ) : null}
          <details>
            <summary>View flat script ({wordCount(v.script?.text)} words)</summary>
            <pre className="script-text" style={{marginTop:8}}>{v.script?.text}</pre>
          </details>
        </div>
      ))}
    </div>
  );
}

function StoryboardPreview({ storyboard, jobs = [], settings }) {
  const cost = useMemo(() => settings ? estimateStoryboardCost(storyboard, settings) : null, [storyboard, settings]);
  const jobBySceneId = {};
  for (const j of jobs || []) for (const sid of (j.sceneIds || [])) jobBySceneId[sid] = j;
  return (
    <details open style={{marginTop:10, marginBottom:10}}>
      <summary>Scenes ({storyboard.scenes.length}) · {storyboardDuration(storyboard)}s
        {cost ? <span style={{color:'var(--muted)', marginLeft:8}}>· est £{cost.total.toFixed(2)} via {Object.values(cost.byProvider).map(p=>p.name).join(' + ') || '—'}</span> : null}
      </summary>
      <div style={{display:'grid', gap:8, marginTop:8}}>
        {storyboard.scenes.map((sc, i) => {
          const job = jobBySceneId[sc.id];
          const provider = sc.providerOverride
            ? PROVIDERS[sc.providerOverride]?.name
            : (settings ? pickProviderForScene(sc, settings)?.name : null);
          return (
            <div key={sc.id} style={{padding:10, background:'var(--card2)', borderRadius:8, fontSize:12}}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                <span className="pill" style={{background: sc.type==='cinematic' ? 'rgba(255,169,77,0.18)' : 'rgba(155,180,255,0.15)', color: sc.type==='cinematic' ? 'var(--warn)' : '#9BB4FF'}}>{i+1}. {sc.type}</span>
                <span style={{color:'var(--muted)'}}>{sc.durationSec}s</span>
                {provider && <span style={{color:'var(--muted)'}}>→ {provider}</span>}
                {job?.status && <span className="pill" style={{marginLeft:'auto'}}>{job.status}</span>}
              </div>
              <div style={{marginBottom:4}}><strong>Dialogue:</strong> {sc.dialogue}</div>
              {sc.visualPrompt && <div style={{color:'var(--text-dim)', marginBottom:4}}><strong>Visual:</strong> {sc.visualPrompt}</div>}
              {sc.textOverlay && <div style={{color:'var(--text-dim)'}}><strong>Overlay:</strong> "{sc.textOverlay}"</div>}
              {(sc.avatarPosition || sc.avatarScale) && sc.type === 'talking-head' && (
                <div style={{color:'var(--muted)', fontSize:11, marginTop:4}}>position: {sc.avatarPosition || 'center'} · scale: {sc.avatarScale || 'medium'}</div>
              )}
              {job?.videoUrl && (
                <video src={job.videoUrl} controls className="preview-vid" style={{marginTop:8, maxHeight:200}} />
              )}
            </div>
          );
        })}
      </div>
    </details>
  );
}

function RerenderControls({ video, onClose }) {
  const { state, dispatch } = useStore();
  const [speed, setSpeed] = useState(video.heygen?.speed ?? 1.0);
  const [pitch, setPitch] = useState(video.heygen?.pitch ?? 0);
  const [voiceId, setVoiceId] = useState(state.settings.heygenVoiceId);
  const [script, setScript] = useState(video.script?.text || '');
  const [submitting, setSubmitting] = useState(false);
  const [err, setErr] = useState('');

  const start = async () => {
    const missing = preflightRender({ ...state.settings, heygenVoiceId: voiceId }, script);
    if (missing.length) { setErr('Missing: ' + missing.join(', ')); return; }
    setErr(''); setSubmitting(true);
    try {
      const newVideoId = await heygenGenerate({
        apiKey: state.settings.heygenKey,
        avatarId: state.settings.heygenAvatarId,
        voiceId,
        scriptText: script,
        aspect: video.heygen?.aspect || PLATFORMS[video.idea?.platform || 'tiktok'].aspect,
        speed, pitch,
      });
      dispatch({ type:'UPDATE_VIDEO', id:video.id, patch:{
        stage:'render',
        script: { ...video.script, text: script, updatedAt: Date.now() },
        heygen: { videoId: newVideoId, status:'processing', videoUrl:'', thumbnailUrl:'', error:'', speed, pitch, aspect: video.heygen?.aspect },
      }});
      onClose();
    } catch (e) { setErr(e.message); }
    finally { setSubmitting(false); }
  };

  return (
    <div style={{marginTop:12, padding:14, border:'1px dashed var(--border)', borderRadius:8, background:'var(--card2)'}}>
      <div className="card-title">Re-render with new settings</div>
      <div className="grid2" style={{marginBottom:10}}>
        <div>
          <label className="label">Speed: {speed.toFixed(2)}x</label>
          <input type="range" className="slider" min="0.5" max="1.5" step="0.05" value={speed} onChange={e=>setSpeed(parseFloat(e.target.value))} />
        </div>
        <div>
          <label className="label">Pitch: {pitch>0?'+':''}{pitch}</label>
          <input type="range" className="slider" min="-50" max="50" step="5" value={pitch} onChange={e=>setPitch(parseInt(e.target.value))} />
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <label className="label">Voice ID (override)</label>
        <input value={voiceId} onChange={e=>setVoiceId(e.target.value)} placeholder="Leave as Settings default or paste a different voice ID" />
      </div>
      <div style={{marginBottom:10}}>
        <label className="label">Script (edit in place)</label>
        <textarea value={script} onChange={e=>setScript(e.target.value)} style={{minHeight:140}} />
      </div>
      {err && <div className="alert alert-err" style={{marginBottom:10}}>{err}</div>}
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-sm" onClick={start} disabled={submitting}>{submitting?<><span className="spin"></span> Sending…</>:'→ Re-render'}</button>
        <button className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
      </div>
      <div className="help" style={{marginTop:8}}>This burns another HeyGen credit. Original video will be replaced when the new render finishes.</div>
    </div>
  );
}

function BrollSearch({ queries, pexelsKey }) {
  const [active, setActive] = useState(queries[0]);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  useEffect(() => {
    if (!pexelsKey || !active) { setResults([]); return; }
    setLoading(true); setErr('');
    pexelsSearch({ apiKey: pexelsKey, query: active })
      .then(r => setResults(r.videos || []))
      .catch(e => setErr(e.message))
      .finally(() => setLoading(false));
  }, [active, pexelsKey]);
  if (!pexelsKey) return <div className="help" style={{marginTop:8}}>Add a Pexels API key in Settings to search B-roll.</div>;
  return (
    <div style={{marginTop:8}}>
      <div className="seg" style={{marginBottom:10, flexWrap:'wrap'}}>
        {queries.map(q => <button key={q} className={`seg-btn ${active===q?'active':''}`} onClick={()=>setActive(q)}>{q}</button>)}
      </div>
      {loading && <div className="help"><span className="spin"></span> searching Pexels…</div>}
      {err && <div className="alert alert-err">{err}</div>}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8}}>
        {results.slice(0,8).map(v => {
          const file = v.video_files?.find(f => f.quality==='hd') || v.video_files?.[0];
          return (
            <a key={v.id} href={file?.link} target="_blank" rel="noopener" style={{display:'block'}}>
              <img src={v.image} style={{width:'100%', aspectRatio:'9/16', objectFit:'cover', borderRadius:6, border:'1px solid var(--border)'}} alt="" />
            </a>
          );
        })}
      </div>
    </div>
  );
}
