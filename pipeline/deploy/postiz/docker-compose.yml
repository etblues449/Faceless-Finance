# Self-hosted Postiz — the auto-posting engine. Direct-publishes to TikTok,
# YouTube and Instagram via their official APIs. Free tier of nothing required:
# this runs entirely on your own server.
#
# 1. Copy .env.example -> .env in THIS directory and fill in the values.
# 2. `docker compose up -d`
# 3. Open https://<your-domain>, create an account, connect your TikTok /
#    YouTube / Instagram channels, then generate an API key under Settings.
# 4. Put that API key + the connected channels' integration ids into the
#    pipeline's own .env (POSTIZ_API_KEY / POSTIZ_INTEGRATION_IDS).

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    environment:
      MAIN_URL: "${POSTIZ_DOMAIN}"
      FRONTEND_URL: "${POSTIZ_DOMAIN}"
      NEXT_PUBLIC_BACKEND_URL: "${POSTIZ_DOMAIN}/api"
      JWT_SECRET: "${JWT_SECRET}"
      DATABASE_URL: "postgresql://postiz:${POSTGRES_PASSWORD}@postiz-postgres:5432/postiz"
      REDIS_URL: "redis://postiz-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      # Per-platform OAuth app credentials. Create developer apps for each and
      # paste the keys here (see deploy/postiz/README.md for the links).
      # TIKTOK_CLIENT_ID: "${TIKTOK_CLIENT_ID}"
      # TIKTOK_CLIENT_SECRET: "${TIKTOK_CLIENT_SECRET}"
      # YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID}"
      # YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET}"
      # INSTAGRAM_APP_ID: "${INSTAGRAM_APP_ID}"
      # INSTAGRAM_APP_SECRET: "${INSTAGRAM_APP_SECRET}"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "5000:5000"
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: postiz
    volumes:
      - postiz-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz -d postiz"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: always
    volumes:
      - postiz-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postiz-config:
  postiz-uploads:
  postiz-postgres:
  postiz-redis:
