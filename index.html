function CalendarPage() {
  const { state, dispatch } = useStore();
  const [weekOffset, setWeekOffset] = useState(0);
  const monday = useMemo(() => {
    const d = new Date();
    const day = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - day + weekOffset*7);
    d.setHours(0,0,0,0);
    return d;
  }, [weekOffset]);
  const days = Array.from({length:7}, (_,i) => { const d = new Date(monday); d.setDate(d.getDate()+i); return d; });

  const items = state.videos.filter(v => v.stage==='approved' || v.stage==='published');

  const setSchedule = (videoId, platform, dateIso) => {
    const v = state.videos.find(x => x.id===videoId);
    if (!v) return;
    dispatch({ type:'UPDATE_VIDEO', id:videoId, patch:{ platforms: { ...v.platforms, [platform]: { ...v.platforms[platform], scheduledAt: dateIso ? new Date(dateIso).getTime() : null } } } });
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Calendar</div>
          <div className="page-sub">Manual scheduling per platform. No magic best-time wisdom — you decide.</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(w=>w-1)}>← Prev</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(0)}>Today</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setWeekOffset(w=>w+1)}>Next →</button>
        </div>
      </div>

      <div className="calendar-grid" style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:8, marginBottom:14}}>
        {days.map(d => {
          const ds = d.toDateString();
          const today = new Date().toDateString() === ds;
          const dayItems = [];
          items.forEach(v => {
            ['tiktok','reels','shorts','long'].forEach(plat => {
              const sched = v.platforms?.[plat]?.scheduledAt;
              if (sched && new Date(sched).toDateString() === ds) {
                dayItems.push({ video:v, platform:plat, time:sched });
              }
            });
          });
          return (
            <div key={ds} className="card" style={{padding:10, background: today?'var(--card2)':'var(--card)'}}>
              <div style={{fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:8}}>
                {d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })}
              </div>
              {dayItems.length===0 && <div style={{fontSize:11, color:'var(--muted)'}}>—</div>}
              {dayItems.map(({video, platform, time}, i) => (
                <div key={i} style={{fontSize:11, padding:6, background:'var(--card2)', borderRadius:6, marginBottom:6, lineHeight:1.4}}>
                  <div style={{color:'var(--accent)', fontWeight:600}}>{PLATFORMS[platform].name}</div>
                  <div>{new Date(time).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}</div>
                  <div style={{color:'var(--text-dim)', marginTop:3}}>{video.idea?.title?.slice(0,40)}…</div>
                </div>
              ))}
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="card-title">Schedule a video</div>
        {items.length===0 && <div className="empty">No approved videos to schedule.</div>}
        {items.map(v => (
          <div key={v.id} style={{padding:'12px 0', borderBottom:'1px solid var(--border)'}}>
            <div style={{fontWeight:600, fontSize:13, marginBottom:8}}>{v.idea?.title}</div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8}}>
              {['tiktok','reels','shorts','long'].map(plat => {
                const sched = v.platforms?.[plat]?.scheduledAt;
                const val = sched ? new Date(sched - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16) : '';
                return (
                  <div key={plat}>
                    <label className="label" style={{fontSize:11}}>{PLATFORMS[plat].name}</label>
                    <input type="datetime-local" value={val} onChange={e => setSchedule(v.id, plat, e.target.value)} />
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function HedraUploadPhotoButton({ settings, set }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const fileRef = useRef(null);
  const handle = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setErr(''); setBusy(true);
    try {
      const assetId = await hedraUploadImage(file, settings, file.name);
      set({ hedraStartKeyframeId: assetId, hedraStartKeyframeUrl: '' });
      alert(`Uploaded. Asset ID saved: ${assetId}`);
    } catch (ex) { setErr(ex.message); alert('Upload failed: ' + ex.message); }
    finally { setBusy(false); if (fileRef.current) fileRef.current.value = ''; }
  };
  return (
    <>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handle} />
      <button className="btn btn-ghost btn-sm" disabled={busy || !settings.hedraKey} onClick={() => fileRef.current?.click()}>
        {busy ? <><span className="spin"></span> Uploading…</> : '📷 Upload reference photo'}
      </button>
    </>
  );
}

function HedraFetchModelsButton({ settings, set }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [models, setModels] = useState(null);
  const fetchModels = async () => {
    setErr(''); setBusy(true);
    try {
      const list = await hedraListModels(settings);
      setModels(list);
      // Auto-pick: find Character-2 / Act-Two by name pattern
      const pickByName = (substrings) => list.find(m => {
        const n = (m.name || m.display_name || '').toLowerCase();
        return substrings.every(s => n.includes(s));
      });
      const charModel = pickByName(['character']) || pickByName(['char-2']) || pickByName(['c2']);
      const actModel = pickByName(['act']) || pickByName(['lip']);
      const patch = {};
      if (charModel?.id) patch.hedraCharacter2ModelId = charModel.id;
      if (actModel?.id) patch.hedraActTwoModelId = actModel.id;
      if (Object.keys(patch).length) set(patch);
    } catch (ex) { setErr(ex.message); }
    finally { setBusy(false); }
  };
  return (
    <div>
      <button className="btn btn-sm" onClick={fetchModels} disabled={busy || !settings.hedraKey}>
        {busy ? <><span className="spin"></span> Fetching…</> : '↻ Fetch Hedra models'}
      </button>
      {err && <div className="alert alert-err" style={{marginTop:6, fontSize:11}}>{err}</div>}
      {models && (
        <div style={{marginTop:8, fontSize:11, color:'var(--text-dim)'}}>
          Found {models.length} model(s). Click a row to set Act-Two or Character-2 manually:
          <div style={{maxHeight:160,overflowY:'auto',marginTop:4}}>
            {models.map((m, i) => (
              <div key={m.id || i} style={{padding:'4px 6px',background:'var(--card2)',borderRadius:4,marginBottom:2,display:'flex',gap:6,alignItems:'center'}}>
                <span style={{flex:1}}><strong>{m.name || m.display_name || 'Unnamed'}</strong> <code style={{fontSize:10}}>{(m.id||'').slice(0,16)}…</code></span>
                <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'2px 6px'}} onClick={() => set({ hedraActTwoModelId: m.id })}>Use as Act-Two</button>
                <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'2px 6px'}} onClick={() => set({ hedraCharacter2ModelId: m.id })}>Use as Character-2</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function SettingsPage() {
  const { state, dispatch } = useStore();
  const s = state.settings;
  const set = (patch) => dispatch({ type:'SET_SETTINGS', patch });
  const [showKeys, setShowKeys] = useState(false);
  const [avatars, setAvatars] = useState(null);
  const [voices, setVoices] = useState(null);
  const [fetching, setFetching] = useState('');
  const [fetchErr, setFetchErr] = useState('');
  const [testing, setTesting] = useState(false);
  const [testUrl, setTestUrl] = useState('');
  const [testText, setTestText] = useState("Hi, this is a quick voice test. The numbers are twelve thousand five hundred and seventy.");
  const [testErr, setTestErr] = useState('');

  const fetchAvatars = async () => {
    setFetching('avatars'); setFetchErr('');
    try { setAvatars(await heygenListAvatars({ apiKey: s.heygenKey })); }
    catch (e) { setFetchErr(e.message); }
    finally { setFetching(''); }
  };
  const fetchVoices = async () => {
    setFetching('voices'); setFetchErr('');
    try { setVoices(await heygenListVoices({ apiKey: s.heygenKey })); }
    catch (e) { setFetchErr(e.message); }
    finally { setFetching(''); }
  };

  const testVoice = async () => {
    setTesting(true); setTestErr(''); setTestUrl('');
    try {
      const id = await heygenGenerate({
        apiKey: s.heygenKey, avatarId: s.heygenAvatarId, voiceId: s.heygenVoiceId,
        scriptText: testText, aspect:'9:16', speed: 1.0, pitch: 0,
      });
      // Poll until complete
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 5000));
        const r = await heygenStatus({ apiKey: s.heygenKey, videoId: id });
        if (r.status === 'completed' && r.video_url) { setTestUrl(r.video_url); break; }
        if (r.status === 'failed') throw new Error(r.error?.message || 'render failed');
      }
    } catch (e) { setTestErr(e.message); }
    finally { setTesting(false); }
  };

  const exportData = () => download('fincast-backup.json', JSON.stringify(state, null, 2), 'application/json');
  const importData = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!parsed.settings || !Array.isArray(parsed.videos)) throw new Error('bad shape');
        if (confirm('Replace all current data with imported file?')) dispatch({ type:'IMPORT', state: parsed });
      } catch (err) { alert('Invalid backup: ' + err.message); }
    };
    r.readAsText(file);
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-title">Settings</div>
          <div className="page-sub">Keys live in your browser only. Never sent to any server we control.</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowKeys(v=>!v)}>{showKeys?'Hide':'Show'} keys</button>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">API Keys</div>
        <div className="alert alert-warn" style={{marginBottom:14}}>
          These stay in <code>localStorage</code> on this device. Don't share screenshots that include them. To reset: clear site data.
        </div>
        <div className="grid2">
          <div>
            <label className="label">Anthropic API key (Claude)</label>
            <input type={showKeys?'text':'password'} value={s.anthropicKey} onChange={e=>set({ anthropicKey:e.target.value })} placeholder="sk-ant-..." />
            <div className="help">Get from console.anthropic.com → API Keys.</div>
          </div>
          <div>
            <label className="label">HeyGen API key</label>
            <input type={showKeys?'text':'password'} value={s.heygenKey} onChange={e=>set({ heygenKey:e.target.value })} placeholder="..." />
            <div className="help">HeyGen → Settings → Subscriptions → API → Create API Token.</div>
          </div>
          <div>
            <label className="label">HeyGen Avatar ID</label>
            <div style={{display:'flex',gap:6}}>
              <input value={s.heygenAvatarId} onChange={e=>set({ heygenAvatarId:e.target.value })} placeholder="e.g. Daisy_avatar_v2_..." />
              <button className="btn btn-ghost btn-sm" style={{flexShrink:0}} onClick={fetchAvatars} disabled={!s.heygenKey || fetching==='avatars'}>
                {fetching==='avatars'?<span className="spin"></span>:'↻ Fetch'}
              </button>
            </div>
            {avatars && avatars.length > 0 && (
              <select style={{marginTop:6}} value={s.heygenAvatarId} onChange={e=>set({ heygenAvatarId:e.target.value })}>
                <option value="">— Pick an avatar ({avatars.length}) —</option>
                {avatars.map(a => <option key={a.id} value={a.id}>{a.name} ({a.kind}{a.gender?` · ${a.gender}`:''})</option>)}
              </select>
            )}
            <div className="help">Tap "Fetch" once HeyGen key is in. Picks from a dropdown.</div>
          </div>
          <div>
            <label className="label">HeyGen Voice ID</label>
            <div style={{display:'flex',gap:6}}>
              <input value={s.heygenVoiceId} onChange={e=>set({ heygenVoiceId:e.target.value })} placeholder="..." />
              <button className="btn btn-ghost btn-sm" style={{flexShrink:0}} onClick={fetchVoices} disabled={!s.heygenKey || fetching==='voices'}>
                {fetching==='voices'?<span className="spin"></span>:'↻ Fetch'}
              </button>
            </div>
            {voices && voices.length > 0 && (() => {
              const cloned = voices.filter(v => v.isClone);
              const others = voices.filter(v => !v.isClone);
              return (
                <select style={{marginTop:6}} value={s.heygenVoiceId} onChange={e=>set({ heygenVoiceId:e.target.value })}>
                  <option value="">— Pick a voice ({voices.length}) —</option>
                  {cloned.length > 0 && <optgroup label="Your cloned voices">
                    {cloned.map(v => <option key={v.id} value={v.id}>{v.name}{v.language?` · ${v.language}`:''}</option>)}
                  </optgroup>}
                  <optgroup label="HeyGen voices">
                    {others.slice(0, 80).map(v => <option key={v.id} value={v.id}>{v.name}{v.language?` · ${v.language}`:''}{v.gender?` · ${v.gender}`:''}</option>)}
                  </optgroup>
                </select>
              );
            })()}
            <div className="help">Cloned voices are listed first. If you don't see yours, re-create the clone in HeyGen UI.</div>
          </div>
          {fetchErr && <div className="alert alert-err" style={{gridColumn:'1/-1'}}>{fetchErr}</div>}
          <div>
            <label className="label">Pexels API key (B-roll)</label>
            <input type={showKeys?'text':'password'} value={s.pexelsKey} onChange={e=>set({ pexelsKey:e.target.value })} placeholder="optional" />
            <div className="help">Free at pexels.com/api. Leave blank to skip B-roll search.</div>
          </div>
          <div>
            <label className="label">Buffer Access Token (optional)</label>
            <input type={showKeys?'text':'password'} value={s.bufferToken} onChange={e=>set({ bufferToken:e.target.value })} placeholder="optional" />
            <div className="help">Phase 1 just opens Buffer compose URL; token is reserved for the phase 2 worker integration.</div>
          </div>
        </div>
      </div>

      <PhaseThreeProvidersCard />

      <DebugLogCard />

      {s.defaultTalkingHeadProvider === 'heygen' && s.heygenVoiceId && (
        <div className="card" style={{marginBottom:14}}>
          <div className="card-title">Test voice (HeyGen — legacy)</div>
          <div className="alert alert-warn" style={{marginBottom:10, fontSize:12}}>
            This card only works when HeyGen is your active talking-head provider. With Hedra, the equivalent is generating a real video in New Video.
          </div>
          <div style={{marginBottom:10}}>
            <label className="label">Test phrase</label>
            <textarea value={testText} onChange={e=>setTestText(e.target.value)} style={{minHeight:60}} />
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <button className="btn btn-sm" onClick={testVoice} disabled={testing || !s.heygenKey || !s.heygenAvatarId || !s.heygenVoiceId}>
              {testing?<><span className="spin"></span> Rendering test… (~60s)</>:'▶ Render test'}
            </button>
          </div>
          {testErr && <div className="alert alert-err" style={{marginTop:10}}>{testErr}</div>}
          {testUrl && <video src={testUrl} controls style={{width:'100%',maxHeight:300,marginTop:10,borderRadius:8,background:'#000'}} />}
        </div>
      )}

      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">Channel</div>
        <div style={{marginBottom:12}}>
          <label className="label">Niche</label>
          <textarea value={s.niche} onChange={e=>set({ niche:e.target.value })} />
        </div>
        <div style={{marginBottom:12}}>
          <label className="label">Audience</label>
          <textarea value={s.audience} onChange={e=>set({ audience:e.target.value })} />
        </div>
        <div className="grid2">
          <div>
            <label className="label">Default tone</label>
            <select value={s.defaultTone} onChange={e=>set({ defaultTone:e.target.value })}>
              {Object.entries(TONE_PRESETS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Channel handle (for reference)</label>
            <input value={s.channelHandle} onChange={e=>set({ channelHandle:e.target.value })} placeholder="@yourhandle" />
          </div>
        </div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">FCA Disclaimer (auto-appended to every caption)</div>
        <textarea value={s.disclaimer} onChange={e=>set({ disclaimer:e.target.value })} style={{minHeight:80}} />
        <div className="help">UK financial-promotion rules require this on educational content. Edit only if you know what you're doing.</div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">Appearance</div>
        <div className="grid2">
          <div>
            <label className="label">Theme</label>
            <select value={s.theme} onChange={e=>set({ theme:e.target.value })}>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>
          <div>
            <label className="label">Claude model</label>
            <select value={s.llmModel} onChange={e=>set({ llmModel:e.target.value })}>
              <option value="claude-sonnet-4-6">claude-sonnet-4-6 (recommended)</option>
              <option value="claude-opus-4-7">claude-opus-4-7 (best quality, more expensive)</option>
              <option value="claude-haiku-4-5">claude-haiku-4-5 (cheapest)</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Data</div>
        <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
          <button className="btn btn-ghost btn-sm" onClick={exportData}>⬇ Export backup (JSON)</button>
          <label className="btn btn-ghost btn-sm" style={{cursor:'pointer'}}>
            ⬆ Import backup
            <input type="file" accept="application/json" onChange={importData} style={{display:'none'}} />
          </label>
          <button className="btn btn-danger btn-sm" onClick={() => { if(confirm('Delete ALL videos and reset settings to defaults? This cannot be undone.')) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }}>Reset everything</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, dispatch] = useReducer(reducer, null, loadState);
  const [page, setPage] = useState('pipeline');
  const stateRef = useRef(state);
  useEffect(() => { stateRef.current = state; });

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => {
    document.documentElement.dataset.theme = state.settings.theme || 'light';
    const tc = document.querySelector('meta[name="theme-color"]');
    if (tc) tc.setAttribute('content', (state.settings.theme === 'dark') ? '#0A0A0F' : '#F7F8FA');
  }, [state.settings.theme]);

  // Global multi-provider polling: survives page navigation. Polls every 8s.
  // Handles new render.jobs[] (multi-provider) and legacy heygen.videoId (single HeyGen job).
  useEffect(() => {
    const tick = async () => {
      const s = stateRef.current;
      const rendering = s.videos.filter(v => v.stage === 'render');
      for (const v of rendering) {
        // NEW PATH: render.jobs[]
        if (v.render?.jobs?.length) {
          let allDone = true;
          let anyFailed = false;
          let updatedJobs = [...v.render.jobs];
          for (let i = 0; i < updatedJobs.length; i++) {
            const job = updatedJobs[i];
            if (job.status === 'completed' || job.status === 'failed') continue;
            const P = PROVIDERS[job.provider];
            if (!P) { allDone = false; continue; }
            try {
              const upd = await P.pollJob({ jobId: job.jobId, settings: s.settings });
              if (upd.status === 'completed' && upd.videoUrl) {
                updatedJobs[i] = { ...job, status: 'completed', videoUrl: upd.videoUrl };
              } else if (upd.status === 'failed') {
                updatedJobs[i] = { ...job, status: 'failed', error: upd.error };
                anyFailed = true;
              } else {
                updatedJobs[i] = { ...job, status: upd.status || 'processing' };
                allDone = false;
              }
            } catch (e) { console.warn('poll error', e); allDone = false; }
          }
          // If all jobs done and at least one succeeded, advance to approval
          if (allDone) {
            const successful = updatedJobs.filter(j => j.status === 'completed');
            if (successful.length === updatedJobs.length) {
              // For now, single-job renders use that one URL. Multi-job renders concat later (Commit 2 — stitching).
              const primaryUrl = successful[0].videoUrl;
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                stage: 'approval',
                render: { ...v.render, status: 'completed', jobs: updatedJobs, completedAt: Date.now() },
                heygen: { ...v.heygen, status: 'completed', videoUrl: primaryUrl, error: '' },
              }});
            } else if (anyFailed) {
              const errs = updatedJobs.filter(j => j.status === 'failed').map(j => j.error).join('; ');
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                render: { ...v.render, status: 'failed', jobs: updatedJobs, error: errs },
                heygen: { ...v.heygen, status: 'failed', error: errs },
              }});
            }
          } else {
            dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ render: { ...v.render, jobs: updatedJobs } } });
          }
          continue;
        }
        // LEGACY PATH: old videos with v.heygen.videoId, no render.jobs
        if (v.heygen?.videoId && s.settings.heygenKey) {
          try {
            const r = await heygenStatus({ apiKey: s.settings.heygenKey, videoId: v.heygen.videoId });
            if (r.status === 'completed' && r.video_url) {
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                stage:'approval',
                heygen:{ ...v.heygen, status:'completed', videoUrl: r.video_url, thumbnailUrl: r.thumbnail_url, duration: r.duration, error:'' },
              }});
            } else if (r.status === 'failed') {
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{
                heygen:{ ...v.heygen, status:'failed', error: r.error?.message || r.error?.detail || 'render failed' },
              }});
            } else if (r.status && r.status !== v.heygen.status) {
              dispatch({ type:'UPDATE_VIDEO', id:v.id, patch:{ heygen:{ ...v.heygen, status: r.status } } });
            }
          } catch (e) { console.warn('poll error', e); }
        }
      }
    };
    tick();
    const iv = setInterval(tick, 8000);
    return () => clearInterval(iv);
  }, []);

  const store = useMemo(() => ({ state, dispatch }), [state]);

  return (
    <StoreCtx.Provider value={store}>
      <div className="app">
        <Sidebar page={page} setPage={setPage} state={state} />
        <div className="main">
          {page === 'pipeline' && <PipelinePage />}
          {page === 'new'      && <NewVideoPage go={setPage} />}
          {page === 'approval' && <ApprovalPage go={setPage} />}
          {page === 'publish'  && <PublishPage />}
          {page === 'calendar' && <CalendarPage />}
          {page === 'settings' && <SettingsPage />}
        </div>
      </div>
    </StoreCtx.Provider>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
